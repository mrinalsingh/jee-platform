statement: |
  Let $S=\{n\in[2,100]:\binom{n}{r-1},\binom{n}{r},\binom{n}{r+1}$ are in A.P. for some $r\}$.

  - (A) $\min S=7$
  - (B) $n+2$ is a perfect square for every $n\in S$
  - (C) $\lvert S\rvert=8$
  - (D) for $n=14$ the A.P. occurs at $r=4$

answer:
  type: MCQ-MC
  correct_options: [A, B, C]

solution: |
  ### The IDEA
  Three consecutive binomial coefficients $\binom{n}{r-1},\binom{n}{r},\binom{n}{r+1}$ are in A.P. iff
  $\binom{n}{r-1}+\binom{n}{r+1}=2\binom{n}{r}$. Dividing through by $\binom{n}{r}$ and using the
  consecutive-ratio identities reduces the condition to the clean Diophantine statement
  $n+2=(2r-n)^{2}$, i.e. $n+2$ must be a perfect square.

  ### Working
  Using $\dfrac{\binom{n}{r-1}}{\binom{n}{r}}=\dfrac{r}{n-r+1}$ and $\dfrac{\binom{n}{r+1}}{\binom{n}{r}}=\dfrac{n-r}{r+1}$,
  the A.P. condition becomes
  $$\frac{r}{n-r+1}+\frac{n-r}{r+1}=2.$$
  Clearing denominators yields $n^{2}-(4r+1)n+(4r^{2}-2)=0$. Treating this as a quadratic in $n$
  with discriminant $8r^{2}+8r+9$, after simplification the condition is equivalent to
  $$n+2=(2r-n)^{2}=k^{2}\quad(k\ge 3).$$
  Conversely, every perfect square $n+2=k^{2}$ with $k\ge 3$ yields a valid integer $r$
  (specifically $r=\tfrac{n\pm k}{2}$). For $n\in[2,100]$, $n+2\in[4,102]$, so the admissible
  perfect squares are $9,16,25,36,49,64,81,100$, giving
  $$S=\{7,14,23,34,47,62,79,98\},\qquad |S|=8.$$
  Hence $\min S=7$ (A), $n+2$ is always a perfect square (B), and $|S|=8$ (C). For $n=14$
  we have $k=4$ and $r=\tfrac{14\pm 4}{2}\in\{5,9\}$, not $r=4$, so (D) is false.

