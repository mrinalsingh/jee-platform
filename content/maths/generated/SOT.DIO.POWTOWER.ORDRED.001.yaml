statement: |
  Remainders of large towers $7^{7^{7}},\ 17^{17^{17}},\ 23^{23},\ 13^{13^{13}}$ modulo $100,\ 25,\ 1000,\ 17$ respectively. Which of the following is/are correct?

  (A) $7^{7^{7}}\bmod 100 = 43$

  (B) $17^{17^{17}}\bmod 25 = 2$

  (C) $23^{23}\bmod 1000 = 657$

  (D) $13^{13^{13}}\bmod 17 = 4$

answer:
  type: MCQ-MC
  correct_options: [A, B]

solution: |
  **(A)** $\gcd(7,100)=1$ and $\mathrm{ord}_{100}(7)=4$ (since $7^2=49$, $7^4=2401\equiv 1$). Reduce the exponent $7^{7}$ modulo $4$: $7\equiv -1\pmod 4$, so $7^7\equiv -1\equiv 3\pmod 4$. Hence $7^{7^{7}}\equiv 7^{3}=343\equiv 43\pmod{100}$. **True.**

  **(B)** $\mathrm{ord}_{25}(17)\mid \varphi(25)=20$; in fact $\mathrm{ord}_{25}(17)=20$. Reduce $17^{17}\pmod{20}$: $17\equiv -3\pmod{20}$, $17^2\equiv 9$, $17^4\equiv 81\equiv 1$, so $17^{17}=17^{16}\cdot 17\equiv 17$. Thus $17^{17^{17}}\equiv 17^{17}\pmod{25}$. Now $17^2=289\equiv 14$, $17^4\equiv 196\equiv 21$, $17^8\equiv 441\equiv 16$, $17^{16}\equiv 256\equiv 6$, $17^{17}\equiv 6\cdot 17=102\equiv 2$. **True.**

  **(C)** Compute $23^{23}\pmod{1000}$ by squaring: $23^2=529$, $23^4\equiv 529^2=279841\equiv 841$, $23^8\equiv 841^2=707281\equiv 281$, $23^{16}\equiv 281^2=78961\equiv 961$. Then $23^{23}=23^{16}\cdot 23^{4}\cdot 23^{2}\cdot 23\equiv 961\cdot 841\cdot 529\cdot 23\pmod{1000}$. $961\cdot 841\equiv 808201\equiv 201$; $201\cdot 529\equiv 106329\equiv 329$; $329\cdot 23=7567\equiv 567$. So $23^{23}\equiv \mathbf{567}\pmod{1000}$, not $657$. **False** (digit-transposition trap).

  **(D)** By Fermat, $\mathrm{ord}_{17}(13)\mid 16$; check $13^2=169\equiv -1$, so $\mathrm{ord}_{17}(13)=4$. Reduce $13^{13}\pmod 4$: $13\equiv 1$, so $13^{13}\equiv 1$. Hence $13^{13^{13}}\equiv 13^{1}=13\pmod{17}$, not $4$. **False** (classic "reduced mod $\varphi$ instead of mod $\mathrm{ord}$" trap, since $13^{13}\bmod 16 = 13^{13}\bmod 16$ would give a different value).

  **Answer: (A), (B).**

