statement: |
  Let $S(n)=\sum_{k=1}^{n}\tan^{-1}\dfrac{2}{k^{2}}$. Which of the following is/are correct?

  - (A) $S(n)=\tan^{-1}n+\tan^{-1}(n+1)-\dfrac{\pi}{4}$
  - (B) $\displaystyle\lim_{n\to\infty}S(n)=\dfrac{\pi}{4}$
  - (C) $S(2)=\tan^{-1}2+\tan^{-1}3-\dfrac{\pi}{4}$
  - (D) $\displaystyle\lim_{n\to\infty}S(n)=\dfrac{3\pi}{4}$

answer:
  type: MCQ-MC
  correct_options: [A, C, D]

solution: |
  ### The IDEA
  Write $\dfrac{2}{k^{2}}$ as $\dfrac{(k+1)-(k-1)}{1+(k+1)(k-1)}$ so that each term becomes a difference of two $\tan^{-1}$'s with arguments that step by $2$; the sum then telescopes, leaving only the two largest and two smallest boundary terms.

  ### Working
  Since $1+(k+1)(k-1)=k^{2}$, we have
  $$\tan^{-1}\frac{2}{k^{2}}=\tan^{-1}\frac{(k+1)-(k-1)}{1+(k+1)(k-1)}=\tan^{-1}(k+1)-\tan^{-1}(k-1).$$
  (The principal-branch identity $\tan^{-1}a-\tan^{-1}b=\tan^{-1}\dfrac{a-b}{1+ab}$ is valid here because $(k+1)(k-1)=k^{2}-1\ge 0$ for $k\ge 1$.)

  Telescoping in steps of two:
  $$S(n)=\sum_{k=1}^{n}\bigl[\tan^{-1}(k+1)-\tan^{-1}(k-1)\bigr]=\bigl[\tan^{-1}(n+1)+\tan^{-1}n\bigr]-\bigl[\tan^{-1}1+\tan^{-1}0\bigr]$$
  $$=\tan^{-1}n+\tan^{-1}(n+1)-\frac{\pi}{4}.$$
  This is **(A)**. Setting $n=2$: $S(2)=\tan^{-1}2+\tan^{-1}3-\dfrac{\pi}{4}$, which is **(C)**.

  As $n\to\infty$, $\tan^{-1}n\to\dfrac{\pi}{2}$ and $\tan^{-1}(n+1)\to\dfrac{\pi}{2}$, so
  $$\lim_{n\to\infty}S(n)=\frac{\pi}{2}+\frac{\pi}{2}-\frac{\pi}{4}=\frac{3\pi}{4},$$
  giving **(D)**; hence **(B)** ($\pi/4$) is false.

  Correct options: **(A), (C), (D)**.

wrong_paths:
  - path: "Student tries $\\tan^{-1}\\dfrac{2}{k^{2}}=\\tan^{-1}(k+1)-\\tan^{-1}(k-1)$ but telescopes as if the step were $1$, getting $S(n)=\\tan^{-1}(n+1)-\\tan^{-1}0=\\tan^{-1}(n+1)$, so the limit is $\\pi/2$. They reject (A) and (D) and may pick (B) as the 'standard $\\pi/4$ telescoping limit'."
    landed_on_option: "(B)"
    diagnosis: "TRAP-PARTIAL: incomplete recognition that the difference is over indices $k-1$ and $k+1$, not $k$ and $k+1$; only odd or only even boundary terms survive in the correct telescoping."
