  - path: "Solver forgets the upper-bound constraint $u\\le 1$ and only enforces $u\\ge -1$ (or vice versa), or confuses the rational expression's domain ($x\\ne 0$) with the arcsin domain. They write $D=[-1,1]\\setminus\\{0\\}$ and mark (A)."
    landed_on_option: "A"
    diagnosis: "Domain-of-composition error: arcsin's bracket condition not solved; rational-function domain mistaken for full domain."
  - path: "Solver correctly computes $D=[-1,-1/\\sqrt3]\\cup[1/\\sqrt3,1]$ and notices vertical tangents at the outer endpoints $x=\\pm 1$ only, missing the inner endpoints $\\pm 1/\\sqrt3$. Concludes that the only non-diff points are $\\pm 1$, so the count is $2$ and marks (B) and (C)."
    landed_on_option: "C (along with B)"
    diagnosis: "Edge-case omission: forgets inner endpoints of a disjoint-interval domain as additional non-diff sites."
  - path: "Solver finds the domain and the four critical $x$-values but argues that $f$ is non-differentiable only at the interior-style points $\\pm 1/\\sqrt3$ (treating $\\pm 1$ as endpoints of the global $[-1,1]$ where 'differentiability is not even defined'). Marks only (D)."
    landed_on_option: "D only"
    diagnosis: "Mishandling of one-sided differentiability at boundary points of $D$; vertical-tangent obstruction overlooked at $\\pm 1$."

review_notes: |
  Classic JEE multi-correct on $\sin^{-1}$ of a rational expression. The crux is two-fold:
  (i) correctly solving the bracket inequality to land on the disconnected domain, and
  (ii) recognising that ALL four boundary points of $D$ are non-differentiable due to vertical tangents from $1-u^2\to 0$.
  Distractor (C) is the cleanest trap: most students will see only the outer pair $\pm 1$ or only the inner pair $\pm 1/\sqrt3$.
