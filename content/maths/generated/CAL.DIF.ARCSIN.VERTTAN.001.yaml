statement: |
  Let $f(x)=\sin^{-1}\!\left(\dfrac{2x^2-1}{x^2}\right)$ with natural domain $D$. Which of the following is/are correct?

  (A) $D=[-1,1]\setminus\{0\}$

  (B) $f$ is non-differentiable at $x=\pm 1$

  (C) The number of points in $D$ where $f$ is non-differentiable equals $2$

  (D) $f$ is non-differentiable at $x=\pm 1/\sqrt{3}$

answer:
  type: MCQ-MC
  correct_options: [B, D]

solution: |
  **Domain.** $\sin^{-1}$ requires $-1\le \dfrac{2x^2-1}{x^2}\le 1$, i.e.\ $-1\le 2-\dfrac{1}{x^2}\le 1$, equivalently
  $$1\le \dfrac{1}{x^2}\le 3 \iff \tfrac{1}{3}\le x^2\le 1.$$
  Hence $D=[-1,-1/\sqrt 3]\cup[1/\sqrt 3,1]$, not $[-1,1]\setminus\{0\}$. So **(A) is false**.

  **Differentiability.** Write $u(x)=2-1/x^2$, so $u'(x)=2/x^3$ and
  $$f'(x)=\dfrac{u'(x)}{\sqrt{1-u(x)^2}}=\dfrac{2/x^3}{\sqrt{1-(2-1/x^2)^2}}.$$
  The radicand $1-u^2$ vanishes precisely when $u=\pm 1$, i.e.\ $x^2=1$ (giving $u=1$) and $x^2=1/3$ (giving $u=-1$). At each of these four boundary points $x=\pm 1,\ \pm 1/\sqrt 3$ we have $|f'(x)|\to\infty$, i.e.\ a vertical tangent, so $f$ is non-differentiable there.

  Therefore **(B) true**, **(D) true**, and the total count is $4$, not $2$, so **(C) false**.

  **Correct options: (B), (D).**

