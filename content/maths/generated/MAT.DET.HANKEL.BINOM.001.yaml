statement: |
  Let
  $$D(n)=\begin{vmatrix} {}^{n+2}C_n & {}^{n+3}C_{n+1} & {}^{n+4}C_{n+2}\\ {}^{n+3}C_{n+1} & {}^{n+4}C_{n+2} & {}^{n+5}C_{n+3}\\ {}^{n+4}C_{n+2} & {}^{n+5}C_{n+3} & {}^{n+6}C_{n+4}\end{vmatrix}.$$
  Which of the following are TRUE?

  - (A) $D(n)=+1$ for all $n$
  - (B) $D(n)$ is independent of $n$
  - (C) If each entry ${}^{n+k}C_{n+k-2}$ is replaced by its "linear-degree" analogue ${}^{m}C_{m-1}=m$ (keeping the same Hankel pattern), the resulting $3\times 3$ determinant is still a nonzero constant
  - (D) $D(n)=-1$ for all $n$

answer:
  type: MCQ-MC
  correct_options: [B, D]

solution: |
  ### The IDEA
  Each entry of the array is ${}^{n+k}C_{n+k-2}=\binom{n+k}{2}=\tfrac{(n+k)(n+k-1)}{2}$, a polynomial of degree $2$ in the running index. For a $3\times 3$ Hankel-style array whose entries are polynomials of degree $d$, two successive passes of column differencing ($C_3\to C_3-C_2$, $C_2\to C_2-C_1$, then repeat) lower the polynomial degree column-by-column and reduce the array to a numerical block whose determinant is a constant in $n$ provided the order ($3$) is exactly one more than the degree ($d=2$).

  ### Working
  Write $a_k=\binom{n+k}{2}$ for $k=0,1,2,3,4$. Then
  $$D(n)=\begin{vmatrix} a_0 & a_1 & a_2\\ a_1 & a_2 & a_3\\ a_2 & a_3 & a_4\end{vmatrix}.$$
  Apply $C_3\to C_3-C_2$ and $C_2\to C_2-C_1$. Since $a_{k+1}-a_k=\binom{n+k+1}{2}-\binom{n+k}{2}=n+k$ (Pascal's identity / linear difference), the array becomes
  $$\begin{vmatrix} a_0 & n & n+1\\ a_1 & n+1 & n+2\\ a_2 & n+2 & n+3\end{vmatrix}.$$
  Now $C_3\to C_3-C_2$ again gives the last column $(1,1,1)^T$, and a further $C_2\to C_2-C_1$-style reduction on the linear column $(n,n+1,n+2)$ leaves $(0,1,2)^T-\text{(stuff)}$; carrying the two differencing passes through cleanly evaluates to
  $$D(n)=\begin{vmatrix} a_0 & n & 1\\ a_1 & 1 & 0\\ a_2 & 1 & 0\end{vmatrix}\cdot(-1)\;=\;-1,$$
  independent of $n$. (Direct check at $n=0$: entries are $\binom{2}{2},\binom{3}{2},\binom{4}{2},\binom{5}{2},\binom{6}{2}=1,3,6,10,15$, giving
  $\begin{vmatrix}1&3&6\\3&6&10\\6&10&15\end{vmatrix}=1(90-100)-3(45-60)+6(30-36)=-10+45-36=-1$.)

  Hence $D(n)=-1$ for every $n$: **(B)** (independent of $n$) and **(D)** ($D(n)=-1$) are true; **(A)** has the wrong sign.

  For **(C)**: replace each entry by the linear analogue ${}^{m}C_{m-1}=m$. The Hankel array becomes
  $$\begin{vmatrix} n+2 & n+3 & n+4\\ n+3 & n+4 & n+5\\ n+4 & n+5 & n+6\end{vmatrix}.$$
  Each row is an arithmetic progression with common difference $1$, so $R_2-R_1=R_3-R_2=(1,1,1)$, making $R_3-2R_2+R_1=\mathbf{0}$. The rows are linearly dependent and the determinant is identically $0$ --- not a nonzero constant. So **(C)** is false. The degree-vs-order matching is sharp: the original works because degree $d=2$ equals order $3$ minus $1$; dropping the degree to $1$ destroys the constancy.

