    diagnosis: "Misses the degree-order matching. A $3\\times 3$ Hankel of degree-$d$ polynomials is a (nonzero) constant only when $d=2$; for $d=1$ the three rows of arithmetic progressions are affinely dependent and the determinant is $0$. This is the headline trap."
  - path: "Computes $D(0)=-1$ but assumes the value drifts with $n$ (since entries grow); picks only (D) (or only the numerical case) and rejects (B)."
