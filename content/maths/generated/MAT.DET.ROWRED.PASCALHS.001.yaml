statement: |
  For each integer $n \geq 3$, define the $3\times 3$ matrix
  $$M(n) \;=\; \begin{pmatrix} \binom{n}{1} & \binom{n}{2} & \binom{n}{3} \\ \binom{n+1}{1} & \binom{n+1}{2} & \binom{n+1}{3} \\ \binom{n+2}{1} & \binom{n+2}{2} & \binom{n+2}{3} \end{pmatrix}.$$
  Which of the following statements is/are TRUE?

  (A) $\det M(n) = \binom{n+2}{3}$ for every $n \geq 3$.

  (B) $\operatorname{trace} M(n) = \binom{n+3}{3} - 1$ for every $n \geq 3$.

  (C) The sum of the nine entries of $M(n)$ equals $\binom{n+3}{4}$ for every $n \geq 3$.

  (D) $M(n)$ is singular for some integer $n \geq 3$.

answer:
  type: MCQ-MC
  correct_options: [A, B]

solution: |
  ### The IDEA
  When successive rows of a matrix are binomial coefficients $\binom{n+i}{r}$ with $i$ shifting by $1$, the Pascal identity $\binom{n+1}{r}-\binom{n}{r}=\binom{n}{r-1}$ converts row differences into index-shifts. Iterating produces a near-triangular matrix whose determinant collapses by direct cofactor expansion. The complementary "sum-of-entries" probe is settled by the hockey-stick identity column-by-column.

  ### Working
  Perform $R_3 \leftarrow R_3 - R_2$ and then $R_2 \leftarrow R_2 - R_1$. By Pascal's rule, each row entry $\binom{n+1}{r}-\binom{n}{r}$ becomes $\binom{n}{r-1}$:
  $$M(n) \longrightarrow \begin{pmatrix} \binom{n}{1} & \binom{n}{2} & \binom{n}{3} \\ \binom{n}{0} & \binom{n}{1} & \binom{n}{2} \\ \binom{n+1}{0} & \binom{n+1}{1} & \binom{n+1}{2} \end{pmatrix}.$$
  Apply $R_3 \leftarrow R_3 - R_2$ once more (using Pascal on the bottom row): the new third row is $\bigl(0,\ \binom{n}{0},\ \binom{n}{1}\bigr) = (0,\ 1,\ n)$.

  Expand along this row:
  $$\det M(n) \;=\; -1\cdot\Bigl[\binom{n}{1}\binom{n}{2}-\binom{n}{3}\binom{n}{0}\Bigr] + n\cdot\Bigl[\binom{n}{1}\binom{n}{1}-\binom{n}{2}\binom{n}{0}\Bigr],$$
  and after algebraic simplification
  $$\det M(n) \;=\; \frac{n(n+1)(n+2)}{6} \;=\; \binom{n+2}{3}.$$
  Sanity check $n=3$: $\det = 10 = \binom{5}{3}$. **(A) TRUE.** Since $\binom{n+2}{3} \geq 10 > 0$ for $n \geq 3$, $M(n)$ is **never** singular: **(D) FALSE.**

  For the trace,
  $$\operatorname{tr} M(n) \;=\; \binom{n}{1}+\binom{n+1}{2}+\binom{n+2}{3}.$$
  Unfold $\binom{n+3}{3}$ by Pascal:
  $$\binom{n+3}{3}=\binom{n+2}{3}+\binom{n+2}{2}=\binom{n+2}{3}+\binom{n+1}{2}+\binom{n+1}{1} = \binom{n+2}{3}+\binom{n+1}{2}+\binom{n}{1}+1.$$
  Hence $\operatorname{tr} M(n) = \binom{n+3}{3}-1$. **(B) TRUE.**

  For (C), column $j$ of $M(n)$ contains $\binom{n}{j},\binom{n+1}{j},\binom{n+2}{j}$, and by the hockey-stick identity (forward form),
  $$\sum_{i=0}^{2}\binom{n+i}{j} \;=\; \binom{n+3}{j+1} - \binom{n}{j+1}.$$
  Summing over $j=1,2,3$ gives the total entry sum
  $$\sum_{j=1}^{3}\left[\binom{n+3}{j+1}-\binom{n}{j+1}\right].$$
  At $n=3$: $\bigl(\binom{6}{2}+\binom{6}{3}+\binom{6}{4}\bigr) - \bigl(\binom{3}{2}+\binom{3}{3}+0\bigr) = (15+20+15)-(3+1) = 46$, whereas $\binom{n+3}{4}=\binom{6}{4}=15$. **(C) FALSE.**

  ### Answer
  Correct options: **(A), (B)**.

wrong_paths:
  - path: "Confuses determinant with a Pascal-style 'column hockey-stick' total, claiming the sum of entries collapses to a single binomial $\\binom{n+3}{4}$."
    landed_on_option: [C]
    diagnosis: "Treats the row-sum hockey-stick (which gives $\\binom{n+3}{j+1}-\\binom{n}{j+1}$ per column) as if the $\\binom{n}{j+1}$ correction term vanished, collapsing to $\\binom{n+3}{4}$ by analogy with the single-column case."
  - path: "Believes a binomial matrix with linearly-growing index shift must become singular for small $n$ since rows 'look close to dependent'."
    landed_on_option: [D]
    diagnosis: "Confuses 'rows differ by a Pascal shift' with 'rows are linearly dependent'; ignores that Pascal-shift rows are linearly independent (the row-reduced bottom row $(0,1,n)$ has a nonzero leading nonzero entry)."
  - path: "Computes $\\det$ correctly for $n=3$ then assumes (B) must also hold by symmetry without verifying the hockey-stick unfolding for the trace."
    landed_on_option: [A]
    diagnosis: "Stops after confirming (A) (since the header says 'one or more correct'); partial-marking trap that costs the (B) tick."

