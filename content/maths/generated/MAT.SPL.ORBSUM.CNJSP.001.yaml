statement: |
  Let $Q_1, Q_2, \ldots, Q_{24}$ denote all $24$ permutation matrices of order $4$ — i.e. the matrices obtained by permuting the rows of the $4 \times 4$ identity in every possible way. Let
  $$
  N = \begin{bmatrix}
    1 & 2 & 3 & 4 \\
    2 & 0 & 1 & 0 \\
    3 & 1 & 0 & 2 \\
    4 & 0 & 2 & 1
  \end{bmatrix}
  $$
  and define $\displaystyle Y = \sum_{k=1}^{24} Q_k\, N\, Q_k^{T}$, where $Q_k^{T}$ denotes the transpose of $Q_k$.

  Then which of the following is/are correct?

  - (A) $Y \begin{bmatrix} 1 \\ 1 \\ 1 \\ 1 \end{bmatrix} = 156 \begin{bmatrix} 1 \\ 1 \\ 1 \\ 1 \end{bmatrix}$
  - (B) $Y$ is a symmetric matrix
  - (C) The sum of diagonal entries of $Y$ is $48$
  - (D) $Y - 156\,I$ is an invertible matrix

answer:
  type: MCQ-MC
  correct_options: [A, B, C]

solution: |
  ### The IDEA
  Each $Q_k$ is a permutation matrix, so $Q_k^{T} = Q_k^{-1}$. The map $N \mapsto Q_k N Q_k^{T}$ permutes the rows and columns of $N$ by the same permutation $\sigma_k \in S_4$. Summing over all of $S_4$ therefore averages $N$'s entries over the $S_4$-orbits in the index set, of which there are only two — the diagonal and the off-diagonal.

  ### Working
  Write $Y_{ij} = \displaystyle\sum_{\sigma \in S_4} N_{\sigma(i),\, \sigma(j)}$.

  **Diagonal ($i = j$):** as $\sigma$ ranges over $S_4$, the value $\sigma(i)$ takes each of $1,2,3,4$ exactly $|S_4| / 4 = 6$ times. So
  $$Y_{ii} = 6\,(N_{11} + N_{22} + N_{33} + N_{44}) = 6 \cdot (1 + 0 + 0 + 1) = 12.$$

  **Off-diagonal ($i \ne j$):** as $\sigma$ ranges over $S_4$, the ordered pair $(\sigma(i), \sigma(j))$ takes each of the $4 \cdot 3 = 12$ ordered pairs $(a, b)$ with $a \ne b$ exactly $|S_4| / 12 = 2$ times. So
  $$Y_{ij} = 2 \cdot \big(\text{sum of off-diagonal entries of } N\big) = 2 \cdot (2+3+4 + 2+1+0 + 3+1+2 + 4+0+2) = 2 \cdot 24 = 48.$$

  Hence $Y$ has every diagonal entry equal to $12$ and every off-diagonal entry equal to $48$.

  ### Verifying each option
  - **(A)** $Y \cdot [1,1,1,1]^{T} = [12 + 3 \cdot 48,\,\ldots]^{T} = 156 \cdot [1,1,1,1]^{T}$. ✅
  - **(B)** By construction $Y_{ij} = Y_{ji}$ (all diagonals equal, all off-diagonals equal). ✅
  - **(C)** Trace $= 4 \cdot 12 = 48$. ✅
  - **(D)** From (A), $(Y - 156\,I)\,[1,1,1,1]^{T} = 0$. A non-zero null-space vector ⇒ singular ⇒ not invertible. ❌

  No machinery outside JEE syllabus was used.

