    landed_on_option: "Wrong on A and C; possibly still picks B."
    diagnosis: "Failure to generalize the orbit-frequency counting from S_3 to S_n: the count is |S_n|/n = (n-1)! for diagonals, |S_n|/[n(n-1)] = (n-2)! for off-diagonals."

