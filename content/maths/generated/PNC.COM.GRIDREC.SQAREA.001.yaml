statement: |
  On an $8\times 8$ chessboard, consider the $9$ horizontal and $9$ vertical grid lines. A rectangle is determined by choosing $2$ horizontal and $2$ vertical lines. The number of such rectangles whose area, measured in unit squares, is a perfect square equals ______.

answer:
  type: NUM-INT
  value: 298

solution: |
  ### The IDEA
  A rectangle of width $w$ and height $h$ (with $w,h\in\{1,\dots,8\}$) can be placed on the $8\times 8$ board in $(9-w)(9-h)$ positions. So the count of rectangles with a given $(w,h)$ shape is the product $(9-w)(9-h)$. We sum this product over all $(w,h)$ for which the area $wh$ is a perfect square.

  ### Working
  List all ordered pairs $(w,h)$ with $1\le w,h\le 8$ and $wh$ a perfect square.

  **(i) $w=h$ (the square sub-boards):** $(1,1),(2,2),\dots,(8,8)$.
  Contribution: $\displaystyle\sum_{k=1}^{8}(9-k)^2 = 8^2+7^2+\cdots+1^2 = 204$.

  **(ii) $w\ne h$ with $wh$ a non-trivial square:** within $\{1,\dots,8\}$ the unordered pairs are
  $$\{1,4\},\ \{2,8\},\ \{4,9\text{ (out)}\},\ \{1,9\text{ (out)}\},\ \{1,16\text{ (out)}\}.$$
  So the only valid unordered pairs are $\{1,4\}$ (area $4$) and $\{2,8\}$ (area $16$).

  Each unordered pair gives two ordered pairs $(w,h)$.
  - $\{1,4\}$: $(1,4)$ contributes $(9-1)(9-4)=8\cdot 5=40$; $(4,1)$ contributes $5\cdot 8=40$. Total $80$.
  - $\{2,8\}$: $(2,8)$ contributes $7\cdot 1=7$; $(8,2)$ contributes $1\cdot 7=7$. Total $14$.

  Non-square-shape contribution: $80+14 = 94$.

  **Grand total:** $204 + 94 = \boxed{298}$.

wrong_paths:
