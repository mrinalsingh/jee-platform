  NV with answer 298. New axis-3 IDEA code 'GRIDREC' (grid rectangle counting by shape multiplicity) and axis-4 SUB-IDEA 'SQAREA' (perfect-square-area constraint) introduced — taxonomy extension required. T3 because the placement-multiplicity weighting (9-w)(9-h) is a standard PnC trick, but the area=perfect-square enumeration (including the 1x4 and 2x8 shapes besides w=h) is the JEE-distinguishing twist. Trap is TRAP-PARTIAL: the 'how many squares on an n x n board' result 204 is the canonical wrong answer.
