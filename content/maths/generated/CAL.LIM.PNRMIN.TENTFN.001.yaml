statement: |
  $\psi(a)=\displaystyle\lim_{n\to\infty}\big(|a|^{-n}+|a-2|^{-n}\big)^{-1/n}$, with $\psi(0)=\psi(2)=0$. Which of the following are correct?

  - (A) $\displaystyle\int_0^3 \psi(a)\,da=\frac{3}{2}$
  - (B) $\psi(a)=\big|\,|a-1|-1\,\big|$ for every $a$
  - (C) the region bounded by $y=\psi(a)$ and the upper half of $(a-1)^2+y^2=1$ has area $\dfrac{\pi}{2}$
  - (D) $\displaystyle\int_0^2 a\,\psi(a)\,da=1$

answer:
  type: MCQ-MC
  correct_options: [A, B, D]

solution: |
  ### The IDEA
  For positive reals $x,y$, the $p$-norm limit $\lim_{n\to\infty}(x^{-n}+y^{-n})^{-1/n}=\min(x,y)$. Applying this with $x=|a|$, $y=|a-2|$ collapses $\psi$ to a familiar tent function, after which every option reduces to a standard area / integral computation.

  ### Working
  By the $p$-norm-to-min limit, $\psi(a)=\min(|a|,|a-2|)$ for $a\notin\{0,2\}$, and the value $0$ is consistent at the endpoints. A direct case split gives
  $$\psi(a)=\big|\,|a-1|-1\,\big|,$$
  a tent through $(0,0),(1,1),(2,0)$, and $\psi(a)=|a-1|-1$ outside $[0,2]$ (in particular $\psi(a)=a-2$ on $[2,3]$). This is option **(B)**.

  **(A)** $\displaystyle\int_0^3\psi=\underbrace{\int_0^2\psi}_{\text{tent area}=1}+\underbrace{\int_2^3(a-2)\,da}_{=1/2}=\tfrac32.$ True.

  **(D)** $\displaystyle\int_0^2 a\,\psi(a)\,da=\int_0^1 a\cdot a\,da+\int_1^2 a(2-a)\,da=\tfrac13+\big[a^2-\tfrac{a^3}{3}\big]_1^2=\tfrac13+\tfrac23=1.$ True.

  **(C)** The upper semicircle $(a-1)^2+y^2=1$, $y\ge 0$, has area $\tfrac{\pi}{2}$; the tent (lying entirely below the semicircle on $[0,2]$ since $\sqrt{1-(a-1)^2}\ge 1-|a-1|=\psi(a)$) has area $1$. The region between them is $\tfrac{\pi}{2}-1\neq\tfrac{\pi}{2}$. False.

  Correct options: **(A), (B), (D)**.

wrong_paths:
