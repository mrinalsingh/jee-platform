    landed_on_option: "Rejects (B); may also mis-evaluate (A) and (D) and pick only (C)."
    diagnosis: "Confusing $(x^{-n}+y^{-n})^{-1/n}\\to\\min$ with $(x^n+y^n)^{1/n}\\to\\max$. TRAP-PARTIAL: a correct identity used in the wrong direction."
  - path: "Reads option (C) as 'area enclosed by the two curves' and substitutes the area of the semicircle directly, $\\tfrac{\\pi}{2}$, without subtracting the tent area $1$."
    landed_on_option: "(C)"
    diagnosis: "Skipping the subtraction step — classic TRAP-PARTIAL where the student conflates the bounding region's area with the area of one of its boundaries."
  - path: "On (D), forgets the absolute value and writes $\\psi(a)=a-1$ on $[1,2]$ instead of $2-a$, giving $\\int_1^2 a(a-1)\\,da=\\tfrac56$ and total $\\tfrac76\\ne 1$."
    landed_on_option: "Rejects (D)."
    diagnosis: "Mis-resolving the nested absolute value $||a-1|-1|$ on the right half. TRAP-EDGE on the piecewise boundary at $a=1$."
  - path: "On (A), integrates only over $[0,2]$ (the visible tent), getting $1$ instead of $\\tfrac32$."
    landed_on_option: "Rejects (A)."
    diagnosis: "Truncating the domain of integration; misses that $\\psi$ extends as $a-2$ on $[2,3]$. TRAP-PARTIAL on domain."

review_notes: |
  Multi-correct calculus problem fusing the $p$-norm-to-min limit identity with piecewise-linear integration and a planar-area comparison against a semicircle. Difficulty T4: the limit step is non-standard (recognising $(x^{-n}+y^{-n})^{-1/n}\to\min$), then three independent computations (a piecewise integral, a moment integral, a region-area comparison) must each be done cleanly. Option (C) is the headline distractor (area of bounding curve ≠ area of bounded region). New taxonomy codes proposed: CAL.LIM idea PNRMIN ("p-norm-to-min/max limit") and sub-idea TENTFN ("resolves to a tent / piecewise-linear absolute-value function"). Surface SURF-FUNC because the question is built around analysing a function defined by a limit; trap TRAP-PARTIAL since each false option corresponds to a correct sub-computation used incompletely.
