statement: |
  Let $\mathbf a=(1,2,2)$, $\mathbf b=(2,-2,1)$, $\mathbf c=(2,1,-2)$, and let $P$ be the $3\times3$ matrix whose rows are $\mathbf a,\mathbf b,\mathbf c$ (in that order). Which of the following statements is/are correct?

  - (A) $P^2=I$
  - (B) the projection of $\mathbf a$ onto $\mathbf b$ has length $3$
  - (C) $[\mathbf a\ \mathbf b\ \mathbf c]=27$
  - (D) $\operatorname{adj}(P)=3P^{\mathsf T}$

answer:
  type: MCQ-MC
  correct_options: [C, D]

solution: |
  ### The IDEA
  If the rows of a square matrix $P$ are mutually orthogonal vectors each of length $k$, then $PP^{\mathsf T}=k^{2}I$, so $\det P=\pm k^{n}$ and $P^{-1}=k^{-2}P^{\mathsf T}$, which forces $\operatorname{adj}(P)=\det(P)\,P^{-1}=\pm k^{\,n-2}P^{\mathsf T}$. The rows being orthonormal (length $1$) is what makes $P$ an involution-like orthogonal matrix; with length $k\ne 1$ the scaling factor $k^{2}$ never goes away.

  ### Working
  Compute the dot products:
  $$\mathbf a\cdot\mathbf b=2-4+2=0,\quad \mathbf b\cdot\mathbf c=4-2-2=0,\quad \mathbf a\cdot\mathbf c=2+2-4=0,$$
  and the squared norms $|\mathbf a|^{2}=|\mathbf b|^{2}=|\mathbf c|^{2}=1+4+4=9$. Thus the rows of $P$ are mutually orthogonal, each of length $3$, so
  $$PP^{\mathsf T}=9I.$$

  **(C)** $[\mathbf a\ \mathbf b\ \mathbf c]=\det P$. From $\det(P)\det(P^{\mathsf T})=\det(9I)=729$ we get $|\det P|=27$. Direct expansion along row $1$ gives $\det P=1(4-1)-2(-4-2)+2(2+4)=3+12+12=27>0$, so $[\mathbf a\ \mathbf b\ \mathbf c]=27$. **True.**

  **(D)** From $PP^{\mathsf T}=9I$, $P^{-1}=\tfrac{1}{9}P^{\mathsf T}$, hence
  $$\operatorname{adj}(P)=\det(P)\,P^{-1}=27\cdot\tfrac{1}{9}P^{\mathsf T}=3P^{\mathsf T}.$$
  **True.**

  **(A)** $P^{2}=PP$. Here $P$ happens to be symmetric ($P_{ij}=P_{ji}$ from the given rows), so $P^{2}=PP^{\mathsf T}=9I\ne I$. **False.**

  **(B)** The projection length of $\mathbf a$ onto $\mathbf b$ equals $|\mathbf a\cdot\mathbf b|/|\mathbf b|=0/3=0$, not $3$. **False.**

  Correct options: **(C), (D)**.

wrong_paths:
