    landed_on_option: "A"
    diagnosis: "TRAP-PARTIAL: drops the norm-$3$ scaling. Correct identity is $PP^{\\mathsf T}=9I$, so $P^{2}=9I$, not $I$."
  - path: "Reads 'projection of $\\mathbf a$ on $\\mathbf b$' as $|\\mathbf a|\\cos\\theta$ but blindly uses $|\\mathbf a|=3$ without computing $\\cos\\theta$ (which is $0$ since $\\mathbf a\\perp\\mathbf b$)."
    landed_on_option: "B"
    diagnosis: "Skips the orthogonality check; reports the length of $\\mathbf a$ itself as the projection length."
  - path: "Computes $|\\det P|=27$ but assigns the sign as negative (e.g., orders rows as a left-handed triad mentally) and reports $[\\mathbf a\\ \\mathbf b\\ \\mathbf c]=-27$, hence rejects (C)."
    landed_on_option: "neither C nor D (picks only D, or only A,D)"
    diagnosis: "TRAP-PARTIAL: forgets to actually expand the determinant to fix the sign; the rows here form a right-handed triad."
  - path: "Uses $\\operatorname{adj}(P)=P^{-1}$ instead of $\\det(P)\\,P^{-1}$, getting $\\operatorname{adj}(P)=\\tfrac{1}{9}P^{\\mathsf T}$ and rejecting (D)."
    landed_on_option: "C only"
    diagnosis: "Standard NCERT-formula slip: forgets the $\\det(P)$ factor in $\\operatorname{adj}(P)=\\det(P)\\,P^{-1}$."

