statement: |
  Let $f:(0,\infty)\to\mathbb{R}$ be a differentiable function satisfying $f(xy)=f(x)+f(y)$ for all $x,y>0$, with $f(2)=1$. The value of $\displaystyle\sum_{k=0}^{10}\binom{10}{k}\,f\!\left(2^{k}\right)\,f\!\left(2^{\,10-k}\right)$ equals \underline{\hspace{2.2cm}}.

answer:
  type: NUM-INT
  value: 23040

solution: |
  ### The IDEA
  A differentiable solution of the Cauchy multiplicative–to–additive equation $f(xy)=f(x)+f(y)$ on $(0,\infty)$ must be $f(x)=c\ln x$; the normalisation pins down $c$. With $f(2^k)=k$, the sum collapses to the weighted binomial identity $\sum_{k=0}^{n}\binom{n}{k}k(n-k)=n(n-1)2^{n-2}$.

  ### Working
  Differentiating $f(xy)=f(x)+f(y)$ w.r.t. $y$ and setting $y=1$ gives $xf'(x)=f'(1)$, so $f'(x)=c/x$ with $c=f'(1)$, hence $f(x)=c\ln x$ (the constant of integration vanishes since $f(1)=0$ from the functional equation). $f(2)=1$ forces $c=1/\ln 2$, so $f=\log_2$ and $f(2^k)=k$.

  The sum becomes
  $$S=\sum_{k=0}^{10}\binom{10}{k}\,k\,(10-k).$$
  Use $\sum_{k=0}^{n}k\binom{n}{k}=n\,2^{n-1}$ and $\sum_{k=0}^{n}k^2\binom{n}{k}=n(n+1)2^{n-2}$:
  $$S=10\sum_{k}k\binom{10}{k}-\sum_{k}k^2\binom{10}{k}=10\cdot(10\cdot 2^{9})-(10\cdot 11\cdot 2^{8})=51200-28160=23040.$$
  Equivalently, $\sum_{k=0}^{n}\binom{n}{k}k(n-k)=n(n-1)2^{n-2}$, giving $10\cdot 9\cdot 2^{8}=23040$.

