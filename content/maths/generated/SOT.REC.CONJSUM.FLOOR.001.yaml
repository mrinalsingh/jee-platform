statement: |
  Let $f_n=(5+2\sqrt{6})^{\,n}+(5-2\sqrt{6})^{\,n}$ for $n\ge 1$. Which of the following is/are TRUE?

  - (A) $f_n$ is an even integer for every $n\ge 1$.
  - (B) $\big\lfloor (5+2\sqrt{6})^{\,n}\big\rfloor = f_n-1$ for every $n\ge 1$.
  - (C) $f_n$ is divisible by $4$ for at least one $n\ge 1$.
  - (D) $\{(5+2\sqrt{6})^{\,n}\}\to 1$ as $n\to\infty$, where $\{\cdot\}$ denotes the fractional part.

answer:
  type: MCQ-MC
  correct_options: [A, B, D]

solution: |
  ### The IDEA
  If $\alpha,\beta$ are conjugate surds with $\alpha+\beta\in\mathbb{Z}$, $\alpha\beta\in\mathbb{Z}$, then $f_n=\alpha^n+\beta^n$ satisfies a linear recurrence with integer coefficients, hence is itself an integer. When additionally $0<\beta<1$, the fractional part of $\alpha^n$ equals $1-\beta^n$, so $\lfloor\alpha^n\rfloor=f_n-1$ and $\{\alpha^n\}\to 1$.

  ### Working
  Let $\alpha=5+2\sqrt{6}$, $\beta=5-2\sqrt{6}$. Then
  $$\alpha+\beta=10,\qquad \alpha\beta=25-24=1,\qquad 0<\beta<1.$$
  So $f_n=\alpha^n+\beta^n$ satisfies
  $$f_n=10\,f_{n-1}-f_{n-2},\qquad f_0=2,\ f_1=10.$$
  By induction $f_n\in\mathbb{Z}$ and parity: $f_n\equiv 10f_{n-1}-f_{n-2}\equiv -f_{n-2}\pmod 2$, and $f_0,f_1$ are even, so every $f_n$ is even. Hence **(A)** is true.

  Since $0<\beta^n<1$,
  $$\alpha^n=f_n-\beta^n\in(f_n-1,\ f_n),$$
  so $\lfloor\alpha^n\rfloor=f_n-1$. Hence **(B)** is true, and
  $$\{\alpha^n\}=\alpha^n-(f_n-1)=1-\beta^n\to 1\ \text{as}\ n\to\infty,$$
  so **(D)** is true.

  For **(C)**: reduce the recurrence mod $4$. We have $f_n\equiv 10f_{n-1}-f_{n-2}\equiv 2f_{n-1}-f_{n-2}\pmod 4$. With $f_0\equiv 2,\ f_1\equiv 2$:
  $f_2\equiv 2\cdot 2-2=2$, $f_3\equiv 2\cdot 2-2=2$, ... By induction $f_n\equiv 2\pmod 4$ for all $n\ge 0$. So $f_n$ is never divisible by $4$. **(C)** is false.

  Correct: **(A), (B), (D)**.

