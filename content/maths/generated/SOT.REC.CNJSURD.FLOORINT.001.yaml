statement: |
  Let $a_n=(3+2\sqrt{2})^{n}+(3-2\sqrt{2})^{n}$ for $n\ge 0$. Note that $0<3-2\sqrt{2}<1$. Which of the following statement(s) is/are correct?

  - (A) $4\mid a_n$ for all $n\ge 1$
  - (B) $a_n=6a_{n-1}-a_{n-2}$ for $n\ge 2$, with $a_0=2,\ a_1=6$
  - (C) $\big\lfloor (3+2\sqrt{2})^{4}\big\rfloor=1153$
  - (D) $a_n$ is irrational for some $n\ge 1$

answer:
  type: MCQ-MC
  correct_options: [B, C]

solution: |
  ### The IDEA
  If $\alpha,\beta$ are roots of $t^2-pt+q=0$, then $s_n=\alpha^n+\beta^n$ satisfies the Newton-type linear recurrence $s_n=p\,s_{n-1}-q\,s_{n-2}$ with $s_0=2,\ s_1=p$. In particular $s_n\in\mathbb{Z}$ whenever $p,q\in\mathbb{Z}$. When one of $\alpha,\beta$ lies in $(0,1)$, the integer $s_n$ is just the other power's floor plus a tiny correction, giving exact floor values for high powers of the larger conjugate.

  ### Working
  Set $\alpha=3+2\sqrt{2},\ \beta=3-2\sqrt{2}$. Then $\alpha+\beta=6,\ \alpha\beta=9-8=1$, so $\alpha,\beta$ are the roots of $t^2-6t+1=0$.

  Hence $a_n=\alpha^n+\beta^n$ satisfies
  $$a_n=6a_{n-1}-a_{n-2},\qquad a_0=2,\ a_1=6,$$
  which is exactly **(B)**.

  Iterating: $a_0=2,\ a_1=6,\ a_2=34,\ a_3=198,\ a_4=1154,\dots$. All are integers, so $a_n$ is never irrational, killing **(D)**.

  Check **(A)**: $a_1=6$ is not divisible by $4$. So (A) fails.

  Check **(C)**: $0<\beta=3-2\sqrt{2}<1$, hence $0<\beta^4<1$. Since $\alpha^4+\beta^4=a_4=1154$,
  $$\alpha^4=1154-\beta^4\in(1153,1154),$$
  so $\lfloor (3+2\sqrt{2})^4\rfloor=1153$. **(C)** holds.

  Correct: **(B), (C)**.

