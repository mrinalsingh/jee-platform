  - path: "Student computes $\\alpha^4\\approx 1154$ on the calculator and reports $\\lfloor\\alpha^4\\rfloor=1154$, ignoring that $a_4=\\alpha^4+\\beta^4$ is the integer and $\\alpha^4$ sits just below it."
