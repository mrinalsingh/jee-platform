statement: |
  Fractional binomial expansions $(1+x)^{27/5}$ and $(1+x)^{20/3}$. Which of the following statements is/are correct?

  (A) For $(1+x)^{27/5}$: the first negative-coefficient term is the $8^{\text{th}}$ (i.e. $r=7$).

  (B) For $(1+x)^{20/3}$: the first negative-coefficient term is the $8^{\text{th}}$.

  (C) For $(1+x)^{27/5}$: the coefficients alternate in sign for all $r\ge 7$.

  (D) For $(1+x)^{27/5}$: exactly $7$ terms have positive coefficient.

answer:
  type: MCQ-MC
  correct_options: [A, C]

solution: |
  For the generalized binomial expansion $(1+x)^{\alpha}$ the ratio of consecutive coefficients is
  $$\frac{T_{r+1}}{T_{r}} \;=\; \frac{\alpha-r+1}{r}.$$
  This ratio is negative iff $\alpha - r + 1 < 0$, i.e. $r > \alpha + 1$, equivalently the first $r$ producing a negative coefficient is the smallest integer with $r-1 > \alpha$, i.e. $r = \lceil \alpha \rceil + 1$ when $\alpha$ is not an integer... more cleanly: the sign of $T_{r+1}$ relative to $T_r$ flips at the first $r$ for which $\alpha - r + 1 < 0$.

  **(A)** $\alpha = 27/5 = 5.4$. The factor $\alpha - r + 1$ becomes negative first at $r=7$ (since $\alpha - 7 + 1 = -0.6 < 0$ while $\alpha - 6 + 1 = 0.4 > 0$). So $T_8$ (i.e. $r=7$) is the first negative-coefficient term. **True.**

  **(B)** $\alpha = 20/3 \approx 6.67$. Check $r=7$: ratio $T_8/T_7 = (\alpha - 6)/7 = (2/3)/7 > 0$, so $T_8$ has the same sign as $T_7$ (positive). Next, $T_9/T_8 = (\alpha - 7)/8 = (-1/3)/8 < 0$, so the first sign flip is at $r=8$. The first negative coefficient is on the $9^{\text{th}}$ term, not the $8^{\text{th}}$. **False.**

  **(C)** For $\alpha = 27/5$, every ratio $T_{r+1}/T_r = (27/5 - r + 1)/r = (32/5 - r)/r$ with $r \ge 7$ has numerator $32/5 - r < 0$ (since $32/5 = 6.4$). Hence each successive ratio is negative and the signs alternate strictly from $r=7$ onward. **True.**

  **(D)** Since the signs alternate strictly from $r=7$ onward, infinitely many terms (every other one) past $r=7$ have positive coefficient, in addition to the seven positive terms $T_1,\dots,T_7$. The total positive count is not $7$. **False.**

  Hence the correct options are **(A), (C)**.

wrong_paths:
  - path: "Solver computes $\\lceil 20/3 \\rceil = 7$ and concludes by analogy with (A) that the first negative coefficient is the $8^{\\text{th}}$ term, without checking the sign of $\\alpha - r + 1$ at $r = 7$. They miss that $20/3 - 6 = 2/3 > 0$ keeps $T_8$ positive."
    landed_on_option: "B"
    diagnosis: "False analogy with (A); skips the consecutive-ratio sign check for the second exponent."
  - path: "Solver correctly identifies that signs alternate past $r=7$ for $\\alpha = 27/5$, then conflates 'alternate' with 'exactly seven positive terms followed by all-negative remainder', interpreting the expansion as a finite-like positive block of size $7$."
    landed_on_option: "D"
    diagnosis: "Confuses alternation with one-time sign change; forgets the series is infinite for non-integer $\\alpha$."
  - path: "Solver applies integer binomial intuition: 'first negative term is at $r = \\lfloor \\alpha \\rfloor + 1$' and uses $\\lfloor 20/3 \\rfloor + 1 = 7$, declaring (B) true and skipping the ratio test entirely."
    landed_on_option: "A, B"
    diagnosis: "Integer-binomial heuristic misapplied to non-integer $\\alpha$; correct on (A) by luck, wrong on (B)."

review_notes: |
  Tests the generalized (fractional) binomial expansion. The trap distinguishing (A) from (B) is subtle: the standard heuristic "first negative coefficient at $r = \lceil \alpha \rceil$" fails when $\alpha - \lceil \alpha \rceil + 1$ happens to remain positive at that $r$ but flips at the next one (as for $\alpha = 20/3$). Option (D) tests whether the student grasps that the series is infinite and the signs *alternate* (not "flip once").
