  Multi-correct, Argand-plane triangle + Vieta. Key idea: equilateral $\iff (\sum z)^2=3\sum z_jz_k$, then push through Vieta. (D) is a calibrated trap exploiting the special case "centroid at origin $\Rightarrow R=|c|^{1/3}$".

