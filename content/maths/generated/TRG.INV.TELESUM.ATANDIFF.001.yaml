statement: |
  Let $S(n)=\displaystyle\sum_{k=1}^{n}\tan^{-1}\dfrac{1}{1+k+k^2}$. Which of the following is/are correct?

  - (A) $S(n)=\tan^{-1}(n+1)-\dfrac{\pi}{4}$
  - (B) $\displaystyle\lim_{n\to\infty}S(n)=\dfrac{\pi}{4}$
  - (C) $S(2)=\tan^{-1}3-\dfrac{\pi}{4}$
  - (D) $S(n)=\tan^{-1}(n)-\dfrac{\pi}{4}$

answer:
  type: MCQ-MC
  correct_options: [A, B, C]

solution: |
  ### The IDEA
  When the denominator of an $\tan^{-1}$ term factors as $1+(\text{product of two consecutive expressions})$, rewrite the numerator as their difference and use the identity $\tan^{-1}a-\tan^{-1}b=\tan^{-1}\dfrac{a-b}{1+ab}$ (valid when $ab>-1$) to telescope.

  ### Working
  Note that
  $$\dfrac{1}{1+k+k^2}=\dfrac{(k+1)-k}{1+k(k+1)},$$
  so
  $$\tan^{-1}\!\dfrac{1}{1+k+k^2}=\tan^{-1}(k+1)-\tan^{-1}(k).$$
  (Here $k(k+1)\ge 2>-1$ for $k\ge 1$, so the identity applies directly.)

  Summing from $k=1$ to $n$ telescopes:
  $$S(n)=\tan^{-1}(n+1)-\tan^{-1}(1)=\tan^{-1}(n+1)-\dfrac{\pi}{4}.$$
  This is **(A)**.

  Taking $n\to\infty$:
  $$\lim_{n\to\infty}S(n)=\dfrac{\pi}{2}-\dfrac{\pi}{4}=\dfrac{\pi}{4},$$
  so **(B)** is correct.

  At $n=2$:
  $$S(2)=\tan^{-1}3-\dfrac{\pi}{4},$$
  giving **(C)**.

  Option **(D)** drops the $+1$ inside the arctan and is false: e.g. $S(2)=\tan^{-1}3-\tfrac{\pi}{4}\neq \tan^{-1}2-\tfrac{\pi}{4}$.

wrong_paths:
  - path: "Splits as $\\tan^{-1}(k)-\\tan^{-1}(k-1)$ instead of $\\tan^{-1}(k+1)-\\tan^{-1}(k)$, getting $S(n)=\\tan^{-1}(n)-\\tan^{-1}(0)=\\tan^{-1}(n)$, then mistakenly subtracts $\\pi/4$ from one end."
    landed_on_option: "D"
    diagnosis: "Off-by-one in the telescoping reindex: the correct pairing is $(k+1,k)$, not $(k,k-1)$. TRAP-PARTIAL — the student gets the right method shape but the wrong endpoint."
  - path: "Computes $S(2)$ by plugging $n=2$ into the wrong closed form (D), getting $\\tan^{-1}2-\\pi/4$, and so rejects (C)."
    landed_on_option: "Selects A, B but rejects C"
    diagnosis: "Carries the off-by-one of (D) into the (C) check instead of computing $S(2)$ directly from the original sum $\\tan^{-1}(1/3)+\\tan^{-1}(1/7)$."
  - path: "Uses $\\tan^{-1}a+\\tan^{-1}b=\\tan^{-1}\\dfrac{a+b}{1-ab}$ on the wrong split and lands at a different closed form, then convinces themselves the limit is $\\pi/2$."
    landed_on_option: "Rejects B"
    diagnosis: "Confusion between the sum and difference identities for $\\tan^{-1}$; loses the $-\\pi/4$ shift."

review_notes: |
  Classical telescoping arctan sum (parallel to the well-known $\sum \tan^{-1}\frac{1}{k^2+k+1}$ identity). Single-step mechanical recognition once the $(k+1)-k$ rewrite is seen; difficulty sits at T2 because the trap option (D) is engineered to catch the off-by-one student. New axis-3 code TELESUM = "telescoping inverse-trig sum" and axis-4 ATANDIFF = "use $\tan^{-1}a-\tan^{-1}b$ identity on $1+k(k+1)$ denominators" are proposed; both are reusable across the family of $\sum \tan^{-1}\frac{c}{1+f(k)f(k+1)}$ problems.
