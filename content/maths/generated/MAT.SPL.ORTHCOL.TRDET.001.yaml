statement: |
  Let
  $$A=\begin{bmatrix}0 & 2y & z\\ x & y & -z\\ x & -y & z\end{bmatrix}$$
  with $x,y,z>0$ and $A^{T}A=I$. Which of the following statement(s) is/are TRUE?

  (A) trace of $A$ exceeds $1$

  (B) $x^{2}+y^{2}+z^{2}=1$

  (C) $A$ is an orientation-preserving rotation

  (D) $xyz=\dfrac{1}{6}$

answer:
  type: MCQ-MC
  correct_options: [B, D]

solution: |
  ### The IDEA
  $A^{T}A=I$ is equivalent to saying the *columns* of $A$ are orthonormal. So we
  read off three norm equations (one per column) and three orthogonality equations
  (one per pair). The norm equations pin down $x^{2},y^{2},z^{2}$ immediately; the
  orthogonality equations turn out to be automatic. Then trace and determinant
  fall out by direct computation.

  ### Working
  **Column norms.** Writing $\operatorname{col}_j$ for the $j$-th column,
  $$\|\operatorname{col}_1\|^2 = 0+x^{2}+x^{2}=2x^{2}=1 \Rightarrow x^{2}=\tfrac12,$$
  $$\|\operatorname{col}_2\|^2 = (2y)^{2}+y^{2}+y^{2}=6y^{2}=1 \Rightarrow y^{2}=\tfrac16,$$
  $$\|\operatorname{col}_3\|^2 = z^{2}+z^{2}+z^{2}=3z^{2}=1 \Rightarrow z^{2}=\tfrac13.$$

  **Orthogonality (automatic).**
  $\operatorname{col}_1\!\cdot\!\operatorname{col}_2 = 0+xy-xy=0$,
  $\operatorname{col}_1\!\cdot\!\operatorname{col}_3 = 0-xz+xz=0$,
  $\operatorname{col}_2\!\cdot\!\operatorname{col}_3 = 2yz-yz-yz=0$. All zero.

  **(B).** $x^{2}+y^{2}+z^{2}=\tfrac12+\tfrac16+\tfrac13=1.$ TRUE.

  **(D).** Since $x,y,z>0$,
  $xyz=\sqrt{x^{2}y^{2}z^{2}}=\sqrt{\tfrac12\cdot\tfrac16\cdot\tfrac13}
       =\sqrt{\tfrac{1}{36}}=\tfrac16.$ TRUE.

  **(A).** $\operatorname{tr}A = 0+y+z = \tfrac{1}{\sqrt6}+\tfrac{1}{\sqrt3}
  \approx 0.408+0.577 = 0.986 < 1.$ FALSE.

  **(C).** Expanding $\det A$ along the first column (only the $(2,1)$ and $(3,1)$
  entries, both equal to $x$, contribute):
  $$\det A = -x\det\begin{bmatrix}2y & z\\ -y & z\end{bmatrix}
            + x\det\begin{bmatrix}2y & z\\ y & -z\end{bmatrix}
            = -x(2yz+yz)+x(-2yz-yz) = -6xyz = -1.$$
  So $\det A=-1$: $A$ is improper orthogonal (a reflection composed with a
  rotation), NOT orientation-preserving. FALSE.

  **Answer:** (B), (D).

wrong_paths:
  - path: "Student knows orthogonal matrices have entries bounded by $1$ in absolute value and remembers that for $SO(3)$ matrices the trace lies in $[-1,3]$; without computing, guesses trace exceeds $1$ since two diagonal entries are positive square roots."
    landed_on_option: "A"
    diagnosis: "Confuses qualitative knowledge (`trace can be large for orthogonal') with the actual numeric value $1/\\sqrt6+1/\\sqrt3\\approx 0.986$, which is just under $1$. The problem is designed so trace falls a hair below the threshold — classic partial-evaluation trap."
  - path: "Student verifies $A^{T}A=I$ and concludes $A\\in O(3)$, then equates `orthogonal' with `rotation' and ticks (C) without computing $\\det A$."
    landed_on_option: "C"
    diagnosis: "Forgets that $O(3)=SO(3)\\cup\\{$improper$\\}$; orientation-preserving requires $\\det A=+1$, not just $A^{T}A=I$. Here $\\det A=-1$, so $A$ is a reflection-rotation."
  - path: "Student computes $x^{2}=1/2,\\ y^{2}=1/6,\\ z^{2}=1/3$ correctly but forgets to take the positive square root before multiplying, writing $xyz=x^{2}\\cdot y^{2}\\cdot z^{2}=1/36$ and marks (D) false."
    landed_on_option: "Marks (D) false; ends with only (B)"
    diagnosis: "Sign/exponent slip: confuses $xyz$ with $x^{2}y^{2}z^{2}$. Since $x,y,z>0$ the correct value is $\\sqrt{1/36}=1/6$. The trap rewards students who track the `positive' hypothesis to its conclusion."

