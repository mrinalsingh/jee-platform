statement: |
  A $5$-card hand is dealt from a standard $52$-card deck. Define
  $G = \{$all four suits present in the hand$\}$, $H = \{$the hand is four-of-a-kind$\}$, $K = \{$the hand is a straight flush$\}$.
  Which of the following are correct?

  - (A) $P(G\mid K)=\dfrac{4\binom{13}{2}\binom{13}{1}^{3}}{\binom{52}{5}}$
  - (B) $P(H\mid G)=\dfrac{13\cdot 48}{4\binom{13}{1}^{4}}$
  - (C) $P(H\mid G)=\dfrac{2}{13^{3}}$
  - (D) $P(G\mid K)=0$

answer:
  type: MCQ-MC
  correct_options: [C, D]

solution: |
  ### The IDEA
  A straight flush lives entirely in one suit, so it is disjoint from "all four suits present". A four-of-a-kind always contains all four suits of its denomination, so $H\subseteq G$, and $P(H\mid G)=|H|/|G|$ where $|G|$ is computed by inclusion--exclusion on "missing suit".

  ### Working
  **Option (D).** Every straight flush uses five cards of one suit, so the hand can contain at most one suit. Hence $G\cap K=\varnothing$ and
  $$P(G\mid K)=0.$$
  This also kills (A): the expression there is nonzero, so it cannot equal $P(G\mid K)$.

  **Option (C).** Since the four cards of one denomination already exhaust all four suits, any four-of-a-kind hand automatically has all four suits represented. Thus $H\subseteq G$ and
  $$P(H\mid G)=\frac{|H|}{|G|}.$$
  Count $|H|$: choose the denomination ($13$ ways), take all $4$ cards of that denomination, then choose the $5$th card from the remaining $48$. So $|H|=13\cdot 48=624$.

  Count $|G|$ by inclusion--exclusion on the event "suit $s$ is missing":
  $$|G|=\binom{52}{5}-\binom{4}{1}\binom{39}{5}+\binom{4}{2}\binom{26}{5}-\binom{4}{3}\binom{13}{5}.$$
  Numerically $2598960-4\cdot 575757+6\cdot 65780-4\cdot 1287 = 685464$.

  Therefore
  $$P(H\mid G)=\frac{624}{685464}=\frac{2}{2197}=\frac{2}{13^{3}}.$$
  So (C) is correct.

  **Option (B).** The expression $\dfrac{13\cdot 48}{4\binom{13}{1}^{4}}=\dfrac{624}{4\cdot 13^{4}}=\dfrac{156}{13^{4}}$, which is not equal to $\dfrac{2}{13^{3}}=\dfrac{26}{13^{4}}$. So (B) is wrong (the denominator $4\cdot 13^{4}$ is a fake stand-in for $|G|$).

  **Final answer: (C), (D).**

wrong_paths:
  - path: "Computes $P(G\\mid K)$ by counting 'hands with all four suits and a straight pattern' as $4\\binom{13}{2}\\binom{13}{1}^{3}$ over $\\binom{52}{5}$, ignoring that a straight flush is single-suited."
    landed_on_option: "(A)"
    diagnosis: "Confuses unconditional probability with conditional. Once $K$ is given, the sample space is straight-flush hands only, all of which are single-suited, so $G\\cap K=\\varnothing$. TRAP-PARTIAL: student writes a plausible-looking ratio without restricting to $K$."
  - path: "Uses $|G|=4\\binom{13}{1}^{4}=4\\cdot 28561$ as the count of 'choose one suit then one card from each of four denominations', mistakenly inflating by an extra factor of $4$ for 'which suit is the doubled one'."
    landed_on_option: "(B)"
    diagnosis: "Miscounts $|G|$ as $4\\cdot 13^{4}$ instead of doing inclusion--exclusion. The factor of $4$ for the doubled suit is wrong because the $5$th card already belongs to a specific suit; no extra choice exists."
  - path: "Forgets $H\\subseteq G$ and computes $P(H\\mid G)=P(H\\cap G)/P(G)$ via $P(H\\cap G)=P(H)P(G)$ assuming independence."
    landed_on_option: "Neither (B) nor (C) — produces $P(H)\\approx 624/\\binom{52}{5}$."
    diagnosis: "Independence assumption is unjustified; $H$ and $G$ are not independent. Correct route is the containment $H\\subseteq G$."

review_notes: |
  Inspired by 0608b_Q8. Standard JEE-style multi-correct on conditional probability with poker hands. Key insights: (i) straight flush is single-suited so disjoint from "all four suits present"; (ii) four-of-a-kind is contained in "all four suits"; (iii) $|G|$ requires inclusion-exclusion on missing suits. Difficulty T3 (hard standard) — counting is routine once containment is seen, but the IE on $|G|$ and the (A)/(B) traps require care. Sub-idea code ALLSUIT proposed (new; covers "all four suits present"/full-coverage events).
