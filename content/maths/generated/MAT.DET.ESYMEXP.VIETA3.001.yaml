statement: |
  Let $a_1,a_2,a_3$ be the roots of $x^3-6x^2+11x-6=0$, and let
  $$\Delta=\begin{vmatrix} 1+a_1 & 1 & 1\\ 1 & 1+a_2 & 1\\ 1 & 1 & 1+a_3\end{vmatrix}.$$
  Which of the following statement(s) is/are CORRECT?

  - (A) $\Delta=\prod_{i=1}^{3}(1+a_i)=24$
  - (B) $\Delta=a_1a_2a_3=6$
  - (C) $\Delta=e_2+e_3$ in general (where $e_k$ is the $k$-th elementary symmetric polynomial in $a_1,a_2,a_3$)
  - (D) $\Delta=17$ for this cubic

answer:
  type: MCQ-MC
  correct_options: [C, D]

solution: |
  ### The IDEA
  A determinant of the shape "identity $+$ rank-one all-ones $+$ diagonal $a_i$" expands cleanly into elementary symmetric polynomials of the $a_i$. Combined with Vieta's formulas, the numerical value falls out without ever solving the cubic.

  ### Working
  Expand $\Delta$ along the first row, or note the cofactor structure:
  $$\Delta=(1+a_1)\big[(1+a_2)(1+a_3)-1\big]-1\big[(1+a_3)-1\big]+1\big[1-(1+a_2)\big].$$
  Simplifying,
  $$\Delta=(1+a_1)(a_2+a_3+a_2a_3)-a_3-a_2 = a_1a_2a_3+(a_1a_2+a_2a_3+a_3a_1)=e_3+e_2.$$
  Hence option (C) is correct as a general identity.

  For $x^3-6x^2+11x-6$, Vieta gives $e_1=6,\ e_2=11,\ e_3=6$, so
  $$\Delta=e_2+e_3=11+6=17,$$
  confirming option (D). (No need to identify the roots as $1,2,3$.)

  Option (A) is the value $\prod(1+a_i)=2\cdot 3\cdot 4=24$, which would be $\Delta$ only if every off-diagonal entry were $0$ — it is not. Option (B) keeps only the $e_3$ term and drops $e_2$.

wrong_paths:
  - path: "Mistakes the matrix for the diagonal matrix $\\mathrm{diag}(1+a_1,1+a_2,1+a_3)$, ignoring the off-diagonal $1$'s, and computes $\\Delta=\\prod(1+a_i)=2\\cdot 3\\cdot 4=24$."
    landed_on_option: "A"
    diagnosis: "Structural slip — student treats the determinant as a product of diagonal entries, which is valid only for triangular/diagonal matrices. This is a TRAP-PARTIAL (drops the rank-one perturbation contribution)."
  - path: "Expands correctly to $e_3+e_2$ but then conflates the result with $a_1a_2a_3$ alone (perhaps reasoning by analogy with $\\det(\\mathrm{diag}(a_i))=a_1a_2a_3$), reporting $\\Delta=e_3=6$."
    landed_on_option: "B"
    diagnosis: "Drops the $e_2$ term after the expansion, retaining only the constant-term-of-cubic contribution. Selects (B) instead of (C) and consequently misses (D)."
  - path: "Tries to find roots $1,2,3$ first, then plugs into $\\prod(1+a_i)$ getting $24$ and stops there, missing the correct expansion."
    landed_on_option: "A"
    diagnosis: "Combines the (A)-style structural error with brute-force root finding, wasting time and locking in the wrong product formula."

review_notes: |
  Clean MAT-DET item exercising the "$I+$ all-ones $+$ diag" expansion identity, then chained with Vieta. Distractors (A) and (B) are well-targeted at the two most common structural slips. Two-correct format; difficulty calibrated around T2 (standard medium — most students who set up the expansion correctly will get both right, but the partial-credit traps are real). Consider whether (C) should be tightened to "$\Delta=e_2+e_3$ where $e_k$ is the $k$-th elementary symmetric polynomial in the roots of the given cubic" to remove any ambiguity about which $e_k$.
