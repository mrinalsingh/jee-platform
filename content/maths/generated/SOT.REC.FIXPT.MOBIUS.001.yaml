    landed_on_option: "Picks D in addition to A,B,C"
    diagnosis: "FIXPT-vs-LIMIT confusion: fixed-point set $\\neq$ limit set; ignores stability of $f'$."
  - path: "Computes $a_3$ correctly but algebra-slips on the $a_4$ simplification, e.g.\\ writes $a_4=\\tfrac{2+a_1}{3+a_1}$ instead of $\\tfrac{2+a_1}{3+2a_1}$, hence rejects (B)."
    landed_on_option: "Picks only A, C"
    diagnosis: "Arithmetic slip in nested-fraction simplification."
  - path: "Solves $a^2+a-1=0$, takes the wrong-sign root $\\tfrac{-1-\\sqrt5}{2}$ and discards (C) as not matching a fixed point; doesn't see $\\tfrac{\\sqrt5-1}{2}=\\tfrac{-1+\\sqrt5}{2}$."
    landed_on_option: "Picks only A, B"
    diagnosis: "Sign/normalization slip — fails to recognize equivalent forms of the positive root."
  - path: "Iterates numerically from $a_1=1$, observes $a_n\\to0.618\\ldots\\approx 1/\\varphi$ and (correctly) rejects (D), but also rejects (C) because the student expected $\\varphi$ as the canonical golden-ratio answer."
    landed_on_option: "Picks only A, B"
    diagnosis: "Aesthetic bias toward $\\varphi$ — discards correct fixed point because its form is unfamiliar."

review_notes: |
  Recursion $a_{n+1}=1/(1+a_n)$ is a Mobius / linear-fractional iteration whose
  fixed points are the roots of $a^2+a-1=0$; the attracting one is $1/\varphi=(\sqrt5-1)/2$.
  This question tests:
    (i) symbolic orbit computation (A, B),
    (ii) fixed-point identification (C),
    (iii) distinguishing fixed-point set from limit, and golden-ratio vs its reciprocal (D — trap).
  Tagged with a NEW SOT subtopic `REC` (recursion sequences), idea `FIXPT`
  (fixed-point analysis), sub-idea `MOBIUS` (linear-fractional / Mobius recursion).
  Recommend taxonomy extension before bank-wide use.
  Trap classified as TRAP-PARTIAL: partial-credit MCQ-MC where (D) looks plausible
  and confuses $\varphi$ with $1/\varphi$.
