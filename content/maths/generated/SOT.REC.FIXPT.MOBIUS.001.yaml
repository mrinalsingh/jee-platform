statement: |
  Let $a_{n+1}=\dfrac{1}{1+a_n}$ with $a_1\in\mathbb{R}$. Which of the following is/are correct?

  (A) $a_3=\dfrac{1+a_1}{2+a_1}$

  (B) $a_4=\dfrac{2+a_1}{3+2a_1}$

  (C) A fixed point of the recursion is $\dfrac{\sqrt5-1}{2}$

  (D) If $a_1=1$, then $a_n\to\dfrac{\sqrt5+1}{2}$

answer:
  type: MCQ-MC
  correct_options: [A, B, C]

solution: |
  Compute the orbit symbolically:
  $$a_2=\frac{1}{1+a_1},\qquad a_3=\frac{1}{1+\frac{1}{1+a_1}}=\frac{1+a_1}{2+a_1}\quad\textbf{(A)},$$
  $$a_4=\frac{1}{1+\frac{1+a_1}{2+a_1}}=\frac{2+a_1}{3+2a_1}\quad\textbf{(B)}.$$
  Fixed points solve $a=\dfrac{1}{1+a}$, i.e.\ $a^2+a-1=0$, giving $a=\dfrac{-1\pm\sqrt5}{2}$.
  The positive root is $\dfrac{\sqrt5-1}{2}$ **(C)**.

  Stability: with $f(a)=\dfrac{1}{1+a}$, $f'(a)=-\dfrac{1}{(1+a)^2}$. At $a=\dfrac{\sqrt5-1}{2}$, $1+a=\dfrac{\sqrt5+1}{2}$, so $|f'|=\left(\dfrac{2}{\sqrt5+1}\right)^2=\dfrac{3-\sqrt5}{2}<1$ — attracting. The other fixed point $\dfrac{-1-\sqrt5}{2}$ is repelling. So from $a_1=1$ the orbit converges to $\dfrac{\sqrt5-1}{2}$, **not** to $\dfrac{\sqrt5+1}{2}=\varphi$. Hence **(D)** is false.

  Correct: **(A), (B), (C)**.

wrong_paths:
