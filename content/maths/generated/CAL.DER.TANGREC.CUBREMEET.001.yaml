statement: |
  $T_a$ tangent to $y=x^{3}$ at $(a,a^{3})$ meets curve again at $x=\varphi(a)$; $a_0=1,\ a_{k+1}=\varphi(a_k)$.

  - (A) $\varphi(a)=-\tfrac{a}{2}$
  - (B) $\varphi(a)=-2a$
  - (C) $\{a_k\}$ is an A.P.
  - (D) $\{a_k\}$ is a G.P. with ratio $-2$

answer:
  type: MCQ-MC
  correct_options: [B, D]

solution: |
  ### The IDEA
  For a cubic $y=x^3$, the tangent at $(a,a^3)$ meets the curve at a point whose $x$-coordinate is determined by the factorisation $(x-a)^2(x+2a)=0$: the double root sits at the contact, the simple root at $-2a$. Iterating $\varphi(a)=-2a$ from $a_0=1$ produces a geometric progression with ratio $-2$.

  ### Working
  The tangent at $(a,a^3)$ is
  $$y = a^{3} + 3a^{2}(x-a).$$
  Setting $x^{3} = a^{3} + 3a^{2}(x-a)$ gives
  $$x^{3} - 3a^{2}x + 2a^{3} = 0 \;\Longleftrightarrow\; (x-a)^{2}(x+2a)=0.$$
  The double root $x=a$ corresponds to the point of contact and the new intersection is $x=-2a$, so
  $$\varphi(a) = -2a.$$
  Thus (B) holds and (A) fails.

  Iterating $a_{k+1} = -2a_{k}$ with $a_0 = 1$ gives
  $$a_k = (-2)^{k},$$
  a geometric progression with common ratio $-2$. Hence (D) holds; (C) fails because the successive differences $1, -3, 6, -12, \dots$ are not constant.

