    diagnosis: "TRAP-PARTIAL: reciprocal-of-slope slip. Student inverts the tangent slope $3a^2$ instead of solving the cubic intersection properly."
  - path: "Correctly finds $\\varphi(a)=-2a$ and the sequence $1,-2,4,-8,\\dots$, then mistakes the alternating-sign pattern as having constant differences and ticks AP."
    landed_on_option: "C"
    diagnosis: "TRAP-PARTIAL: confuses GP with AP because consecutive terms differ in sign; fails to verify the constant-difference test."
  - path: "Sets $x^3 = a^3 + 3a^2(x-a)$ but drops the double-root factor, taking $x=a$ as the only relevant root and concluding $\\varphi(a)=a$ (fixed point)."
    landed_on_option: "none (rejects B and D)"
    diagnosis: "Misses that the contact point gives a double root; the cubic must factor as $(x-a)^2(x+2a)$, so the second intersection is $-2a$, not $a$."

