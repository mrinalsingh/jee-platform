  - NEW taxonomy needed: PRB has only PRB.COMP so far (inclusion-exclusion on event probabilities), which does not cover classical equally-likely enumeration. Proposed PRB.DSC / UNIFENUM / DETCOLLAPSE — see extension_note. If MS prefers to file this under VEC (scalar triple product) or MAT (determinant), the surface is shared but the tested IDEA is the probability enumeration, so PRB is the better TOPIC.
