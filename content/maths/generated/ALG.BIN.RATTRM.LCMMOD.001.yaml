statement: |
  Consider the binomial expansion of $\left(3^{1/4}+5^{1/6}\right)^{36}$, with general term
  $T_{r+1}=\binom{36}{r}\,3^{(36-r)/4}\,5^{r/6}$, $0\le r\le 36$. Which of the following are TRUE?

  - (A) The largest rational term occurs at $r=24$.
  - (B) The number of rational terms in the expansion is $4$.
  - (C) The sum of all rational terms equals $43\,933\,887\,305\,308$.
  - (D) $\displaystyle\sum_{r:\,T_{r+1}\in\mathbb{Q}} r \;=\; 72$.

answer:
  type: MCQ-MC
  correct_options: [B, C, D]

solution: |
  $T_{r+1}=\binom{36}{r}3^{(36-r)/4}5^{r/6}$ is rational iff both exponents are integers, i.e.
  $4\mid(36-r)$ and $6\mid r$. Since $36\equiv 0\pmod 4$, the first is $4\mid r$. Together with
  $6\mid r$ this is $\mathrm{lcm}(4,6)=12\mid r$. With $0\le r\le 36$ this gives
  $r\in\{0,12,24,36\}$.

  Hence there are $\mathbf{4}$ rational terms (B), and
  $$\sum_{r\text{ rational}} r \;=\; 0+12+24+36 \;=\; 72,$$
  giving (D).

  The four rational terms are
  $$T_{1}=3^{9}=19683,\qquad T_{13}=\binom{36}{12}3^{6}\cdot 5^{2}=22\,811\,826\,082\,500,$$
  $$T_{25}=\binom{36}{24}3^{3}\cdot 5^{4}=21\,122\,061\,187\,500,\qquad T_{37}=5^{6}=15625.$$
  Their sum is $43\,933\,887\,305\,308$, giving (C).

  For (A): compare $T_{13}$ ($r=12$) with $T_{25}$ ($r=24$). Since
  $T_{13}=22\,811\,826\,082\,500 > 21\,122\,061\,187\,500 = T_{25}$, the largest rational term is at
  $r=12$, not $r=24$. So (A) is FALSE.

  Correct options: $(B),(C),(D)$.

