statement: |
  Let $a,b,c$ be chosen independently and uniformly at random from $\{1,2,3\}$, and form the tetrahedron with vertices $O=(0,0,0)$, $(a,0,0)$, $(0,b,0)$, $(0,0,c)$, whose volume is $V=\dfrac{abc}{6}$. Which of the following are correct?

  - **(A)** $P(V\text{ is an integer})=\dfrac49$
  - **(B)** $P\!\left(V=\dfrac16\right)=\dfrac19$
  - **(C)** $P(V<1)=\dfrac13$
  - **(D)** the largest possible volume $\dfrac{27}{6}$ occurs with probability $\dfrac19$

answer:
  type: MCQ-MC
  correct_options: [A]

solution: |
  ### The IDEA
  The sample space is the $27$ equally likely ordered triples $(a,b,c)\in\{1,2,3\}^3$. Every event below is an arithmetic condition on the product $abc$ (or on $a=b=c$), so each probability is just a count of favorable triples divided by $27$. The only care needed is correct multiset-to-ordered-triple counting and the exact boundary cutoff.

  ### Working

  **(A) $V\in\mathbb{Z}$.** Since $V=\dfrac{abc}{6}$, $V\in\mathbb{Z}\iff 6\mid abc$, i.e. $abc\in\{6,12,18\}$ (the only multiples of $6$ achievable from factors in $\{1,2,3\}$, max product $27$):
  $$abc=6:\ \{1,2,3\}\to 3!=6\ \text{triples};\quad abc=12:\ \{2,2,3\}\to 3\ \text{triples};\quad abc=18:\ \{2,3,3\}\to 3\ \text{triples}.$$
  Total $6+3+3=12$, so $P(V\in\mathbb{Z})=\dfrac{12}{27}=\dfrac49$. **(A) is correct.**

  **(B) $V=\tfrac16$.** $V=\tfrac16\iff abc=1\iff (a,b,c)=(1,1,1)$, exactly one triple. So $P=\dfrac{1}{27}\neq\dfrac19$. **(B) is false.**

  **(C) $V<1$.** $V<1\iff abc<6\iff abc\in\{1,2,3,4\}$:
  $$abc=1:(1,1,1)\to1;\quad abc=2:\{1,1,2\}\to3;\quad abc=3:\{1,1,3\}\to3;\quad abc=4:\{1,1,4\}\,(\text{impossible}),\ \{1,2,2\}\to3.$$
  Total $1+3+3+3=10$, so $P(V<1)=\dfrac{10}{27}\neq\dfrac13$. **(C) is false** ($\tfrac13=\tfrac{9}{27}$ would require a different cutoff).

  **(D) maximal volume.** $V=\dfrac{27}{6}$ needs the maximum product $abc=27$, i.e. $a=b=c=3$, one triple, $P=\dfrac{1}{27}\neq\dfrac19$. **(D) is false.**

  Exactly one option, **(A)**, holds.

