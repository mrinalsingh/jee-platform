statement: |
  Five urns $U_1,\dots,U_5$ are given, where $U_i$ contains $i$ defective and $10-i$ non-defective balls. An urn is chosen uniformly at random and one ball is drawn from it. If the ball is defective, shooter $A$ hits the target with probability $\tfrac12$; otherwise $A$ hits with probability $\tfrac15$. Shooter $B$ always hits with probability $\tfrac12$. Shooters fire in the order $A,B,A,B,\dots$ until the first hit, which decides the winner. Let $p=P(\text{the drawn ball is defective})$ and $q=P(A\text{ wins})$.

  - (A) $p=\tfrac{3}{10}$
  - (B) $P(A\text{ wins}\mid\text{defective})=\tfrac12$
  - (C) $q=\tfrac{13}{30}$
  - (D) $P(\text{defective}\mid A\text{ wins})>\tfrac12$

answer:
  type: MCQ-MC
  correct_options: [A, C]

solution: |
  ### The IDEA
  Two layered ideas. (i) For alternating independent shots $A,B,A,B,\dots$ with per-shot hit probabilities $a,b$, the first-hit probability for $A$ is the geometric sum
  $$P(A\text{ first})=\frac{a}{1-(1-a)(1-b)}.$$
  (ii) Marginalise this over the latent "defective vs non-defective" state, and invert with Bayes to test the conditional in (D).

  ### Working
  **Marginal $p$.** Conditioning on the chosen urn,
  $$p=\sum_{i=1}^{5}\tfrac15\cdot\tfrac{i}{10}=\tfrac{1}{50}(1+2+3+4+5)=\tfrac{15}{50}=\tfrac{3}{10}.$$
  So **(A) is true**.

  **First-hit formula.** With $b=\tfrac12$,
  $$P(A\text{ first})=\frac{a}{1-(1-a)\cdot\tfrac12}=\frac{2a}{1+a}.$$

  **Conditional on defective.** Here $a=\tfrac12$, so
  $$P(A\text{ first}\mid\text{def})=\frac{2\cdot\tfrac12}{1+\tfrac12}=\tfrac{2}{3}\neq\tfrac12.$$
  So **(B) is false**.

  **Unconditional $q$.** With $a=\tfrac15$ when not defective, $P(A\text{ first}\mid\text{non-def})=\dfrac{2/5}{6/5}=\tfrac{1}{3}$. Hence
  $$q=p\cdot\tfrac{2}{3}+(1-p)\cdot\tfrac{1}{3}=\tfrac{3}{10}\cdot\tfrac{2}{3}+\tfrac{7}{10}\cdot\tfrac{1}{3}=\tfrac{1}{5}+\tfrac{7}{30}=\tfrac{13}{30}.$$
  So **(C) is true**.

  **Bayes on (D).**
  $$P(\text{def}\mid A\text{ first})=\frac{p\cdot\tfrac{2}{3}}{q}=\frac{1/5}{13/30}=\frac{6}{13}<\tfrac12.$$
  So **(D) is false**.

  **Correct options: (A), (C).**

wrong_paths:
  - path: "Student forgets that 'A wins' includes hits on the 3rd, 5th, ... shots and uses only the first-round probability $a$ for $P(A\\text{ first}\\mid\\text{def})=\\tfrac12$."
    landed_on_option: "B"
    diagnosis: "Treats the alternating game as a single round (truncation of the geometric series). The correct value is $2a/(1+a)=2/3$, not $a=1/2$. TRAP-PARTIAL: a plausible-looking shortcut that ignores the rest of the infinite series."
  - path: "Student assumes that since the defective state makes $A$ a much better shooter ($\\tfrac12$ vs $\\tfrac15$), conditioning on 'A wins' must push the posterior on defective above $\\tfrac12$."
    landed_on_option: "D"
    diagnosis: "Qualitative intuition without computing. The prior $p=3/10$ is small enough that even with a likelihood ratio $\\tfrac{2/3}{1/3}=2$, the posterior $6/13<1/2$. Skipping Bayes here is the classic base-rate-neglect slip."
  - path: "Student computes $p$ by averaging the defective fractions $i/10$ but divides by $10$ instead of $5$ (confuses the number of urns with the number of balls per urn), getting $p=3/20$."
    landed_on_option: "none (mis-rejects A)"
    diagnosis: "Arithmetic / set-up confusion between 'choose urn uniformly' (5 urns) and 'choose ball uniformly across all 50 balls' — happen to coincide here, but the student loses confidence and drops (A)."

review_notes: |
  Multi-correct probability problem fusing (i) geometric first-hit on alternating Bernoulli trials and (ii) Bayes inversion on a latent mixture. Key skill: writing $P(A\text{ first})=a/(1-(1-a)(1-b))$ cleanly and then marginalising correctly. New IDEA code FIRSTHIT (alternating-shots first-success) and SUB-IDEA BAYESMIX (Bayes invert on a latent mixture state) are proposed — extend PRB.COMP taxonomy. Difficulty T3: standard ideas but four claims to vet under time pressure.
