    landed_on_option: "(B), (C)"
    diagnosis: "Misses the uniform-residue argument and gives up on (A) after a brute-force attempt. Classic TRAP-PARTIAL: selects a strict subset of the true answer key."
  - path: "For (B), student computes $P(3\\mid\\Pi)$ as $P(\\text{at least one die is }3\\text{ or }6) = 1-(2/3)^3$ but then forgets to subtract and writes $\\tfrac{8}{27}$ instead of $\\tfrac{19}{27}$, rejecting (B)."
    landed_on_option: "(A), (C)"
    diagnosis: "Complement confusion — confuses $P(3\\nmid\\Pi)$ with $P(3\\mid\\Pi)$."
  - path: "For (D), student computes $P(\\text{at least one }6)\\approx 3\\cdot \\tfrac16=\\tfrac12$ by linearity-of-expectation-style addition without inclusion-exclusion, marking (D) TRUE."
    landed_on_option: "(A), (B), (C), (D)"
    diagnosis: "Treats $P(A\\cup B\\cup C)$ as $P(A)+P(B)+P(C)$, ignoring overlaps. TRAP-PARTIAL flipped: over-selects."
  - path: "For (C), student counts ordered triples in one residue class as $2^3=8$ but divides by $6^3=216$ and forgets the factor of $3$ for the three classes, getting $\\tfrac{8}{216}=\\tfrac{1}{27}$, rejects (C)."
    landed_on_option: "(A), (B)"
    diagnosis: "Misses the sum over the three disjoint residue classes."

review_notes: |
  Standard JEE-style multi-correct probability item. The unifying IDEA is the uniform-residue structure of $\{1,\ldots,6\}$ mod $3$, which makes (A), (B), (C) one-line each; (D) is a plain complement check that catches the "$\tfrac12$ heuristic" trap. Introduces new axis-3 code DICERES (dice residue / mod-$k$ structure) and axis-4 code UNIFRES (uniform-residue + complement). Reuse-check: existing PRB.COMP.INCEXC.EXACTK is about "exactly $k$" inclusion-exclusion, which does not match this residue/independence theme.
