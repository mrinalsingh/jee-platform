statement: |
  Three fair dice are rolled. Let $T$ be the sum and $\Pi$ the product of the faces. Which of the following are correct?

  - (A) $P(T\equiv 0\pmod 3)=\dfrac13$
  - (B) $P(3\mid\Pi)=\dfrac{19}{27}$
  - (C) $P(\text{all three faces have the same residue mod }3)=\dfrac19$
  - (D) $P(\text{at least one face shows }6)=\dfrac12$

answer:
  type: MCQ-MC
  correct_options: [A, B, C]

solution: |
  ### The IDEA
  Faces $\{1,2,3,4,5,6\}$ split evenly into residue classes mod $3$: $\{3,6\}\to 0$, $\{1,4\}\to 1$, $\{2,5\}\to 2$. So each die's residue mod $3$ is **uniform** on $\{0,1,2\}$ and the three are independent. Once you see this, sum-residue and "$3\mid\Pi$" reduce to clean independent-trial calculations; the $6$-face question is a separate complement.

  ### Working
  **(A)** Since each die's residue is uniform on $\mathbb Z_3$ and they are independent, the sum $T\bmod 3$ is also uniform on $\mathbb Z_3$ (convolution of the uniform with anything on $\mathbb Z_3$ is uniform). Hence $P(T\equiv 0\pmod 3)=\dfrac13$. **TRUE**.

  **(B)** $3\mid\Pi$ fails iff none of the three faces is a multiple of $3$. Each die avoids $\{3,6\}$ with probability $\tfrac{4}{6}=\tfrac23$, so
  $$P(3\nmid\Pi)=\left(\tfrac23\right)^{3}=\tfrac{8}{27},\qquad P(3\mid\Pi)=1-\tfrac{8}{27}=\tfrac{19}{27}.$$
  **TRUE**.

  **(C)** "Same residue mod $3$" means all three lie in one of the three classes $\{3,6\},\{1,4\},\{2,5\}$. Each class has probability $(2/6)^3=1/27$, and the three classes are disjoint, so
  $$P=3\cdot\tfrac{1}{27}=\tfrac19.$$
  **TRUE**.

  **(D)** By complement, $P(\text{at least one }6)=1-\left(\tfrac56\right)^3=1-\tfrac{125}{216}=\tfrac{91}{216}\approx 0.421\ne\tfrac12$. **FALSE**.

  Correct options: **(A), (B), (C)**.

