review_notes: |
  Multi-correct on reciprocal-binomial sums; central JEE trick is the reflection $r\\leftrightarrow n-r$.
  Distractor (A) is a numerical look-alike; distractors against (C) come from miscounting pair multiplicities.
  Time budget reflects that once the reflection is seen, (B) and (D) fall in seconds; (C) needs the multiplicity insight.
  NEW taxonomy: idea RECIPSUM (reciprocal-binomial-coefficient sums), sub-idea REFLSYM (reflection symmetry $r\\leftrightarrow n-r$). Both are reusable across $\\sum 1/\\binom{n}{r}$ family problems.
