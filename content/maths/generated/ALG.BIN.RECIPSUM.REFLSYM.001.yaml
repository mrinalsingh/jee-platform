statement: |
  Let $a_n=\displaystyle\sum_{r=0}^{n}\dfrac{1}{\binom{n}{r}}$. Which of the following is/are TRUE?

  (A) $a_{10}=\dfrac{4097}{1260}$

  (B) $\displaystyle\sum_{r=0}^{10}\dfrac{r}{\binom{10}{r}}=5\,a_{10}$

  (C) $\displaystyle\sum_{0\le i<j\le 10}\!\left(\dfrac{i}{\binom{10}{i}}+\dfrac{j}{\binom{10}{j}}\right)=50\,a_{10}$

  (D) $\displaystyle\sum_{r=0}^{10}\dfrac{10-2r}{\binom{10}{r}}=0$

answer:
  type: MCQ-MC
  correct_options: [B, C, D]

solution: |
  Use the reflection symmetry $\binom{n}{r}=\binom{n}{n-r}$. Replacing $r\to n-r$:
  $$\sum_{r=0}^{n}\frac{r}{\binom{n}{r}}=\sum_{r=0}^{n}\frac{n-r}{\binom{n}{r}}\implies 2\sum_{r=0}^{n}\frac{r}{\binom{n}{r}}=n\,a_n,\quad\text{so}\quad \sum_{r=0}^{n}\frac{r}{\binom{n}{r}}=\frac{n}{2}\,a_n.$$
  With $n=10$ this is $5\,a_{10}$, proving **(B)**.

  For **(D)**: $\displaystyle\sum_{r=0}^{10}\frac{10-2r}{\binom{10}{r}}=10\,a_{10}-2\cdot 5\,a_{10}=0$. **True.**

  For **(C)**: write $u_r=r/\binom{10}{r}$. In the unordered-pair sum each index $r\in\{0,\dots,10\}$ appears in exactly $10$ pairs $\{r,j\}$ with $j\ne r$, hence
  $$\sum_{0\le i<j\le 10}(u_i+u_j)=10\sum_{r=0}^{10}u_r=10\cdot 5\,a_{10}=50\,a_{10}.$$
  **True.**

  For **(A)**: direct computation gives
  $a_{10}=2\left(1+\tfrac{1}{10}+\tfrac{1}{45}+\tfrac{1}{120}+\tfrac{1}{210}+\tfrac{1}{252}\right)-\tfrac{1}{252}\cdot 0=\dfrac{1433}{630}\neq\dfrac{4097}{1260}$. **False.**

  Hence the correct options are **(B), (C), (D)**.

