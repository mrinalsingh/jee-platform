  - path: "In (C) the student treats the unordered-pair count as $\\binom{10}{1}\\binom{9}{1}=90$ or $\\binom{11}{2}=55$, getting $45\\,a_{10}$ or $55\\,a_{10}$ instead of $50\\,a_{10}$, rejecting (C)."
