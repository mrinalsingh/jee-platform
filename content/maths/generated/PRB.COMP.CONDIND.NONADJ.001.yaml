statement: |
  Six candidates' answer-scripts are placed in a row. Independently, each script contains a correct solution to a certain question with probability $\tfrac{3}{5}$ (a candidate attempts it with probability $\tfrac{9}{10}$ and, having attempted, solves it with probability $\tfrac{2}{3}$). Then

  - (A) given that exactly three of the six scripts are correct, the probability that no two of these three are adjacent in the row equals $\dfrac{1}{5}$
  - (B) the conditional probability in option (A) would be unchanged if each script were instead correct with probability $\tfrac{1}{2}$
  - (C) given that exactly three of the six scripts are correct, the probability that no two of these three are adjacent equals $\dfrac{1}{2}$
  - (D) the (unconditional) probability that exactly three scripts are correct and no two of them are adjacent equals $\dfrac{864}{15625}$

answer:
  type: MCQ-MC
  correct_options: [A, B, D]

solution: |
  ### The IDEA
  When we condition on the event "exactly $k$ scripts are correct" in an i.i.d. Bernoulli($p$) sequence, the factor $p^{k}(1-p)^{n-k}$ is the same for every position-subset of size $k$, so all $\binom{n}{k}$ subsets become equally likely — the conditional distribution is uniform on $k$-subsets, independent of $p$. Counting non-adjacent $k$-subsets of $\{1,\dots,n\}$ then reduces to the standard $\binom{n-k+1}{k}$ stars-and-bars count.

  ### Working
  Let $p=\tfrac{9}{10}\cdot\tfrac{2}{3}=\tfrac{3}{5}$ be the probability that a single script is correct.

  **Conditional setup.** Let $S\subset\{1,\dots,6\}$ be the (random) set of positions of correct scripts. For any specific subset $T$ of size $3$,
  $$\Pr(S=T)=p^{3}(1-p)^{3},$$
  the same for every $T$. Hence
  $$\Pr(S=T\mid |S|=3)=\frac{1}{\binom{6}{3}}=\frac{1}{20},$$
  uniform on $3$-subsets and **independent of $p$** — this proves **(B)**.

  **Counting non-adjacent triples.** The number of $3$-subsets of $\{1,\dots,6\}$ with no two elements consecutive is $\binom{6-3+1}{3}=\binom{4}{3}=4$. So
  $$\Pr(\text{no two adjacent}\mid |S|=3)=\frac{4}{20}=\frac{1}{5},$$
  which is **(A)**, and makes **(C)** false.

  **Unconditional joint probability.**
  $$\Pr(|S|=3\ \text{and no two adjacent})=\binom{4}{3}p^{3}(1-p)^{3}=4\cdot\left(\tfrac{3}{5}\right)^{3}\left(\tfrac{2}{5}\right)^{3}=4\cdot\tfrac{27}{125}\cdot\tfrac{8}{125}=\tfrac{864}{15625},$$
  giving **(D)**.

  Correct options: **(A), (B), (D)**.

wrong_paths:
  - path: "Use the binomial weight $\\binom{6}{3}p^{3}(1-p)^{3}$ in the conditional and compute $\\Pr(\\text{non-adj})$ as $4\\cdot p^{3}(1-p)^{3}/[\\binom{6}{3}p^{3}(1-p)^{3}]$, getting $1/5$, but then claim it depends on $p$ and so reject (B)."
    landed_on_option: "Marks (A) only; misses (B)"
    diagnosis: "Student computes the right conditional probability but does not notice the $p^{3}(1-p)^{3}$ factor cancels identically, so they wrongly think the conditional answer changes with $p$. TRAP-PARTIAL: correct numeric answer, incomplete invariance reasoning."
  - path: "Count non-adjacent triples as $\\binom{6}{3}-(\\text{adjacent})=20-10=10$, so conditional probability $=10/20=1/2$."
    landed_on_option: "Marks (C); rejects (A)"
    diagnosis: "Miscounts triples containing at least one adjacent pair (true count is $16$, not $10$). Picks the plausible-looking $\\tfrac12$ in (C). Classic distractor for the standard $\\binom{n-k+1}{k}$ count."
  - path: "Compute unconditional probability as $\\binom{6}{3}p^{3}(1-p)^{3}\\cdot \\tfrac{1}{5}=20\\cdot\\tfrac{27}{125}\\cdot\\tfrac{8}{125}\\cdot\\tfrac15$ but forget to multiply, or use $p=\\tfrac12$ giving $4\\cdot(1/2)^{6}=\\tfrac{1}{16}$ and reject (D)."
    landed_on_option: "Rejects (D)"
    diagnosis: "Confuses the conditional (independent of $p$) with the joint (depends on $p$). The joint formula is $\\binom{4}{3}p^{3}(1-p)^{3}$ — student substitutes the wrong $p$ or double-conditions."
  - path: "Treat 'each script correct with probability $3/5$' as deterministic three correct, then compute $4/\\binom{6}{3}=1/5$ for (A) but reason that changing to $p=1/2$ gives a different expected number of correct scripts and so (B) fails."
    landed_on_option: "Marks (A); rejects (B)"
    diagnosis: "Conflates the unconditional distribution (which does depend on $p$) with the conditional one (which does not). Misses the symmetry of i.i.d. Bernoulli trials under conditioning on the count."

review_notes: |
  Multi-correct with a strong conceptual hook: the conditional distribution of positions given the count is uniform on $\binom{n}{k}$ subsets for any i.i.d. Bernoulli sequence, regardless of $p$. Option (B) tests that invariance directly. Options (A) and (C) form a numerical pair (correct $\tfrac15$ vs. plausible $\tfrac12$ from miscounting). Option (D) tests the joint vs. conditional distinction. New axis-3 / axis-4 codes suggested:
  - PRB.COMP.CONDIND (conditional distribution given count is uniform and parameter-free)
  - PRB.COMP.CONDIND.NONADJ (non-adjacent k-subset count $\binom{n-k+1}{k}$)
  T3 fits — concept is JEE-standard but the combinatorial layer plus the $p$-invariance argument together push it above T2.
