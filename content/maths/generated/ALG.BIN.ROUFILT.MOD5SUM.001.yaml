  Multi-correct with two true options (A) and (D). (A) tests the basic roots-of-unity filter computation;
  (D) is the "hidden Fibonacci" surprise that requires the full evaluation of $A_2$.
  (B) is a symmetry trap (wrong pairing of residue classes); (C) is an off-by-one index trap.
