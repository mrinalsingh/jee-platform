statement: |
  Let $f(x)=\max\{\,||x^2-2|x||\,,\,|x|\,\}$ and $g(x)=\min\{\,||x^2-2|x||\,,\,|x|\,\}$ for $x\in\mathbb{R}$. Which of the following is/are correct?

  (A) The number of points where $f$ is non-differentiable equals $5$.

  (B) The number of points where $g$ is non-differentiable equals $7$.

  (C) $f$ is an even function.

  (D) $g$ has a local maximum at $x=0$.

answer:
  type: MCQ-MC
  correct_options: [A, B, C]

solution: |
  Both $|x^2-2|x||$ and $|x|$ are even, hence $f=\max\{\cdot,\cdot\}$ and $g=\min\{\cdot,\cdot\}$ of two even functions are even — **(C) true**.

  Restrict to $x\ge 0$. Then $|x^2-2x|=|x(x-2)|$ equals $2x-x^2$ on $[0,2]$ and $x^2-2x$ on $[2,\infty)$. Compare with $|x|=x$:
  - On $[0,1]$: $2x-x^2\ge x$ iff $x\le 1$ (equality at $x=0,1$).
  - On $[1,2]$: $x\ge 2x-x^2$ with equality at $x=1$.
  - On $[2,3]$: $x\ge x^2-2x$ iff $x\le 3$ (equality at $x=3$).
  - On $[3,\infty)$: $x^2-2x\ge x$.

  So on $x\ge 0$, $f$ has corners (non-smooth points) at $x=0,1,3$ — three points. By even symmetry, the full corner set is $\{-3,-1,0,1,3\}$: **5 points, (A) true**.

  For $g$ the roles of the two functions swap at each crossing of $f$, AND $g$ inherits the inner corners of $||x^2-2|x||$ (at $x=0,2$). On $x\ge 0$ the corners of $g$ are at $0,1,2,3$ (four points). By even symmetry the full set is $\{-3,-2,-1,0,1,2,3\}$: **7 points, (B) true**.

  Near $x=0$: $g(x)=\min\{2|x|-x^2,|x|\}=|x|$ for small $|x|$ (since $2|x|-x^2\ge |x|$ near $0$). Hence $g(x)\ge 0=g(0)$ on a neighbourhood, so $0$ is a local **minimum**, not a maximum — **(D) false**.

  $$\boxed{\text{(A), (B), (C)}}$$

wrong_paths:
  - path: "Counts only the corners of f on x>=0 (namely 0, 1, 3) and forgets that even symmetry doubles the nonzero corners, getting 3 instead of 5; concludes (A) is false."
    landed_on_option: "skips (A); ends with {B, C}"
    diagnosis: "Forgot even-symmetry reflection of corner set"
  - path: "Treats g as min of two smooth-looking branches and counts only crossings of f and |x| (at 0,1,3 then mirrored), getting 5 points for g and missing the inherited inner corners at x=±2; concludes (B) is false."
    landed_on_option: "skips (B); ends with {A, C}"
    diagnosis: "Missed corners g inherits from the inner ||x^2-2|x|| at x=±2"
  - path: "Observes g(0)=0 and notices g(x)=|x|-something near 0, mistakenly reads the local behavior as g decreasing away from 0, declaring 0 a local max."
    landed_on_option: "adds (D); ends with {A, B, C, D}"
    diagnosis: "Sign error on min branch — confused local min with local max at the cusp"
  - path: "Argues f is even because max preserves evenness but doubts that g (a min) is even due to confusion with min(odd, even); rejects (C)."
    landed_on_option: "skips (C); ends with {A, B}"
    diagnosis: "Misapplied evenness — min/max of two even functions is even"

review_notes: |
  Multi-correct calculus item: nested absolute-value max/min, corner counting via even symmetry plus crossing analysis. Key subtle points: (i) g inherits the inner corners of the nested |x^2-2|x|| (at x=±2) in addition to swap-points where f and |x| cross; (ii) at x=0 the min is |x| locally so 0 is a local MIN not max — common trap. Difficulty T4. Authored times reflect the careful case-split required.
