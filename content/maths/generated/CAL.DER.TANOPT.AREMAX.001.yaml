statement: |
  Let $C:\,y=e^{-|x|}$. For $t>0$, the tangent to $C$ at the point with abscissa $t$ meets the coordinate axes at $P$ and $Q$, and let $A(t)$ denote the area of $\triangle OPQ$. As $t$ varies over $(0,\infty)$, the midpoint of $PQ$ traces a curve of the form $y=x\,e^{\,p-qx}$. Let $t_0$ be the value of $t$ at which $A(t)$ is maximal. The tangents to $C$ at the points with abscissae $+t_0$ and $-t_0$, together with $C$, enclose a region of area $a-\dfrac{b}{e}$, where $a,b$ are positive integers. Find the value of
  $$a+b+p+q+t_0.$$

answer:
  type: NUM-INT
  value: 11

solution: |
  ### The IDEA
  On the right branch $y=e^{-x}$ ($x>0$), the tangent at $(t,e^{-t})$ has slope $-e^{-t}$, giving symmetric intercepts that make $A(t)=\tfrac12(1+t)^2 e^{-t}$. Optimising $A$ and using the symmetry of $C$ about the $y$-axis reduces the bounded area to a single integral on $[0,1]$.

  ### Working
  Tangent at $(t,e^{-t})$ on $y=e^{-x}$:
  $$y - e^{-t} = -e^{-t}(x-t)\ \Longrightarrow\ y = e^{-t}(1+t-x).$$
  So $P=(1+t,0)$ and $Q=(0,(1+t)e^{-t})$, hence
  $$A(t)=\tfrac12(1+t)^2 e^{-t}.$$
  Midpoint of $PQ$:
  $$M=\Bigl(\tfrac{1+t}{2},\,\tfrac{(1+t)e^{-t}}{2}\Bigr).$$
  Let $X=\tfrac{1+t}{2}$, $Y=\tfrac{(1+t)e^{-t}}{2}$. Then $1+t=2X$, so $t=2X-1$ and
  $$Y = X\,e^{-(2X-1)} = X\,e^{\,1-2X}.$$
  Thus $p=1,\ q=2$.

  Maximise $A$: $A'(t)=\tfrac12 e^{-t}\bigl[2(1+t)-(1+t)^2\bigr]=\tfrac12 e^{-t}(1+t)(1-t)$. The only positive critical point is $t_0=1$ (clearly a maximum since $A'>0$ on $(0,1)$ and $A'<0$ on $(1,\infty)$).

  Tangents at $x=\pm 1$: the tangent at $x=1$ (right branch) is $y=e^{-1}(2-x)$; by symmetry the tangent at $x=-1$ (left branch, $y=e^{x}$) is $y=e^{-1}(2+x)$. Both pass through $(0,2/e)$ — above the curve at $x=0$ (which is $1$). Each tangent meets the corresponding branch of $C$ only at the point of tangency.

  By symmetry the area enclosed by the two tangents and $C$ is
  $$\text{Area}=2\int_{0}^{1}\bigl[\,e^{-x}-e^{-1}(2-x)\,\bigr]\,dx.$$
  Now $\int_0^1 e^{-x}\,dx = 1-\tfrac1e$ and $\int_0^1(2-x)\,dx=\tfrac{3}{2}$, so
  $$\text{Area}=2\Bigl[\,1-\tfrac1e-\tfrac{3}{2e}\,\Bigr]=2-\tfrac{5}{e}.$$
  Hence $a=2$, $b=5$.

  Final sum:
  $$a+b+p+q+t_0 = 2+5+1+2+1 = 11.$$

wrong_paths:
  - path: "Writes the tangent as $y=e^{-t}(1+t-x)$ but takes $P=(t+1,0)$, $Q=(0,e^{-t})$ (forgets the $(1+t)$ factor in the $y$-intercept), giving $A=\\tfrac12(1+t)e^{-t}$ maximised at $t_0=0$; aborts or guesses."
    landed_on_option: "Often produces $9$ or $10$"
    diagnosis: "Algebra slip when reading off $Q$. The TRAP-PARTIAL flag: student gets the $P$-intercept right but mis-reads the $Q$-intercept, breaking the $(1+t)^2$ structure that drives the optimisation."
  - path: "Computes $A$ correctly and finds $t_0=1$, but forgets the factor of $2$ from symmetry when integrating, getting Area $=1-\\tfrac{5}{2e}$, so $a=1,b=\\tfrac52$ (non-integer) — rounds to $a=1,b=3$ giving $1+3+1+2+1=8$."
    landed_on_option: "8"
    diagnosis: "Misses that $C$ has TWO branches and the tangents at $\\pm 1$ enclose a region symmetric about the $y$-axis; integrates only over $[0,1]$."
  - path: "Mis-identifies the midpoint curve as $y=x e^{-2x}$ (drops the $e^1$ factor from $1+t=2X$ substitution), giving $p=0,q=2$, hence sum $=2+5+0+2+1=10$."
    landed_on_option: "10"
    diagnosis: "Algebraic slip in eliminating $t$: writes $e^{-t}=e^{-(2X-1)}$ as $e^{-2X}$ instead of $e^{1-2X}$."
  - path: "Confuses 'tangent at abscissa $t$' with 'tangent of slope $t$' and sets up the wrong family; or uses $y=e^x$ on the right branch by reading $|x|$ as $x$ for all $x$."
    landed_on_option: "Numbers far from 11"
    diagnosis: "Reading error on the modulus / on 'abscissa'. Pure setup failure."

