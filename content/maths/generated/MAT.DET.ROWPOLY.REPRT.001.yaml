  - path: "Sees the factor (x-1)^2 in D(x) and concludes f(x) = (x-1)^2(x-2) divides D(x), so marks (D) false."
    landed_on_option: "A, B, C (omitting D)"
    diagnosis: "Confuses 'shares the factor (x-1)^2' with 'is divisible by f(x)'; fails to test whether x=2 is a root of D."
  - path: "Computes D(1)=0 but does not check D'(1); assumes simple root at x=1 and marks B false (thinks D''(1)=0)."
    landed_on_option: "A, C, D (omitting B)"
    diagnosis: "Confuses 'D(1)=0' with simple root; without computing D'(1) and D''(1) the multiplicity is unknown."

