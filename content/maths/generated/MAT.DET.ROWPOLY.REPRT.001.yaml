statement: |
  Let
  $$D(x)=\det\!\begin{pmatrix}x^3 & x^4 & x^5\\ 1 & 1 & 1\\ 3 & 4 & 5\end{pmatrix},\qquad f(x)=(x-1)^2(x-2).$$
  Which of the following are TRUE?

  - **(A)** $D(1)=D'(1)=0$
  - **(B)** $D''(1)\ne 0$
  - **(C)** $D(x)=x^3(x-1)^2$
  - **(D)** $f(x)\nmid D(x)$

answer:
  type: MCQ-MC
  correct_options: [A, B, C, D]

solution: |
  ### The IDEA
  Expand the $3\times 3$ determinant along the first row and read off $D(x)$ as an explicit polynomial. Once you have $D(x)=x^3(x-1)^2$, every claim is a direct check on the factorisation: $x=1$ is a root of multiplicity exactly $2$, and $x=2$ is not a root.

  ### Working
  Expand by row 1:
  $$D(x)=x^3(1\cdot 5-1\cdot 4)-x^4(1\cdot 5-1\cdot 3)+x^5(1\cdot 4-1\cdot 3)=x^3-2x^4+x^5=x^3(x-1)^2.$$
  This proves **(C)**.

  From $D(x)=x^3(x-1)^2$:
  - $D(1)=0$ and $D'(x)=5x^4-8x^3+3x^2$, so $D'(1)=5-8+3=0$. Hence **(A)**.
  - $D''(x)=20x^3-24x^2+6x$, so $D''(1)=20-24+6=2\ne 0$. The multiplicity at $x=1$ is exactly $2$. Hence **(B)**.
  - $D(2)=2^3\cdot 1^2=8\ne 0$, so $(x-2)\nmid D(x)$, and therefore $f(x)=(x-1)^2(x-2)\nmid D(x)$. Hence **(D)**.

  All four statements are true.

  Structural remark: row 2 is $(p(1),q(1),r(1))$ with $p(x)=x^3,q(x)=x^4,r(x)=x^5$ and row 3 is $(p'(1),q'(1),r'(1))$. At $x=1$ row 1 matches row 2; differentiating $D$ once at $x=1$ makes row 1 match row 3. Both substitutions kill the determinant, which is the conceptual reason $(x-1)^2\mid D(x)$.

