    diagnosis: "Routine differentiation slip — drops the outer factor $2n$ from $\\tfrac{d}{dx}(1+x)^{2n} = 2n(1+x)^{2n-1}$. The identity $\\sum k\\,a_k = n\\cdot 2^{2n}$ is one of the standard four; missing it is a recall/execution failure, not a conceptual one."

review_notes: |
  Cross-chapter fusion between ALG.BIN (binomial identities on $a_k=\binom{2n}{k}$) and a MAT.DET-flavoured
  Hankel singularity check. All four options are anchored to the single generator $f(x)=(1+x)^{2n}$, but
  each tests a DIFFERENT canonical move: even-index split via $f(1)+f(-1)$; sum-of-squares via the
  convolution $[x^{2n}]f(x)^{2}$ and the palindrome symmetry; weighted sum via $f'(1)$; and a Hankel
  determinant requiring direct (3x3) evaluation rather than a slick identity. The trap option (C) is
  engineered to catch the student who waves through Hankel-style claims by analogy with the other
  three "clean" identities — under JEE Advanced multi-correct partial marking, picking (C) costs
  marks even if (A), (B), (D) are all marked correctly. T4 reflects the fan-out (four sub-arguments,
  one trap) rather than any single hard step.

  Proposed new IDEA $\\texttt{ALG.BIN.MULTID}$ ("multi-identity fan-out on a single $(1+x)^{N}$ expansion")
  and new SUB-IDEA $\\texttt{EVN2N}$ ("the canonical four for $N=2n$: even-sum, sum-of-squares,
  weighted-sum, and Hankel"). The IDEA generalises beyond this one problem (any "verify four
  identities at once" item with the same generator collapses to this template).
