statement: |
  Let $n \geq 2$ be a positive integer and let $a_k = \binom{2n}{k}$ for $k = 0, 1, 2, \ldots, 2n$.
  Which of the following statements is/are TRUE?

  **(A)** $a_0 + a_2 + a_4 + \cdots + a_{2n} = 2^{2n-1}$.

  **(B)** $a_0^{2} + a_1^{2} + \cdots + a_{2n}^{2} = \binom{4n}{2n}$.

  **(C)** The matrix $\begin{pmatrix} a_0 & a_1 & a_2 \\ a_1 & a_2 & a_3 \\ a_2 & a_3 & a_4 \end{pmatrix}$ is singular for some $n \geq 2$.

  **(D)** $\displaystyle\sum_{k=0}^{2n} k\, a_k = n\cdot 2^{2n}$.

answer:
  type: MCQ-MC
  correct_options: [A, B, D]

solution: |
  ### The IDEA
  All four options are classical statements about the single generating polynomial
  $f(x) = (1+x)^{2n} = \displaystyle\sum_{k=0}^{2n} a_k\, x^{k}$.
  Three of them (A, B, D) are standard binomial identities; the fourth (C) is a Hankel-determinant
  claim that requires direct evaluation. The trap is to wave through (C) by analogy with the other
  three rather than computing.

  ### Option (A): even-index sum
  $f(1) + f(-1) = 2^{2n} + 0 = 2\!\!\!\displaystyle\sum_{k\text{ even}}\!\! a_k$, so
  $$\sum_{k\text{ even}} a_k = 2^{\,2n-1}.$$
  **TRUE.**

  ### Option (B): sum of squares via convolution
  The coefficient of $x^{2n}$ in $f(x)\cdot f(x) = (1+x)^{4n}$ is $\binom{4n}{2n}$. On the other hand,
  using the palindrome $a_k = a_{2n-k}$,
  $$[x^{2n}]\,f(x)^{2} = \sum_{k=0}^{2n} a_k\, a_{2n-k} = \sum_{k=0}^{2n} a_k^{2}.$$
  Hence $\sum a_k^{2} = \binom{4n}{2n}$. **TRUE.**

  ### Option (D): weighted sum via derivative
  $f'(x) = 2n\,(1+x)^{2n-1}$, so $f'(1) = 2n \cdot 2^{2n-1} = n\cdot 2^{2n}$. But also
  $f'(1) = \displaystyle\sum_{k=0}^{2n} k\, a_k$. **TRUE.**

  ### Option (C): Hankel singularity — direct evaluation
  Write the matrix $H = \begin{pmatrix} a_0 & a_1 & a_2 \\ a_1 & a_2 & a_3 \\ a_2 & a_3 & a_4 \end{pmatrix}$
  and expand:
  $$\det H = a_0(a_2 a_4 - a_3^{2}) - a_1(a_1 a_4 - a_2 a_3) + a_2(a_1 a_3 - a_2^{2}).$$
  Substituting $a_k = \binom{2n}{k}$ and simplifying (cleanest via the ratio $a_{k+1}/a_k = (2n-k)/(k+1)$),
  $$\det H = -\,\frac{(2n)^{2}(2n-1)(2n+1)^{2}(2n+2)}{144}.$$
  *Sanity check at $n=2$:* $a_0,\dots,a_4 = 1,4,6,4,1$, so
  $\det H = 1(6\cdot 1 - 16) - 4(4 - 24) + 6(16 - 36) = -10 + 80 - 120 = -50$, and the closed form gives
  $-\tfrac{16\cdot 3\cdot 25\cdot 6}{144} = -\tfrac{7200}{144} = -50$. $\checkmark$

  Every factor in the closed form is strictly positive for $n \geq 2$, so $\det H < 0$ for every such $n$.
  The matrix is therefore **never** singular. **(C) is FALSE.**

  ### Conclusion
  Correct options: **(A), (B), (D)**.

