    diagnosis: "TRAP-EDGE / TRAP-PARTIAL: the $k=0$ term $\\frac{1}{1}\\binom{10}{0}=1$ is non-trivial; dropping it changes the value by $1=\\frac{11}{11}$, giving $\\frac{2036}{11}$ not $\\frac{2047}{11}$."
  - path: "Compute $Q=\\sum k^2\\binom{10}{k}$ by writing $k^2\\binom{10}{k}=k\\cdot10\\binom{9}{k-1}$ and then carelessly summing $10\\sum k\\binom{9}{k-1}=10\\cdot 9\\cdot 2^{8}=23040$, forgetting that $k=(k-1)+1$."
