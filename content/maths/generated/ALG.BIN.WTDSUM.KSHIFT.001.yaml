statement: |
  For $(1+x)^{10}$, let
  $$R=\sum_{k=0}^{10}\frac{1}{k+1}\binom{10}{k},\qquad P=\sum_{k=1}^{10}k\binom{10}{k},\qquad Q=\sum_{k=0}^{10}k^{2}\binom{10}{k}.$$

  - (A) $R=\dfrac{2048}{11}$
  - (B) $P=5120$
  - (C) $Q=28160$
  - (D) $\displaystyle\sum_{k=1}^{10}\frac{1}{k+1}\binom{10}{k}=\dfrac{2047}{11}$

answer:
  type: MCQ-MC
  correct_options: [B, C]

solution: |
  ### The IDEA
  Weighted binomial sums of the form $\sum k\binom{n}{k}$ and $\sum k^{2}\binom{n}{k}$ are evaluated by the absorption identity $k\binom{n}{k}=n\binom{n-1}{k-1}$ (and applying it twice for the $k^2$ sum). Sums of the form $\sum\frac{1}{k+1}\binom{n}{k}$ come from integrating $(1+x)^{n}$ on $[0,1]$, which gives $\frac{2^{n+1}-1}{n+1}$ — be careful about whether $k=0$ is included.

  ### Working
  **(B) $P$:** Using $k\binom{10}{k}=10\binom{9}{k-1}$,
  $$P=\sum_{k=1}^{10}k\binom{10}{k}=10\sum_{j=0}^{9}\binom{9}{j}=10\cdot 2^{9}=5120.$$
  So (B) is correct.

  **(C) $Q$:** Apply absorption twice:
  $$k^{2}\binom{10}{k}=k\cdot 10\binom{9}{k-1}=10\bigl[(k-1)+1\bigr]\binom{9}{k-1}=10\Bigl(9\binom{8}{k-2}+\binom{9}{k-1}\Bigr).$$
  Hence
  $$Q=10\bigl(9\cdot 2^{8}+2^{9}\bigr)=10\cdot 2^{8}(9+2)=10\cdot 11\cdot 256=28160.$$
  (Equivalently $Q=n(n+1)2^{n-2}$ with $n=10$.) So (C) is correct.

  **(A) $R$:** Integrate $(1+x)^{10}$ on $[0,1]$:
  $$R=\sum_{k=0}^{10}\frac{1}{k+1}\binom{10}{k}=\int_{0}^{1}(1+x)^{10}\,dx=\frac{2^{11}-1}{11}=\frac{2047}{11}\ne\frac{2048}{11}.$$
  So (A) is **false** — the "$-1$" was dropped.

  **(D)** The sum in (D) starts at $k=1$, so we subtract the $k=0$ term $\frac{1}{1}\binom{10}{0}=1$:
  $$\sum_{k=1}^{10}\frac{1}{k+1}\binom{10}{k}=R-1=\frac{2047-11}{11}=\frac{2036}{11}\ne\frac{2047}{11}.$$
  So (D) is **false**.

  **Correct options: (B), (C).**

