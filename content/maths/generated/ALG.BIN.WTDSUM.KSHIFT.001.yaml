    diagnosis: "Single application of absorption captures only the $9\\binom{8}{k-2}$ piece and misses the extra $\\binom{9}{k-1}$ contribution; the correct expansion needs $k=(k-1)+1$ to split into two falling-index sums."

review_notes: |
  Classic binomial-sum multi-correct. Two true statements (B, C) test the absorption identity $k\binom{n}{k}=n\binom{n-1}{k-1}$ once and twice. The two false statements (A, D) are EDGE traps: an off-by-one in the FTC (A) and a missing $k=0$ term in the sum (D). Time budget is short because every part collapses by a one-line identity once seen; difficulty T3 reflects the combination of absorption + integration + careful boundary bookkeeping. New axis-3 code `WTDSUM` (weighted binomial sums) and axis-4 `KSHIFT` (k-absorption / index shift) — both proposed as taxonomy extensions; no existing ALG.BIN ideas listed in the taxonomy.
