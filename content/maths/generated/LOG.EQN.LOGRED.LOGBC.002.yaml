statement: |
  Let $S=\{x>0:\ x^{\log_3 x}=x^5/81\}$. Which of the following is/are true?

  - (A) $S$ has exactly $4$ real solutions
  - (B) $\min S\in(0,1)$
  - (C) $\prod_{x\in S} x = 243$
  - (D) $\log_3\!\big(\prod_{x\in S} x\big)=4$

answer:
  type: MCQ-MC
  correct_options: [C]

solution: |
  ### The IDEA
  When an equation has the variable in both the base and the exponent of a power, take logarithms and substitute $t=\log_b x$ to reduce to a polynomial in $t$. The original positive solutions are recovered as $x=b^{t}$ for each root $t$.

  ### Working
  Take $\log_3$ of both sides. With $t=\log_3 x$, the LHS gives
  $$\log_3\!\big(x^{\log_3 x}\big)=(\log_3 x)^2=t^2,$$
  and the RHS gives
  $$\log_3(x^5/81)=5\log_3 x-\log_3 81=5t-4.$$
  Hence
  $$t^2=5t-4\;\Longrightarrow\;t^2-5t+4=0\;\Longrightarrow\;(t-1)(t-4)=0,$$
  so $t=1$ or $t=4$, giving $x=3$ or $x=81$. Thus $S=\{3,81\}$.

  - (A) $|S|=2$, not $4$ — **false**.
  - (B) $\min S=3>1$, so $\min S\notin(0,1)$ — **false**.
  - (C) $\prod_{x\in S}x=3\cdot 81=243$ — **true**.
  - (D) $\log_3 243=5\neq 4$ — **false**.

  Hence the only correct option is **(C)**.

wrong_paths:
  - path: "Forgets the constraint $x>0$ required for taking $\\log_3$, or imagines complex/extra branches and so claims $4$ solutions."
    landed_on_option: "A"
    diagnosis: "Confuses the degree of the polynomial in $t$ (which is $2$) with the number of $x$-solutions, or invents spurious roots; only $t=1,4$ exist, giving exactly $2$ positive $x$."
  - path: "Mis-solves $t^2-5t+4=0$ as $(t+1)(t-4)=0$, getting $t=-1,4$, so $x=1/3$ and $x=81$, then $\\min S=1/3\\in(0,1)$."
    landed_on_option: "B"
    diagnosis: "Sign error in factoring the quadratic. The correct factorization is $(t-1)(t-4)$, both roots positive, both $x$ exceed $1$."
  - path: "Computes $\\prod x = 243$ correctly but writes $\\log_3 243 = 4$ instead of $5$, marking (D)."
    landed_on_option: "D"
    diagnosis: "Off-by-one in evaluating $\\log_3 243$: since $243=3^5$, $\\log_3 243=5$, not $4$. TRAP-PARTIAL — student gets (C) but then over-claims the equivalent (D)."

review_notes: |
  Standard log-substitution exercise: $t=\log_3 x$ reduces to a quadratic. Listed difficulty T2 (standard medium), authored time ~2 min. Sheet rated this 6/10. The MCQ-MC framing carries a partial-credit trap: candidates correctly identifying (C) may also pick (D) without checking that $\log_3 243 = 5 \neq 4$. Recommend keeping (D) as a deliberate near-miss distractor.
