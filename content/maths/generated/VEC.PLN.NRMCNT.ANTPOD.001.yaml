statement: |
  Consider all planes through the origin of the form $ax+by+cz=0$ with $a,b,c\in\{-1,0,1\}$ and $(a,b,c)\neq(0,0,0)$. Two such equations describe the **same** plane exactly when one normal is a nonzero scalar multiple of the other. Which of the following are correct?

  - (A) the number of distinct such planes equals $26$
  - (B) the number of distinct such planes equals $13$
  - (C) the number of unordered triples of these distinct planes whose three normals are mutually perpendicular equals $4$
  - (D) the number of these distinct planes whose normal has all three coordinates nonzero equals $4$

answer:
  type: MCQ-MC
  correct_options: [B, C, D]

solution: |
  ### Setup
  A plane through the origin is determined by its normal direction $\mathbf n=(a,b,c)$. Over $a,b,c\in\{-1,0,1\}$ there are $3^3-1=26$ **ordered** nonzero normals. But the scalar multiple $-\mathbf n$ gives the **same** plane, and within $\{-1,0,1\}^3$ the only nonzero scalar that keeps a normal in the set is $-1$. So the $26$ ordered normals pair up as $\{\mathbf n,-\mathbf n\}$.

  ### (A) and (B): counting distinct planes
  Each distinct plane corresponds to exactly one antipodal pair $\{\mathbf n,-\mathbf n\}$, so the number of distinct planes is
  $$\frac{26}{2}=13.$$
  Thus **(B) is correct** and **(A) is the factor-of-2 trap (false)** — $26$ counts ordered normals, not planes.

  ### (D): normals with all three coordinates nonzero
  These are the normals $(\pm1,\pm1,\pm1)$, i.e. the $2^3=8$ sign patterns. They collapse in $\pm$ pairs to
  $$\frac{8}{2}=4$$
  distinct planes. **(D) is correct.**

  ### (C): mutually-perpendicular unordered triples
  We need unordered triples $\{P_1,P_2,P_3\}$ of the $13$ planes whose normals satisfy $\mathbf n_i\cdot\mathbf n_j=0$ for all $i\neq j$.

  - The coordinate triple $\{(1,0,0),(0,1,0),(0,0,1)\}$ is mutually perpendicular — that is one triple.
  - For each coordinate axis taken as one normal, there is exactly one "tilted" orthogonal completion built from two face-diagonal normals. For instance, with $(1,0,0)$ fixed, $(0,1,1)$ and $(0,1,-1)$ are mutually perpendicular and both perpendicular to $(1,0,0)$, giving $\{(1,0,0),(0,1,1),(0,1,-1)\}$. The analogous completions about the $y$- and $z$-axes give one triple each.

  A direct check over the $13$ planes confirms exactly $4$ such unordered triples in total. **(C) is correct.**

  ### Conclusion
  Correct options: **(B), (C), (D)**.

