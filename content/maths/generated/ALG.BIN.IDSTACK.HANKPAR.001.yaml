  - path: "Student computes $T = 2^{n}$ correctly but uses $S = \\sum a_k^{2} = 2^{2n}$ (squaring the row-sum instead of summing squares), giving $T\\cdot S = 2^{3n}$ and rejecting (A)."
    landed_on_option: "rejects A"
    diagnosis: "Confuses $(\\sum a_k)^{2}$ with $\\sum a_k^{2}$ — misses the palindrome / Vandermonde convolution step that produces $\\binom{2n}{n}$."
  - path: "Computes $D$ at $n = 3$ as $-10$ but assumes the determinant could flip sign for large $n$ because the inner $a_4 = 0$ at $n=3$ looks like an edge case; rejects (B)."
    landed_on_option: "rejects B"
    diagnosis: "Fails to evaluate the Hankel determinant in closed form $-n^{2}(n-1)(n+1)^{2}(n+2)/144$; treats one numerical value as inconclusive."
  - path: "Computes $a_0 a_2 - a_1^{2} = \\tfrac{n(n-1)}{2} - n^{2} = -\\tfrac{n(n+1)}{2}$ but identifies $-\\tfrac{n(n+1)}{2}$ as $-\\binom{n}{2}$ (off-by-one in the binomial), and rejects (D)."
    landed_on_option: "rejects D"
    diagnosis: "Off-by-one between $\\binom{n}{2}=\\tfrac{n(n-1)}{2}$ and $\\binom{n+1}{2}=\\tfrac{n(n+1)}{2}$; the sign is right but the index is misread."

