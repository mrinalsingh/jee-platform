statement: |
  Let $n \geq 3$ be a positive integer and let $a_k = \binom{n}{k}$. Define
  $$T = \sum_{k=0}^{n} a_k, \qquad S = \sum_{k=0}^{n} a_k^{2}, \qquad D = \begin{vmatrix} a_0 & a_1 & a_2 \\ a_1 & a_2 & a_3 \\ a_2 & a_3 & a_4 \end{vmatrix}.$$
  Which of the following statements is/are TRUE?

  (A) $T\cdot S = 2^{n}\binom{2n}{n}$.

  (B) $D < 0$ for every $n \geq 3$.

  (C) $a_0 + a_2 + a_4 + \cdots \;=\; a_1 + a_3 + a_5 + \cdots$.

  (D) $a_0 a_2 - a_1^{2} = -\binom{n+1}{2}$.

answer:
  type: MCQ-MC
  correct_options: [A, B, C, D]

solution: |
  ### The IDEA
  Each statement isolates a distinct binomial identity, all driven by the generating function $f(x)=(1+x)^{n}=\sum a_k x^k$. The cluster $(f(1),\,f(-1),\,[x^{n}]f(x)^{2})$ resolves three of the options, and a direct Pascal-coefficient computation closes the small-index $2\times 2$ sub-determinant. The Hankel $3\times 3$ in (B) is a classical evaluation via the row-ratio $a_{k+1}/a_k=(n-k)/(k+1)$.

  ### (A) — TRUE
  $T = f(1) = (1+1)^{n} = 2^{n}$. For $S$, use the palindrome $a_k = a_{n-k}$:
  $$S = \sum_{k=0}^{n} a_k^{2} \;=\; \sum_{k=0}^{n} a_k \, a_{n-k} \;=\; [x^{n}]\,(1+x)^{2n} \;=\; \binom{2n}{n}.$$
  Therefore $T \cdot S = 2^{n}\binom{2n}{n}$.

  ### (C) — TRUE
  $f(-1) = (1-1)^{n} = 0 = \sum_{k=0}^{n} (-1)^{k} a_k$, so
  $$\sum_{k\text{ even}} a_k \;=\; \sum_{k\text{ odd}} a_k \;=\; 2^{n-1}.$$

  ### (D) — TRUE
  $a_0 a_2 - a_1^{2} = 1\cdot\tfrac{n(n-1)}{2} - n^{2} = \tfrac{n(n-1) - 2n^{2}}{2} = \tfrac{-n(n+1)}{2} = -\binom{n+1}{2}.$

  ### (B) — TRUE
  Expand the $3\times 3$ Hankel determinant by direct algebra (or by the row-ratio recurrence $a_{k+1}=\tfrac{n-k}{k+1}a_k$):
  $$D \;=\; -\,\frac{n^{2}(n-1)(n+1)^{2}(n+2)}{144}.$$
  Every factor on the right is positive for $n \geq 3$, so $D < 0$ strictly. Sanity check at $n=3$: $a_0,\ldots,a_4 = 1,3,3,1,0$ and
  $$\det \;=\; 1(3\cdot 0 - 1) - 3(3\cdot 0 - 3) + 3(3 - 9) \;=\; -1 + 9 - 18 \;=\; -10,$$
  matching $-\tfrac{9\cdot 2\cdot 16\cdot 5}{144} = -10$.

  All four options are correct.

