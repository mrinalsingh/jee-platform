  Four-true MCQ-MC built to reward students who run every option through the (1+x)^n generating function (Options A, C) and complement it with one Pascal-coefficient algebra (D) plus one Hankel closed form (B). The trap is partial-mark play: a student who computes only A, C, D and bails on B leaves marks on the table; a student who only inspects n=3 small case for B may mis-classify it as inconclusive. ALG.BIN sub-tree is sparse — proposed new IDEA "IDSTACK" (a stack of independent binomial identities tested in one configuration) with sub-idea "HANKPAR" (Hankel-of-three-consecutive-rows + parity split via f(-1) + Pascal-difference at small index). Reviewer should confirm IDEA/SUB-IDEA names or align with the in-house convention.
