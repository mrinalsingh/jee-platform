  - path: "For (C), student notices the ground set has equal residues mod $4$ and assumes the count is exactly $\\binom{12}{4}/4=123.75\\to$ rounds to/justifies $132$ via a flawed symmetry argument."
    landed_on_option: "Picks (C)."
    diagnosis: "Roots-of-unity filter requires checking the non-trivial character sums; the residue-balance heuristic is not exact for $\\pmod 4$ on this ground set."
  - path: "For (D), student counts $4$-subsets of evens as $\\binom{6}{4}=15$ but mis-reads/accepts $20$ by confusing with $\\binom{6}{3}\\cdot\\tfrac{\\text{something}}{}$ or arithmetic slip."
