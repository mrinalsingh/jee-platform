statement: |
  Three fair dice are rolled. Let $T$ denote their sum and $\Pi$ denote their product. Which of the following is/are correct?

  - (A) $P(T \equiv 0 \pmod 3) = \dfrac{1}{3}$
  - (B) $P(3 \mid \Pi) = \dfrac{19}{27}$
  - (C) $P(\text{at least one face shows } 6) = \dfrac{1}{2}$
  - (D) $P(\text{all three faces have the same residue mod } 3) = \dfrac{1}{9}$

answer:
  type: MCQ-MC
  correct_options: [A, B, D]

solution: |
  ### The IDEA
  Each die's residue mod $3$ is uniform on $\{0,1,2\}$ since the faces $\{1,2,3,4,5,6\}$ split as two faces per residue class. This makes mod-$3$ questions on dice tractable via independence of uniform residues, and "$3 \mid \Pi$" reduces to a complementary count.

  ### Working
  Label each die's residue $R_i \in \{0,1,2\}$, each value taken with probability $\tfrac{2}{6}=\tfrac{1}{3}$, independently across the three dice.

  **(A)** Sum of three i.i.d.\ uniform residues mod $3$: the convolution of uniform distributions on $\mathbb{Z}/3$ is again uniform on $\mathbb{Z}/3$. Hence $P(T \equiv 0 \pmod 3) = \tfrac{1}{3}$. **True.**

  **(B)** $3 \mid \Pi$ iff at least one die shows a multiple of $3$ (i.e.\ residue $0$). Complement: no die is a multiple of $3$, probability $\left(\tfrac{4}{6}\right)^3 = \tfrac{8}{27}$. So $P(3 \mid \Pi) = 1 - \tfrac{8}{27} = \tfrac{19}{27}$. **True.**

  **(C)** $P(\text{at least one } 6) = 1 - \left(\tfrac{5}{6}\right)^3 = 1 - \tfrac{125}{216} = \tfrac{91}{216} \ne \tfrac{1}{2}$. **False.**

  **(D)** All three dice in the same residue class: choose the class ($3$ ways) and demand all three land there: $3 \cdot \left(\tfrac{2}{6}\right)^3 = 3 \cdot \tfrac{1}{27} = \tfrac{1}{9}$. **True.**

  Correct options: (A), (B), (D).

