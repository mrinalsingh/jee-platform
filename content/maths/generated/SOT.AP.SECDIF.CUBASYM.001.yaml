statement: |
  Let $\{a_n\}$ be the sequence with $a_1=1$ in which the consecutive differences $a_{n+1}-a_n$ form an arithmetic progression with first term $3$ and common difference $3$. Let $S_n=\sum_{k=1}^{n}a_k$. Which of the following statements is/are correct?

  (A) $\displaystyle\lim_{n\to\infty}\Big[(S_{n+1}+S_n)^{1/3}-(2S_n)^{1/3}\Big]=\dfrac{1}{2}$

  (B) $\displaystyle\lim_{n\to\infty}(a_n)^{1/n}=\dfrac{3}{2}$

  (C) $\displaystyle\lim_{n\to\infty}\dfrac{1}{n}\sum_{k=1}^{n}\dfrac{a_k}{k^{2}}=\dfrac{3}{2}$

  (D) The series $\displaystyle\sum_{k=1}^{\infty}\dfrac{1}{a_{k+1}-a_k}$ converges

answer:
  type: MCQ-MC
  correct_options: [A, C]

solution: |
  Since $a_{n+1}-a_n=3+3(n-1)=3n$, by the method of differences
  $$a_n=1+\sum_{k=1}^{n-1}3k=\dfrac{3n^{2}-3n+2}{2},\qquad S_n=\dfrac{n(n^{2}+1)}{2}\sim\dfrac{n^{3}}{2}.$$

  **(A)** Factor out $(2S_n)^{1/3}$ and use $(1+\varepsilon)^{1/3}-1\sim\varepsilon/3$:
  $$(S_{n+1}+S_n)^{1/3}-(2S_n)^{1/3}=(2S_n)^{1/3}\Big[\big(1+\tfrac{S_{n+1}-S_n}{2S_n}\big)^{1/3}-1\Big]\sim(2S_n)^{1/3}\cdot\dfrac{1}{3}\cdot\dfrac{a_{n+1}}{2S_n}=\dfrac{a_{n+1}}{3(2S_n)^{2/3}}.$$
  With $a_{n+1}\sim\dfrac{3n^{2}}{2}$ and $(2S_n)^{2/3}\sim n^{2}$, the limit is $\dfrac{1}{3}\cdot\dfrac{3/2}{1}=\dfrac{1}{2}$. **TRUE.**

  **(B)** For any polynomial $p(n)$ of positive degree, $p(n)^{1/n}\to 1$; in particular $a_n^{1/n}\to 1\neq\dfrac{3}{2}$. **FALSE.**

  **(C)** $\dfrac{a_k}{k^{2}}=\dfrac{3k^{2}-3k+2}{2k^{2}}\to\dfrac{3}{2}$. By the Cesaro-mean theorem, the average of a convergent sequence has the same limit, so the Cesaro mean $\to\dfrac{3}{2}$. **TRUE.**

  **(D)** $a_{k+1}-a_k=3k$, so $\displaystyle\sum_{k=1}^{\infty}\dfrac{1}{a_{k+1}-a_k}=\dfrac{1}{3}\sum_{k=1}^{\infty}\dfrac{1}{k}$ diverges (harmonic). **FALSE.**

  Final answer: **(A), (C)**.

wrong_paths:
  - path: "Student computes the leading coefficient of $a_n$ as $3/2$ (since $a_n\\sim\\tfrac{3}{2}n^{2}$) and naively reads off $\\lim a_n^{1/n}=\\tfrac{3}{2}$, confusing the polynomial leading-coefficient with the geometric growth ratio."
    landed_on_option: "A, B, C"
    diagnosis: "Polynomial-vs-exponential confusion: $p(n)^{1/n}\\to 1$ for every positive-degree polynomial $p$; the ratio $3/2$ has no bearing on $n$-th roots."
  - path: "Student notes $a_{k+1}-a_k=3k$ and recognises $\\sum 1/(3k)$ as $\\tfrac{1}{3}$ times the harmonic series, but recalls (incorrectly) that the harmonic series converges (confusion with $\\sum 1/k^{2}$ or with the alternating harmonic series), marking (D) TRUE."
    landed_on_option: "A, C, D"
    diagnosis: "Harmonic-series convergence error: $\\sum 1/k$ diverges; only $\\sum 1/k^{p}$ with $p>1$ converges."
  - path: "Student tries to evaluate (A) by direct expansion: writes $(S_{n+1}+S_n)^{1/3}-(2S_n)^{1/3}=(2S_n+a_{n+1})^{1/3}-(2S_n)^{1/3}$ and, since both terms tend to $\\infty$, concludes the difference is indeterminate or zero, marking (A) FALSE while keeping (C). Misses the binomial-approximation step that extracts the finite limit."
    landed_on_option: "C"
    diagnosis: "Indeterminate-form panic ($\\infty-\\infty$): student fails to factor out $(2S_n)^{1/3}$ and use the binomial expansion $(1+\\varepsilon)^{1/3}\\approx 1+\\varepsilon/3$ that converts the difference into a convergent ratio."

