  - T4 difficulty: requires three independent ideas (Hadamard, mod-4 divisibility, enumeration). Time budgets reflect that R3/R4 solvers will short-circuit the divisibility argument by remembering the canonical $\{-4,0,4\}$ result.
  - The count $96$ in (C) is a hard-to-derive fact; a strict reading would mark it T5, but it can be reached by careful casework on the $2^3=8$ sign-flip orbits of the rows.
