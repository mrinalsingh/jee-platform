    landed_on_option: "A, C only"
    diagnosis: "TRAP-PARTIAL: classic JEE multi-correct under-mark, treating analytic statements about $V(t)$ as unrelated to the coplanarity statement."
  - path: "For (D), student writes $V(t)=1$ and forgets to subtract $1$ from the constant term, solving $-t^2+t+1=0$ instead; gets $t=(1\\pm\\sqrt{5})/2$ and rejects (D)."
    landed_on_option: "A, B, C only (rejects D)"
    diagnosis: "Equation-setup slip: conflates 'coplanar' ($V=0$) with the level set $V=1$, so the only two surviving roots are the golden-ratio pair, and (D) looks false."
  - path: "For (B), student differentiates $V'(t)=-2t+1=0\\Rightarrow t=1/2$ but computes $V(1/2)=-1/4+1/2+1=5/4$ and then claims this is a minimum because they confuse downward-parabola vertex with minimum; rejects (B)."
    landed_on_option: "A, C, D only"
    diagnosis: "Concavity sign-error: ignores that the leading coefficient of $V(t)$ is negative, so the vertex is a maximum not a minimum."

