statement: |
  Let $\mathbf{a}=(1,1,0)$, $\mathbf{b}=(0,1,1)$, $\mathbf{c}(t)=(t,t^{2},1)$, and let $V(t)=[\mathbf{a}\ \mathbf{b}\ \mathbf{c}(t)]$ denote their scalar triple product. Which of the following is/are correct?

  - (A) $\mathbf{a},\mathbf{b},\mathbf{c}(t)$ are coplanar $\iff t=\dfrac{1\pm\sqrt{5}}{2}$
  - (B) $V(t)$ attains its greatest value $\dfrac{5}{4}$ at $t=\dfrac{1}{2}$
  - (C) The two values of $t$ at which the vectors are coplanar sum to $1$
  - (D) $V(t)=1$ exactly for $t=0$ and $t=1$

answer:
  type: MCQ-MC
  correct_options: [A, B, C, D]

solution: |
  ### The IDEA
  The scalar triple product $[\mathbf{a}\ \mathbf{b}\ \mathbf{c}(t)]$ is the determinant of the matrix whose rows are the three vectors. When the third vector depends polynomially on a parameter $t$, the triple product is itself a polynomial $V(t)$; coplanarity ($V=0$), extrema, level sets ($V=k$), and root-symmetry (Vieta) become routine polynomial questions.

  ### Working
  Expanding the determinant along the first column,
  $$V(t)=\det\!\begin{pmatrix}1&1&0\\ 0&1&1\\ t&t^{2}&1\end{pmatrix}=1\cdot(1-t^{2})-1\cdot(0-t)+0=-t^{2}+t+1.$$

  **(A)** Coplanar $\iff V(t)=0\iff t^{2}-t-1=0\iff t=\dfrac{1\pm\sqrt{5}}{2}$. True.

  **(C)** By Vieta on $t^{2}-t-1=0$, the sum of roots is $-(-1)/1=1$. True.

  **(B)** $V(t)=-t^{2}+t+1$ is a downward parabola; its vertex is at $t=\dfrac{1}{2}$, where $V\!\left(\dfrac{1}{2}\right)=-\dfrac{1}{4}+\dfrac{1}{2}+1=\dfrac{5}{4}$. Since the parabola opens downward, this vertex value is the global maximum. True.

  **(D)** $V(t)=1\iff -t^{2}+t+1=1\iff t^{2}-t=0\iff t(t-1)=0\iff t\in\{0,1\}$. True.

  All four options hold.

wrong_paths:
  - path: "Student sets up the determinant but makes a sign error in the cofactor expansion, getting $V(t)=t^2-t-1$ or $V(t)=-t^2-t+1$; the coplanarity roots then come out non-symmetric or the maximum is mis-located, so (B) is rejected while (A), (C) survive."
    landed_on_option: "A, C only (misses B and D)"
    diagnosis: "TRAP-PARTIAL: arithmetic slip in the $3\\times3$ determinant kills the analytic claims while the conceptual (root-sum) claim still survives, so the student locks in a partial-key."
