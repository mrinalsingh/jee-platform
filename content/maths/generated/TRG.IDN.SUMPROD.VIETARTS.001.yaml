statement: |
  $\tan A$ and $\tan B$ are the roots of $x^{2}-5x+6=0$. Which of the following are correct?

  - (A) $\cot A+\cot B=\tfrac12$
  - (B) $\tan(A+B)=-1$
  - (C) $\tan^{2}A+\tan^{2}B=13$
  - (D) $(1+\tan A)(1+\tan B)=12$

answer:
  type: MCQ-MC
  correct_options: [B, C, D]

solution: |
  ### The IDEA
  When $\tan A$ and $\tan B$ are the roots of a quadratic $x^2-px+q=0$, Vieta gives $p=\tan A+\tan B$ and $q=\tan A\tan B$. Every symmetric trig expression in $A,B$ â€” including $\tan(A+B)=\dfrac{p}{1-q}$, $\tan^2 A+\tan^2 B=p^2-2q$, $\cot A+\cot B=p/q$, and $(1+\tan A)(1+\tan B)=1+p+q$ â€” is then a direct polynomial in $p,q$.

  ### Working
  The roots of $x^{2}-5x+6=0$ are $2,3$, so $p:=\tan A+\tan B=5$ and $q:=\tan A\tan B=6$.

  **(B)** $\tan(A+B)=\dfrac{\tan A+\tan B}{1-\tan A\tan B}=\dfrac{p}{1-q}=\dfrac{5}{1-6}=-1$. **True.**

  **(C)** $\tan^{2}A+\tan^{2}B=(\tan A+\tan B)^2-2\tan A\tan B=p^{2}-2q=25-12=13$. **True.**

  **(D)** $(1+\tan A)(1+\tan B)=1+(\tan A+\tan B)+\tan A\tan B=1+p+q=1+5+6=12$. **True.**

  **(A)** $\cot A+\cot B=\dfrac{1}{\tan A}+\dfrac{1}{\tan B}=\dfrac{\tan A+\tan B}{\tan A\tan B}=\dfrac{p}{q}=\dfrac{5}{6}\neq\dfrac{1}{2}$. **False.**

  Correct options: **(B), (C), (D)**.

