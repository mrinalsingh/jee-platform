statement: |
  Let $A(r)=\bigl|\{(x,y):|x|+|y|\le 2,\ x^{2}+y^{2}\ge r^{2}\}\bigr|$ denote the area of the part of the square $|x|+|y|\le 2$ that lies outside the closed disk of radius $r$ centred at the origin. Which of the following statements is/are correct?

  - (A) $A(1)=8-\pi$
  - (B) $A(\sqrt{2})=8-2\pi$
  - (C) $A(r)=0$ for all $r\ge 2$
  - (D) $A(\sqrt{3})=8-3\pi+12\arccos\sqrt{\tfrac{2}{3}}-4\sqrt{2}$

answer:
  type: MCQ-MC
  correct_options: [A, B, C, D]

solution: |
  ### The IDEA
  The square $|x|+|y|\le 2$ has area $8$, inscribed-circle radius $\sqrt{2}$ (perpendicular distance from $O$ to each edge $x+y=\pm 2$, $-x+y=\pm 2$) and circumscribed-circle radius $2$. The value of $A(r)=\text{area(square)}-\text{area(square}\cap\text{disk)}$ therefore falls into three regimes according to where $r$ sits relative to $\sqrt{2}$ and $2$.

  ### Working
  **Regime 1: $0\le r\le \sqrt{2}$.** The disk lies entirely inside the square, so
  $$A(r)=8-\pi r^{2}.$$
  - At $r=1$: $A(1)=8-\pi$, confirming **(A)**.
  - At $r=\sqrt{2}$: $A(\sqrt{2})=8-2\pi$, confirming **(B)** (the disk is inscribed, touching but not crossing the edges).

  **Regime 2: $\sqrt{2}<r<2$.** The disk now pokes out through each of the four edges of the square. By symmetry the four circular caps cut off by the four edges are congruent. The cap beyond the edge $x+y=2$ is bounded by the chord at distance $\sqrt{2}$ from $O$, so its area is
  $$r^{2}\arccos\!\frac{\sqrt{2}}{r}-\sqrt{2}\sqrt{r^{2}-2}.$$
  The area of the disk that lies inside the square is therefore
  $$\pi r^{2}-4\!\left(r^{2}\arccos\!\frac{\sqrt{2}}{r}-\sqrt{2}\sqrt{r^{2}-2}\right),$$
  whence
  $$A(r)=8-\pi r^{2}+4 r^{2}\arccos\!\frac{\sqrt{2}}{r}-4\sqrt{2}\sqrt{r^{2}-2}.$$
  At $r=\sqrt{3}$: $r^{2}=3$, $\sqrt{r^{2}-2}=1$, $\arccos\sqrt{2/3}$ remains, so
  $$A(\sqrt{3})=8-3\pi+12\arccos\sqrt{\tfrac{2}{3}}-4\sqrt{2},$$
  confirming **(D)**. Note that the naive "disk-inside" formula would give $8-3\pi<0$, a useful signal that the wrong regime was used.

  **Regime 3: $r\ge 2$.** The disk now contains the entire square (since the square's farthest point from $O$ is at distance $2$), so $A(r)=0$, confirming **(C)**. The disk-inside formula $8-\pi r^{2}$ already turned negative for $r>\sqrt{8/\pi}$, another regime-boundary warning.

  All four statements are true.

wrong_paths:
