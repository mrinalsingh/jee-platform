    landed_on_option: "Accepts (A), (B), (C is wrong since $8-\\pi\\cdot 4=8-4\\pi\\ne 0$ but the candidate may still tick C from intuition); rejects (D)."
    diagnosis: "Failure to detect that the disk has crossed the inscribed-circle threshold and now pokes out — classic TRAP-EDGE on the regime boundary $r=\\sqrt{2}$."
  - path: "Compute (C) by checking only $r=\\sqrt{2}$, where the disk merely touches the edges, and conclude the disk already covers the square."
    landed_on_option: "Marks (C) but with the wrong threshold $r\\ge\\sqrt{2}$ instead of $r\\ge 2$; may then reject (B)."
    diagnosis: "Confuses 'disk touches all edges' with 'disk contains all vertices'. The vertices are at distance $2$, not $\\sqrt{2}$, from the origin."
  - path: "For $r=\\sqrt{3}$ use the circular-segment area $\\tfrac12 r^{2}(\\theta-\\sin\\theta)$ with $\\theta=2\\arccos(\\sqrt2/r)$ but forget the factor $4$ for the four edges."
