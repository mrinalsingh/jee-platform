statement: |
  Let $x>0$ be such that $\big(x,\ \lfloor x\rfloor,\ \{x\}\big)$ is a (non-constant) geometric progression, where $\lfloor x\rfloor$ denotes the greatest integer $\le x$ and $\{x\}=x-\lfloor x\rfloor$. Which of the following statements is/are TRUE?

  - (A) $x=\dfrac{3+\sqrt{5}}{2}$ also works.
  - (B) $x=\dfrac{1+\sqrt{5}}{2}$.
  - (C) $x$ satisfies $x^{2}-x-1=0$.
  - (D) $x$ is irrational.

answer:
  type: MCQ-MC
  correct_options: [B, C, D]

solution: |
  Write $n=\lfloor x\rfloor$ and $f=\{x\}$, so $x=n+f$ with $n\in\mathbb{Z}_{\ge 0}$ and $0\le f<1$.

  The GP condition (middle term squared = product of outer terms) gives
  $$\lfloor x\rfloor^{2}=x\cdot\{x\}\ \Longrightarrow\ n^{2}=(n+f)f,$$
  i.e. $f^{2}+nf-n^{2}=0$. The non-negative root is
  $$f=\frac{-n+\sqrt{n^{2}+4n^{2}}}{2}=\frac{n(\sqrt{5}-1)}{2}.$$

  The constraint $f<1$ forces $n<\dfrac{2}{\sqrt{5}-1}=\dfrac{\sqrt{5}+1}{2}<2$, so $n\in\{0,1\}$. The value $n=0$ gives $f=0$, making the middle term $0$ and the GP degenerate, so $n=1$.

  Then $f=\dfrac{\sqrt{5}-1}{2}$ and
  $$x=1+f=\frac{\sqrt{5}+1}{2}.\quad\textbf{(B)}$$

  This $x$ satisfies $x^{2}=x+1$, i.e. $x^{2}-x-1=0$ — \textbf{(C)}. As a root of a primitive integer polynomial with no rational root (by the rational-root theorem), $x$ is irrational — \textbf{(D)}.

  For (A): $x=\dfrac{3+\sqrt{5}}{2}\approx 2.618$ has $\lfloor x\rfloor=2$ and $\{x\}=\dfrac{\sqrt{5}-1}{2}$, so $\lfloor x\rfloor^{2}=4$ while $x\{x\}=\dfrac{\sqrt{5}+1}{2}\approx 1.618$. These are unequal, so the GP fails — \textbf{(A) is false}.

  Hence the correct options are \textbf{(B), (C), (D)}.

