review_notes: |
  Classic golden-ratio GP problem. The 4-way 'correct' option set (B,C,D) tests (i) the existence/uniqueness argument via the $f<1$ bound forcing $n=1$, (ii) recognising the minimal polynomial $x^2-x-1=0$, and (iii) the rational-root argument for irrationality. Trap (A) is the natural $n=2$ candidate that students reach by skipping the $f<1$ check. Taxonomy note: new idea code FLRGP (floor + fractional-part GP) and sub-idea GOLDEN (golden-ratio quadratic). Could alternatively live under SET.FUN if floor-as-function angle is preferred.
