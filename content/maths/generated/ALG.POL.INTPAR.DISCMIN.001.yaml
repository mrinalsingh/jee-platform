review_notes: |
  Clean two-parameter integer-optimisation problem under a cubic-discriminant constraint. Genuine MCQ-MC: (A) and (B) form a coupled pair (existence + uniqueness of the minimiser), while (C) and (D) are well-designed traps tied to misreading the structure at the minimum. Difficulty T3: the discriminant/sieve step is standard, but checking uniqueness over $b\ge 2$ and the local-max trap in (D) require care. Proposed new axis-3 code `INTPAR` (integer-parameter optimisation on polynomial coefficient pairs) and axis-4 sub-idea `DISCMIN` (minimise via discriminant inequality sieve) under ALG.POL — taxonomy currently has no ALG.POL ideas listed.
