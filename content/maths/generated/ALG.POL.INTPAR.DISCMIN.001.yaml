statement: |
  Let $f(x)=2x^3+ax^2+bx$ where $a,b\in\mathbb{N}$, and suppose $f$ has three distinct real roots. Then which of the following are true?

  A) $\min(a+b)=4$

  B) The unique minimiser of $a+b$ gives $f(x)=x(2x+1)(x+1)$

  C) All three roots are positive at the minimum

  D) The local maximum value of $f$ equals $0$ at the minimum

answer:
  type: MCQ-MC
  correct_options: [A, B]

solution: |
  Factor: $f(x)=x(2x^2+ax+b)$, so $x=0$ is always a root. For three distinct real roots, the quadratic $2x^2+ax+b$ must have two distinct real roots, both nonzero.

  - Distinct real roots: discriminant $a^2-8b>0$, i.e. $a^2>8b$.
  - Nonzero: $b\ne 0$, automatic since $b\in\mathbb{N}$.

  Minimise $a+b$ over $a,b\in\mathbb{N}$ with $a^2>8b$:
  - $b=1$: $a^2>8\Rightarrow a\ge 3$, so $a+b\ge 4$, attained at $(a,b)=(3,1)$.
  - $b=2$: $a^2>16\Rightarrow a\ge 5$, so $a+b\ge 7$.
  - Larger $b$ only worsens the bound.

  Hence $\min(a+b)=4$, attained uniquely at $(a,b)=(3,1)$, giving
  $$f(x)=2x^3+3x^2+x=x(2x+1)(x+1),$$
  with roots $\{0,-\tfrac12,-1\}$. So (A) and (B) are correct.

  (C) The three roots are $0,-\tfrac12,-1$ — two strictly negative and one zero, not all positive. False.

  (D) $f'(x)=6x^2+6x+1$ vanishes at $x=\dfrac{-1\pm 1/\sqrt3}{2}$. The local maximum lies at $x_*=\dfrac{-1-1/\sqrt3}{2}<-\tfrac12$, and
  $$f(x_*)=\dfrac{\sqrt3}{18}\ne 0.$$
  The root $x=0$ is not where the local max lives. False.

  Correct options: (A), (B).

