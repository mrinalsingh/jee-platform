statement: |
  For each ordered triple $(a,b,c)$ with $a,b,c \in \{0,1,2\}$ and $(a,b,c) \neq (0,0,0)$, form the plane
  $$
  \pi_{(a,b,c)} :\quad ax + by + cz = a + 2b + 3c .
  $$
  Two such equations describe the **same** plane exactly when one normal is a nonzero scalar multiple of the other. Which of the following are correct?

  - (A) every one of these planes passes through the point $(1,2,3)$
  - (B) the number of distinct planes obtained equals $26$
  - (C) the number of distinct planes obtained equals $19$
  - (D) among these distinct planes, the number of unordered pairs whose two normals are perpendicular equals $14$

answer:
  type: MCQ-MC
  correct_options: [A, C]

solution: |
  ### The IDEA
  Every plane is written as $ax+by+cz = a+2b+3c$, i.e. the right-hand side is exactly $a\cdot 1 + b\cdot 2 + c\cdot 3$. So the question is really about the $26$ normal vectors $(a,b,c)$ with entries in $\{0,1,2\}$, not zero — counting how many give **distinct** planes (collapse proportional normals to a primitive direction), and how many pairs of distinct directions are perpendicular.

  ### Option (A) — shared point
  Substituting $(x,y,z)=(1,2,3)$ into the left side gives $a\cdot 1 + b\cdot 2 + c\cdot 3 = a+2b+3c$, which is exactly the right-hand side for **every** $(a,b,c)$. Hence all $26$ planes pass through $(1,2,3)$. **(A) is correct.**

  ### Options (B) and (C) — counting distinct planes
  Because all the planes share the point $(1,2,3)$, two of them coincide **iff** their normals are proportional. (Two distinct planes through a common point with parallel normals would have to be the same plane.) So the number of distinct planes equals the number of **primitive directions** among the $26$ tuples.

  Reduce each $(a,b,c)$ by its $\gcd$. The tuples that are **not** primitive (a nonzero scalar multiple of a smaller tuple already in the list) are exactly those all of whose nonzero entries equal $2$:
  $$
  (2,0,0),\ (0,2,0),\ (0,0,2),\ (2,2,0),\ (2,0,2),\ (0,2,2),\ (2,2,2),
  $$
  which is $7$ tuples; each collapses onto its primitive reduction $((1,0,0)$, $(0,1,0)$, $\dots$, $(1,1,1))$, already present in the list. Every other tuple is already primitive. Hence the number of distinct planes is
  $$
  26 - 7 = 19 .
  $$
  So **(C) is correct** and **(B) (the value $26$) is the gcd-collapse trap — false.**

  ### Option (D) — perpendicular pairs
  Among the $19$ primitive direction vectors, count unordered pairs $\{\mathbf n_1,\mathbf n_2\}$ with $\mathbf n_1\cdot\mathbf n_2 = 0$. Enumerating over the primitive set gives exactly $\mathbf{12}$ perpendicular pairs, not $14$. **(D) is false** (the inflated count of $14$ comes from accidentally re-including the collapsed non-primitive directions, double-counting two pairs).

  ### Answer
  $\boxed{(A),\ (C)}$

