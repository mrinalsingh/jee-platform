    landed_on_option: "C"
    diagnosis: "TRAP-PARTIAL: drops the $-(-1)$ contribution. The non-trivial roots sum to $-1$ (not $0$); only the FULL set of $7$th roots sums to $0$."
  - path: "For (D), student reads the index range as $k=1,\\dots,6$ (non-trivial roots) and computes $\\sum_{k=1}^{6}\\omega^k = -1$, marking (D) true."
    landed_on_option: "D"
    diagnosis: "TRAP-PARTIAL / index-range trap. The summation explicitly starts at $k=0$, including $\\omega^0 = 1$, so the total is $0$, not $-1$."
  - path: "For (A), student tries to pair terms $\\frac{1}{1-\\omega^k} + \\frac{1}{1-\\omega^{7-k}}$ using $\\omega^{7-k} = \\overline{\\omega^k}$ but mis-simplifies the algebra and lands on an incorrect value (e.g. $6$ or $7/2$), discarding (A)."
