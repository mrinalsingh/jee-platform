statement: |
  Let $\omega = e^{2\pi i/7}$ and $S = \{\omega, \omega^2, \ldots, \omega^6\}$ denote the set of non-trivial $7$th roots of unity. Which of the following statement(s) is/are TRUE?

  - (A) $\displaystyle\sum_{k=1}^{6}\frac{1}{1-\omega^{k}} = 3$
  - (B) $\displaystyle\prod_{k=1}^{6}(1-\omega^{k}) = 7$
  - (C) $\displaystyle\sum_{k=1}^{6}|1-\omega^{k}|^{2} = 12$
  - (D) $\displaystyle\sum_{k=0}^{6}\omega^{k} = -1$

answer:
  type: MCQ-MC
  correct_options: [A, B]

solution: |
  ### The IDEA
  Factor $z^7 - 1 = \prod_{k=0}^{6}(z - \omega^k)$ and isolate the non-trivial roots via $g(z) := \dfrac{z^7-1}{z-1} = \prod_{k=1}^{6}(z-\omega^k) = 1 + z + z^2 + \cdots + z^6$. Then $g(1) = 7$ handles the product, the logarithmic derivative $g'/g = \sum 1/(z-\omega^k)$ handles the reciprocal sum, and $|1-\omega^k|^2 = 2 - 2\cos(2\pi k/7)$ with $\sum_{k=1}^{6}\omega^k = -1$ handles the modulus-squared sum.

  ### Working
  **(B)** $\displaystyle\prod_{k=1}^{6}(1-\omega^k) = g(1) = 1 + 1 + \cdots + 1 = 7.$ TRUE.

  **(A)** Take logarithmic derivative of $g(z) = \prod_{k=1}^{6}(z-\omega^k)$:
  $$\frac{g'(z)}{g(z)} = \sum_{k=1}^{6}\frac{1}{z-\omega^k}.$$
  At $z = 1$: $g(1) = 7$ and $g'(z) = \dfrac{d}{dz}\dfrac{z^7-1}{z-1} = \dfrac{7z^6(z-1) - (z^7-1)}{(z-1)^2}$. Using L'Hopital (or expanding $g(z) = \sum_{j=0}^{6}z^j$ so $g'(1) = \sum_{j=0}^{6} j = 21$):
  $$\sum_{k=1}^{6}\frac{1}{1-\omega^k} = \frac{g'(1)}{g(1)} = \frac{21}{7} = 3.$$
  (General fact: for $n$th roots, $\sum 1/(1-\omega^k) = (n-1)/2$.) TRUE.

  **(C)** $|1-\omega^k|^2 = (1-\omega^k)(1-\overline{\omega^k}) = 2 - 2\cos(2\pi k/7)$. Hence
  $$\sum_{k=1}^{6}|1-\omega^k|^2 = 12 - 2\,\mathrm{Re}\!\sum_{k=1}^{6}\omega^k = 12 - 2(-1) = 14 \neq 12.$$
  FALSE.

  **(D)** The sum runs from $k=0$, so $\omega^0 = 1$ is included: $\sum_{k=0}^{6}\omega^k = 0$ (sum of all $7$th roots), not $-1$. The value $-1$ is $\sum_{k=1}^{6}\omega^k$. FALSE.

