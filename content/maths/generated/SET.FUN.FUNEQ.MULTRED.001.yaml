statement: |
  Let $f:\mathbb{R}\to[1,\infty)$ be differentiable and satisfy
  $$f(xy)=f(x)f(y)-f(x)-f(y)+2 \quad \text{for all } x,y\in\mathbb{R},$$
  with $f(2)=5$. Which of the following are TRUE?

  (A) $f(x)+1$ is multiplicative

  (B) $f(3)=8$

  (C) $f'(2)=4$

  (D) $f$ is even and $f(\sqrt{5})=6$

answer:
  type: MCQ-MC
  correct_options: [C, D]

solution: |
  Let $g(x)=f(x)-1$. Substituting $f=g+1$ into the functional equation:
  $$g(xy)+1=(g(x)+1)(g(y)+1)-(g(x)+1)-(g(y)+1)+2=g(x)g(y)+1,$$
  so $g(xy)=g(x)g(y)$ — i.e. **$f(x)-1$** (not $f(x)+1$) is multiplicative. Hence **(A) is FALSE**.

  Put $x=y=1$: $g(1)=g(1)^2$, so $g(1)\in\{0,1\}$. Since $f$ has range $[1,\infty)$, $g\ge 0$. If $g(1)=0$, then $g(x)=g(x\cdot 1)=g(x)\,g(1)=0$ for all $x$, contradicting $f(2)=5$ (i.e. $g(2)=4$). Hence $g(1)=1$, so $f(1)=2$.

  $g$ is multiplicative, differentiable on $\mathbb{R}$, with $g(2)=4$. The standard classification of multiplicative differentiable functions gives $g(x)=|x|^{c}$ on $x\ne 0$; from $g(2)=2^{c}=4$ we get $c=2$, so $g(x)=x^{2}$. Hence
  $$f(x)=x^{2}+1 \quad \text{for all } x\in\mathbb{R}.$$

  - **(B)** $f(3)=9+1=10\ne 8$. **FALSE.**
  - **(C)** $f'(x)=2x$, so $f'(2)=4$. **TRUE.**
  - **(D)** $f(-x)=x^{2}+1=f(x)$, so $f$ is even; and $f(\sqrt{5})=5+1=6$. **TRUE.**

  Correct options: **(C), (D)**.

