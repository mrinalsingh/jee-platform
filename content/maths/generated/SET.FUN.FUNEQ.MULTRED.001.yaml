review_notes: |
  Multi-correct calculus / functional-equation item. The trap is whether (A) reads as "shift by +1" or "shift by -1" — substitution $g=f-1$ is the only safe path. The range constraint $f\ge 1$ is load-bearing: it forces $g(1)=1$ (not 0) and the even branch of $g(x)=|x|^2=x^2$. Difficulty T3 — standard once $g$-substitution is seen, but the multiple sub-checks and the parity issue raise the bar. Used a new IDEA code FUNEQ under SET.FUN (functional equations) with sub-idea MULTRED (multiplicative reduction by additive shift); taxonomy extension needed.
