statement: |
  Let $T$ be the number of unordered triples $\{a,b,c\}$ chosen from $\{1,2,\dots,1000\}$ (with repetition allowed in the multiset sense, i.e. $a\le b\le c$) such that $a+b+c\equiv 0\pmod{4}$. Which of the following statements are correct?

  (A) $T=250^{3}+\binom{250}{3}+3\binom{250}{2}\cdot 250$

  (B) $T=250^{3}$

  (C) $T$ equals the number of unordered triples from $\{1,\dots,1000\}$ whose sum is $\equiv 0\pmod{5}$

  (D) Each residue class modulo $4$ in $\{1,2,\dots,1000\}$ contains exactly $250$ elements

answer:
  type: MCQ-MC
  correct_options: [A, D]

solution: |
  Since $1000=4\cdot 250$, the set $\{1,2,\dots,1000\}$ contains exactly $250$ elements in each residue class $\{0,1,2,3\}$ modulo $4$, establishing $\textbf{(D)}$.

  The unordered residue-triples $(i,j,k)$ with $i\le j\le k$ and $i+j+k\equiv 0\pmod 4$ are
  $$ (0,0,0),\ (0,1,3),\ (0,2,2),\ (1,1,2),\ (2,3,3). $$

  Their contributions to $T$ are:

  - $(0,0,0)$: choose $3$ from the $250$ zeros — $\binom{250}{3}$.
  - $(0,1,3)$: all distinct residues, one from each class — $250^{3}$.
  - $(0,2,2),\ (1,1,2),\ (2,3,3)$: one singleton and an unordered pair from another class — each contributes $250\cdot\binom{250}{2}$.

  Hence
  $$T=250^{3}+\binom{250}{3}+3\binom{250}{2}\cdot 250 = 41\,541\,750,$$
  giving $\textbf{(A)}$.

  $\textbf{(B)}$: $250^{3}=15\,625\,000$ accounts only for the all-distinct-residue case $(0,1,3)$ and misses the four other residue patterns, so false.

  $\textbf{(C)}$: For sum $\equiv 0\pmod 5$ the residue classes also split evenly into $200$ each, but the multiset enumeration of admissible residue-triples mod $5$ is different and gives $33\,233\,400\ne T$, so false.

wrong_paths:
  - path: "Student treats $T$ as ordered triples of distinct residues (one from each class summing to $0\\pmod 4$ via classes $0,1,3$) and writes $T=250^3$, forgetting the same-class patterns $(0,0,0),(0,2,2),(1,1,2),(2,3,3)$."
    landed_on_option: "B"
    diagnosis: "Partial residue enumeration — counts only the distinct-class pattern."
  - path: "Student observes that mod $5$ also partitions $\\{1,\\dots,1000\\}$ evenly (200 per class) and assumes by symmetry that the count of zero-sum triples is the same as for mod $4$, ignoring that the admissible multisets of residues differ."
    landed_on_option: "C"
    diagnosis: "Spurious symmetry — confuses equal-class-sizes with equal triple-counts."
  - path: "Student forgets the all-zero-residue pattern $(0,0,0)$ and computes only $250^{3}+3\\binom{250}{2}\\cdot 250$; this matches none of the closed-form options, so the student rounds to (B)."
    landed_on_option: "B"
    diagnosis: "Drops the $(0,0,0)$ multiset contribution."

review_notes: |
  Multi-correct identity check on modular counting. (A) tests the full residue-multiset enumeration; (D) is the gateway fact making the counts clean. (B) traps students who count only the distinct-residue pattern. (C) traps those who assume equal class sizes imply equal zero-sum-triple counts across moduli. Surface is SURF-SET (counting over a finite set). Trap labeled TRAP-PARTIAL since the dominant failure is partial enumeration of residue patterns. Note: new axis-3/axis-4 codes proposed — idea MODCNT (mod-class counting), sub-idea RESTRIP (residue-triple enumeration); reviewer should confirm or merge with PNC.COM existing codes.
