    landed_on_option: "B"
    diagnosis: "Sign error in the discriminant inequality; ignores that both numerator and denominator $x^2\\pm x+1>0$ for all real $x$, which forces $y>0$ (TRAP-PARTIAL — correct method, wrong endpoint)."
  - path: "Student treats the equation $(y-1)x^2-(y+1)x+(y-1)=0$ as a genuine quadratic, divides by $(y-1)$, and then excludes $y=1$ from the range."
    landed_on_option: "C"
    diagnosis: "Fails to check the degenerate case $y=1$: the equation becomes linear $-2x=0$ with solution $x=0$, so $y=1$ is attained. Classic TRAP-EDGE on the leading-coefficient vanishing."
  - path: "Student computes endpoints $\\tfrac13$ and $3$ but does not notice the $x\\mapsto -x$ symmetry, so fails to recognise (D) as a structural consequence and only marks (A)."
    landed_on_option: "A only"
    diagnosis: "Misses the multiplicative reciprocal symmetry $y(-x)=1/y(x)$; arithmetically $(\\max)(\\min)=1$ still holds but the student doesn't verify it (TRAP-PARTIAL)."

