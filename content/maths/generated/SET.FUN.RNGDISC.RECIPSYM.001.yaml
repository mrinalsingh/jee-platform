statement: |
  Let $y=\dfrac{x^{2}+x+1}{x^{2}-x+1}$, $x\in\mathbb{R}$. Which of the following statements are correct?

  - (A) range $=\left[\tfrac{1}{3},\,3\right]$
  - (B) $\min y=-\tfrac{1}{3}$
  - (C) $y$ attains all values of $\left[\tfrac{1}{3},\,3\right]$ except $y=1$
  - (D) $(\max y)(\min y)=1$

answer:
  type: MCQ-MC
  correct_options: [A, D]

solution: |
  ### The IDEA
  To find the range of a rational function $y=\dfrac{P(x)}{Q(x)}$ whose numerator and denominator are quadratics in $x$, rewrite the relation as a quadratic in $x$ with $y$ as a parameter and demand the discriminant be non-negative (real-$x$ condition). A bonus symmetry $x\mapsto -x$ here sends $y\mapsto 1/y$, forcing the extrema to be reciprocals.

  ### Working
  Cross-multiplying $y(x^{2}-x+1)=x^{2}+x+1$ gives
  $$(y-1)x^{2}-(y+1)x+(y-1)=0.$$
  For real $x$ the discriminant must satisfy
  $$(y+1)^{2}-4(y-1)^{2}\ge 0 \;\Longrightarrow\; 3y^{2}-10y+3\le 0 \;\Longrightarrow\; y\in\left[\tfrac{1}{3},\,3\right].$$
  At $y=1$ the equation degenerates to $-2x=0$, giving $x=0$; thus $y=1$ is attained. The endpoints $y=\tfrac{1}{3}$ (at $x=-1$) and $y=3$ (at $x=1$) are attained.

  Hence (A) is **true** (range $=[\tfrac{1}{3},3]$) and (C) is **false** ($y=1$ is in the range).

  For (D), note $y(-x)=\dfrac{x^{2}-x+1}{x^{2}+x+1}=\dfrac{1}{y(x)}$. So if $m=\min y$ is attained at $x=x_{0}$, then $1/m$ is attained at $x=-x_{0}$ and must equal $\max y$. Hence $(\max y)(\min y)=3\cdot\tfrac{1}{3}=1$, so (D) is **true**.

  Finally $\min y=+\tfrac{1}{3}>0$, not $-\tfrac{1}{3}$; (B) is **false**.

  Correct: (A), (D).

