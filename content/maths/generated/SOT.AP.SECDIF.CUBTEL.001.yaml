statement: |
  Let $a_1=1,\ a_2=4,\ a_3=10,\ a_4=19,\dots$ be a sequence whose successive differences $\{a_n-a_{n-1}\}_{n\ge 2}$ form an A.P. Let $S_n=\sum_{k=1}^{n} a_k$. Which of the following statement(s) is/are TRUE?

  (A) $a_{10}=136$

  (B) $S_n=\dfrac{n(n+1)(2n+1)}{6}$ for every $n\ge 1$

  (C) $2a_n=n^3-(n-1)^3+1$ for every $n\ge 1$

  (D) $S_{10}=506$

answer:
  type: MCQ-MC
  correct_options: [A, C]

solution: |
  Since $a_n-a_{n-1}$ is an A.P. with $a_2-a_1=3,\ a_3-a_2=6,\ a_4-a_3=9,\dots$, the common difference is $3$ and $a_n-a_{n-1}=3(n-1)$. Hence
  $$a_n=1+3\sum_{k=1}^{n-1}k=1+\frac{3n(n-1)}{2}=\frac{3n^2-3n+2}{2}.$$

  **(A)** $a_{10}=\dfrac{300-30+2}{2}=136$. **TRUE.**

  **(C)** Use the cube-telescoping identity $n^3-(n-1)^3=3n^2-3n+1$. Then
  $$2a_n=3n^2-3n+2=(n^3-(n-1)^3)+1.$$
  **TRUE.**

  Summing the identity in (C) from $k=1$ to $n$ telescopes:
  $$2S_n=\sum_{k=1}^{n}\big(k^3-(k-1)^3\big)+\sum_{k=1}^{n}1=n^3+n,$$
  so $S_n=\dfrac{n(n^2+1)}{2}$.

  **(B)** This is *not* $\dfrac{n(n+1)(2n+1)}{6}$. Check at $n=3$: our formula gives $\tfrac{3\cdot 10}{2}=15$, while the NCERT square-sum formula gives $14$. **FALSE.**

  **(D)** $S_{10}=\dfrac{10\cdot 101}{2}=505\neq 506$. **FALSE.**

  Final answer: **(A), (C)**.

wrong_paths:
  - path: "Student notices that the first few terms $1,4,10,19$ look 'pyramidal' and matches the partial sums to memorized $\\sum k^2$ formula $\\tfrac{n(n+1)(2n+1)}{6}$ without verifying, mistaking $a_n$ for $\\sum_{k=1}^n k^2$ (which is $1,5,14,30,\\dots$) or just guessing the closest classical cubic-in-$n$ closed form."
    landed_on_option: "B"
    diagnosis: "NCERT-formula reflex; misidentifies the sequence type without checking values"
  - path: "Student correctly derives $a_n=\\tfrac{3n^2-3n+2}{2}$ but, when computing $S_{10}$, drops a factor or makes the off-by-one arithmetic slip $2S_{10}=10^3+10+2=1012$ (counting the constant '$1$' as appearing $n+1$ times), yielding $S_{10}=506$."
    landed_on_option: "D"
    diagnosis: "off-by-one in the telescoping sum's constant term"
  - path: "Student uses $a_n-a_{n-1}=3n$ instead of $3(n-1)$ (forgetting the index shift in the differences), gets $a_n=1+\\tfrac{3n(n+1)}{2}$, hence $a_{10}=1+165=166\\ne 136$ and rejects (A); the cube identity in (C) then also fails to match, so they reject (C) as well, retaining only (B) and (D) by elimination."
    landed_on_option: "B, D"
    diagnosis: "index-shift error in the difference sequence; partial-credit miss on (A) and (C)"

