    diagnosis: "Off-by-one on the geometric series (drops the $n=0$ term)."
  - path: "Identifies the four discontinuity points but takes the limit value $0$ (from $cu>1$ side) instead of $\\tfrac38$, getting $8\\cdot 0=0$."
