statement: |
  Let $c=\displaystyle\sum_{n=0}^{\infty} 4^{-n}$ and define
  $$f(x)=\lim_{m\to\infty}\frac{\sin^{2}(\pi x)}{1+\big(c\sin^{2}(\pi x)\big)^{m}}.$$
  Let $S=\{x\in\mathbb{R}: f \text{ is discontinuous at } x\}$. Find the value of
  $$8\sum_{x\in S\cap[0,2]} f(x).$$

answer:
  type: NUM-INT
  value: 12

solution: |
  ### The IDEA
  A limit of the form $\displaystyle\lim_{m\to\infty}\frac{A}{1+B^{m}}$ is a three-case step: it equals $A$ when $|B|<1$, equals $0$ when $|B|>1$, and equals $A/2$ when $B=1$. The discontinuities of $f$ therefore live exactly on the boundary level set $\{B=1\}$, where the limit jumps between branches.

  ### Working
  First, $c=\displaystyle\sum_{n=0}^{\infty}4^{-n}=\dfrac{1}{1-1/4}=\dfrac{4}{3}$.

  Let $u=\sin^{2}(\pi x)\in[0,1]$ and $B=cu=\tfrac{4u}{3}$. Then
  $$f(x)=\begin{cases} u, & cu<1\ \text{i.e.}\ u<\tfrac34,\\[2pt] 0, & cu>1\ \text{i.e.}\ u>\tfrac34,\\[2pt] \dfrac{u}{2}=\dfrac{3}{8}, & cu=1\ \text{i.e.}\ u=\tfrac34. \end{cases}$$

  On either side of $u=\tfrac34$ the two branches give limits $\tfrac34$ and $0$, while the value at $u=\tfrac34$ is $\tfrac38$; hence $f$ is discontinuous exactly where $\sin^{2}(\pi x)=\tfrac34$, i.e. $\sin(\pi x)=\pm\dfrac{\sqrt 3}{2}$, i.e. $\pi x\equiv \pm\tfrac{\pi}{3}\pmod{\pi}$.

  In $[0,2]$ this yields $x\in\left\{\tfrac13,\tfrac23,\tfrac43,\tfrac53\right\}$ — four points, with $f(x)=\tfrac38$ at each.

  Therefore $\displaystyle 8\sum_{x\in S\cap[0,2]} f(x)=8\cdot 4\cdot\tfrac38=12.$

