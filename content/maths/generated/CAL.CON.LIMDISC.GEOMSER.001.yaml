    diagnosis: "Misses that the $\\frac{A}{1+B^m}$ limit is a piecewise step — the discontinuity comes from the branch switch at $B=1$, not from $u$ being discontinuous."
  - path: "Correctly finds the discontinuity locus $\\sin^2(\\pi x)=\\tfrac34$ but uses the wrong-branch value $f=u=\\tfrac34$ instead of the boundary value $\\tfrac38$."
