statement: |
  Let $(x,y)$ lie on the ellipse $\mathcal{E}:\dfrac{x^{2}}{9}+\dfrac{y^{2}}{16}=1$. Which of the following statements are correct?

  - (A) $\max(4x+3y)=12\sqrt{2}$
  - (B) $\max(xy)=12$
  - (C) range of $x^{2}-y^{2}$ is $[-16,\,9]$
  - (D) $\min(x^{2}+y^{2})=16$

answer:
  type: MCQ-MC
  correct_options: [A, C]

solution: |
  ### The IDEA
  Parametrise the ellipse as $(x,y)=(3\cos t,\,4\sin t)$ and reduce every quantity to a trigonometric expression in $t$; then read off ranges using amplitude / double-angle / $\sin^{2}t\in[0,1]$. The traps all reward plugging in the semi-axis values $a=3,\,b=4$ blindly.

  ### Working
  Write $(x,y)=(3\cos t,\,4\sin t)$.

  **(A)** $4x+3y = 12\cos t+12\sin t = 12\sqrt{2}\sin(t+\tfrac{\pi}{4})$, so $\max=12\sqrt{2}$. (Equivalently, by Cauchy–Schwarz on $\bigl(\tfrac{x}{3}\bigr)^{2}+\bigl(\tfrac{y}{4}\bigr)^{2}=1$.) **True.**

  **(B)** $xy = 12\sin t\cos t = 6\sin 2t$, so $\max(xy)=6$, not $12$. **False.** ($12=a\cdot b$ is the semi-axis-product bait.)

  **(C)** $x^{2}-y^{2} = x^{2}-16\bigl(1-\tfrac{x^{2}}{9}\bigr) = \tfrac{25}{9}x^{2}-16$. With $x^{2}\in[0,9]$ this sweeps $[-16,\,9]$. **True.**

  **(D)** $x^{2}+y^{2} = 9\cos^{2}t+16\sin^{2}t = 9+7\sin^{2}t\in[9,16]$, so $\min=9$ (at $(\pm3,0)$) and $\max=16$ (at $(0,\pm4)$). The claim $\min=16$ swaps minor and major. **False.**

  Hence the correct options are $(A)$ and $(C)$.

