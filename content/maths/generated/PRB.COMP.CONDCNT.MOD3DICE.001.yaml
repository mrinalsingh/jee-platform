review_notes: |
  Multi-correct probability problem hinging on residues mod 3 of $\{1,\dots,9\}$. The key insight is that the residue classes are equinumerous (3 each), making counts inside $F$ clean. The two false options (A,C) both fail because the student over-applies a "by symmetry it must be 1/3" heuristic; the correct ones (B,D) require careful case-splits of all-distinct triples in $F$ and a direct count for all-equal. New axis-3/4 codes proposed: CONDCNT (conditional probability via direct counting) and MOD3DICE (residue partition on dice faces); flag for taxonomy extension. Difficulty T3 — standard hard JEE conditional-probability multi-correct.
