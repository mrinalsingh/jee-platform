statement: |
  Three fair dice, with faces $1$--$9$, are rolled. Let $F=\{\text{sum}\equiv 0\pmod 3\}$, and let $E_1,E_2,E_3$ be the events that all three faces are equal, all three are distinct, and exactly two are equal, respectively. Then

  - (A) $P(F\mid E_1)=\dfrac{1}{3}$
  - (B) $P(E_2\mid F)=\dfrac{20}{27}$
  - (C) $P(F\mid E_2)=\dfrac{1}{3}$
  - (D) $P(E_1\mid F)=\dfrac{1}{27}$

answer:
  type: MCQ-MC
  correct_options: [B, D]

solution: |
  ### The IDEA
  Because $\{1,2,\dots,9\}$ splits evenly into three residue classes mod $3$ (each of size $3$), the sum $\equiv 0\pmod 3$ event $F$ has a very clean count, and conditional probabilities reduce to ratios of structured counts.

  ### Working
  Residue classes mod $3$ on $\{1,\dots,9\}$: each class has exactly $3$ elements. Total ordered outcomes: $9^3=729$. Outcomes in $F$: by symmetry, $729/3=243$.

  **(A)** If all three faces are equal, the sum is $3k\equiv 0$, so $P(F\mid E_1)=1\neq\tfrac{1}{3}$. **False.**

  **(B)** All-distinct outcomes in $F$ come in two types.
  - One face from each residue class: $3\cdot 3\cdot 3\cdot 3! = 162$.
  - All three faces from the same residue class (the class itself contributes sum $\equiv 0$): $3\cdot(3\cdot 2\cdot 1)=18$.

  Total: $180$. Hence $P(E_2\mid F)=\dfrac{180}{243}=\dfrac{20}{27}$. **True.**

  **(C)** All-distinct ordered outcomes: $9\cdot 8\cdot 7=504$. Of these, $180$ lie in $F$. So $P(F\mid E_2)=\dfrac{180}{504}=\dfrac{5}{14}\neq\dfrac{1}{3}$. **False.**

  **(D)** All-equal outcomes in $F$: any of the $9$ values works, giving $9$ ordered outcomes. So $P(E_1\mid F)=\dfrac{9}{243}=\dfrac{1}{27}$. **True.**

