statement: |
  Let $\mathcal{C}$ be the curve $y=x^{3}-3x$. For each real $t$, the tangent to $\mathcal{C}$ at $P=(t,\,t^{3}-3t)$ meets $\mathcal{C}$ again at a point $Q$ (assume $t\neq 0$ so that $Q\neq P$). Let $M$ be the midpoint of $PQ$. Which of the following statements is/are correct?

  - (A) The locus of $M$, as $t$ varies, is $y=28x^{3}-3x$
  - (B) The chord $PQ$ passes through a point that is independent of $t$
  - (C) The locus of $M$ has exactly two points at which the tangent (to the locus) is horizontal
  - (D) Among all such chords $PQ$, the chord of smallest length occurs at $t=\pm 1$

answer:
  type: MCQ-MC
  correct_options: [A, C]

solution: |
  ### The IDEA
  For a cubic $y=x^{3}-3x$, the tangent at $P=(t,t^{3}-3t)$ meets the curve at a point whose $x$-coordinate is determined by a double-root factorisation: the contact contributes a factor $(x-t)^{2}$, and Vieta on the resulting cubic locates the third intersection at $x_{Q}=-2t$. From $Q=(-2t,-8t^{3}+6t)$, all four claims reduce to one-line algebra on $M=\tfrac{1}{2}(P+Q)$ and on $|PQ|^{2}$.

  ### Working
  Slope at $P$: $m=3t^{2}-3$. Tangent line:
  $$y=(3t^{2}-3)(x-t)+t^{3}-3t=(3t^{2}-3)x-2t^{3}.$$
  Intersecting with $\mathcal{C}$:
  $$x^{3}-3x=(3t^{2}-3)x-2t^{3}\;\Longleftrightarrow\;x^{3}-3t^{2}x+2t^{3}=0\;\Longleftrightarrow\;(x-t)^{2}(x+2t)=0,$$
  so $x_{Q}=-2t$ and $Q=(-2t,\,-8t^{3}+6t)$.

  **(A) Locus of $M$.** $M=\bigl(-\tfrac{t}{2},\tfrac{-7t^{3}+3t}{2}\bigr)$. Put $X=-t/2$ so $t=-2X$; then
  $$Y=\tfrac{-7(-2X)^{3}+3(-2X)}{2}=\tfrac{56X^{3}-6X}{2}=28X^{3}-3X.$$
  So the locus is $y=28x^{3}-3x$. **TRUE.**

  **(B) Fixed point on $PQ$?** The chord is $y=(3t^{2}-3)x-2t^{3}$. For $(x_{0},y_{0})$ to lie on it for every $t$, the coefficients of $t^{3}$ and $t^{2}$ must vanish: $-2=0$ and $3x_{0}=0$, which is impossible. **FALSE.**

  **(C) Horizontal tangents on locus.** $y=28x^{3}-3x\Rightarrow y'=84x^{2}-3=0\Rightarrow x=\pm\tfrac{1}{2\sqrt{7}}$. Exactly two points. **TRUE.**

  **(D) Shortest chord.**
  $$|PQ|^{2}=(3t)^{2}+(9t^{3}-9t)^{2}=9t^{2}\bigl[1+9(t^{2}-1)^{2}\bigr].$$
  Let $u=t^{2}>0$; minimise $g(u)=9u[1+9(u-1)^{2}]$. Then
  $$g'(u)=9\bigl[1+9(u-1)(3u-1)\bigr]=0\;\Longrightarrow\;27u^{2}-36u+10=0\;\Longrightarrow\;u=\tfrac{6\pm\sqrt{6}}{9}.$$
  Neither equals $1$, so the minimum does **not** occur at $t=\pm 1$. **FALSE.**

