    diagnosis: "TRAP-PARTIAL: arithmetic slip on $y'=84x^{2}-3$. The two real critical points $x=\\pm\\tfrac{1}{2\\sqrt{7}}$ are genuine horizontal tangents."

review_notes: |
  Vieta double-root + locus elimination + horizontal-tangent count + shortest-chord optimisation, all on the same family of chords of $y=x^{3}-3x$. New SUB-IDEA MIDLOCUS proposed under existing IDEA TANGREC ("tangent meets curve again") — covers the midpoint-locus + chord-length variant, distinct from the iterate-$\varphi$ flavour of CUBREMEET. Calibrated T3 (jee_authenticity 8.3): four independent sub-tasks on one configuration, with partial-marking trap at (D) where minimising a factor leaves $t=\pm 1$ on the table.
