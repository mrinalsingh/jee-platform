    landed_on_option: "B"
    diagnosis: "TRAP-PARTIAL: imports a parabola intuition (chord-of-contact has fixed point) without checking the cubic case. The chord $y=(3t^{2}-3)x-2t^{3}$ has both $t^{2}$ and $t^{3}$ coefficients, so it cannot pass through a single fixed point."
  - path: "Sets $|PQ|^{2}=9t^{2}[1+9(t^{2}-1)^{2}]$, sees the inner bracket minimised at $t^{2}=1$, and forgets the outer $9t^{2}$ factor — concluding the chord is shortest at $t=\\pm 1$."
    landed_on_option: "D"
    diagnosis: "TRAP-PARTIAL: minimises a factor of the product rather than the product itself. Correct critical equation is $27u^{2}-36u+10=0$, whose roots are $\\tfrac{6\\pm\\sqrt{6}}{9}\\ne 1$."
  - path: "Finds locus $y=28x^{3}-3x$ correctly but solves $y'=0$ as $84x^{2}=3\\Rightarrow x^{2}=\\tfrac{1}{28}$ then rejects the two real roots as 'no horizontal tangent' due to a sign slip."
