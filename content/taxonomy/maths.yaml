# Maths taxonomy for the 7-axis question identity system.
#
# This file is the working source of truth for which fingerprint values are valid
# in the question bank. It informs the Prisma schema (Stage 2) — once that schema
# exists, these enums will become either Postgres enums (rigid; require migrations
# to extend) or lookup tables (flexible; extensible without migration). The doc's
# rule "no miscellaneous tags — extend the taxonomy" arguably favours lookup tables.
#
# This file will grow as we fingerprint more sample problems and generate originals.
# Adding a new value: pick a short code (~6 chars max), give it a one-line description,
# update both this file and any affected `.yaml` problem files.

schema_version: 1

# =============================================================================
# TARGET EXAM — categorical (added 2026-06-14)
# =============================================================================
# Every problem records which exam/paper it was designed for. This affects
# which difficulty anchor is canonically meaningful: T-rating + jee_authenticity_score
# are both JEE Advanced–anchored. For IOQM/INMO/RMO problems they still apply
# but with weaker calibration; for COACHING / JEE_MAIN material the floor of
# 8.8 on the authenticity score may legitimately be missed without rejection.

target_exams:
  JEE_ADVANCED: "JEE Advanced (the IIT joint entrance, Paper 1 + Paper 2). Gold standard for this bank."
  JEE_MAIN:     "JEE Main / NTA paper (broader-net engineering entrance; easier than Advanced; below the 8.8 authenticity floor)."
  IOQM:         "Indian Olympiad Qualifier in Mathematics (selects for INMO; high-school olympiad bridge)."
  INMO:         "Indian National Mathematical Olympiad."
  RMO:          "Regional Mathematical Olympiad."
  KVPY:         "Kishore Vaigyanik Protsahan Yojana (discontinued; legacy material)."
  COACHING:     "Coaching-class internal practice material (not a real public exam)."
  ORIGINAL:     "Claude-generated original problem, not pegged to a specific exam."
  OTHER:        "Catch-all; document specifics in source_metadata.target_exam_note."

# =============================================================================
# REVIEWER ROLES (added 2026-06-14)
# =============================================================================
# Each problem can carry MULTIPLE independent reviews. Each review is attributed
# to a reviewer_role; inter-rater agreement (Cohen's kappa for T-rating; mean
# absolute deviation for the authenticity score) is computed from the array.
#
# At minimum, every problem should have ONE review from the project where it
# was first created. Forward target: TWO reviews per calibrated problem
# (one from this project's critic, one from the jee-mcq skill's critic, OR
# one machine review + one human SME review).

review_roles:
  jee_platform_critic: |
    Claude running under jee_platform's agent-factory pipeline.
    Uses PROJECT CONTEXT.md §5 anchor: top-10-rank student in last 4-5 months.
  jee_mcq_critic: |
    Claude running under the sibling jee-mcq skill.
    Scores against the JEE_Advanced_Refined_Best_12Q.pdf reference set;
    its 8.8 floor rejects sub-JEE-Advanced material.
  human_reviewer_primary: |
    The product owner / user (MS).
    Required before a problem can transition to status='calibrated'.
  human_reviewer_secondary: |
    A second SME reviewer for inter-rater kappa (per PRD §9).
  automated_calibration: |
    The nightly batch job that updates empirical_* fields from real attempts.
    Only fires once a problem has >=30 attempts.

# =============================================================================
# RATING CONSENSUS METHOD (added 2026-06-14)
# =============================================================================
# When multiple reviews exist, the canonical authored_difficulty +
# jee_authenticity_score on the problem row are DERIVED from the reviews
# array via one of these methods (chosen per-bank-instance in source_metadata).

rating_consensus_methods:
  mean:           "Average of all numerical reviews. T-rating averaged on integer index (T2=2…) and rounded to nearest. Default."
  median:         "Median of all reviews — more robust to outliers."
  max:            "Most conservative (toughest rating)."
  min:            "Most generous."
  human_override: "If a human_reviewer_primary review exists, use it; else fall back to mean."

# =============================================================================
# DIFFICULTY RATING SCALES — DUAL RATING (added 2026-06-14)
# =============================================================================
# Every problem now carries TWO complementary difficulty ratings:
#
#   (1) authored_difficulty (T1-T5) — 5-bucket categorical, locked by
#       PROJECT CONTEXT.md §5. Already a column on `problems` (enum).
#
#   (2) jee_authenticity_score (8.8-10.0) — continuous fine-grained
#       calibration on the JEE-Advanced-paper-flavour axis used by the
#       sibling `jee-mcq` Claude Code skill.
#
# Both anchor to JEE Advanced; T1-T5 is the broad bucket, the authenticity
# score is fine-grained calibration that maps onto (and beneath) that bucket.
# The two scales together let bank entries cross-walk cleanly to and from
# problems generated by the jee-mcq skill, and let problems that fall below
# JEE Advanced quality (8.8 floor) be flagged explicitly rather than hidden
# inside a single bucket.

difficulty_scales:
  T_rating:
    type: categorical
    storage: "problems.authored_difficulty (Postgres enum T1..T5)"
    anchor: |
      A top-10-rank-level student in their last 4-5 months of JEE Advanced
      preparation (PROJECT CONTEXT.md §5).
    values:
      T1: "Easy standard — trivial for the reference student."
      T2: "Standard medium — quick + clean."
      T3: "Hard standard — recognisable technique, careful execution."
      T4: "Hard non-standard — multi-concept fusion, genuine difficulty."
      T5: "Top-100 only — hardest problems in any real JEE Advanced paper."

  jee_authenticity_score:
    type: "continuous (float, 0.0–10.0; only the 8.5–10.0 band is in scope for the bank)"
    storage: |
      Until Stage 2 Architecture promotes this to a first-class column on
      `problems`, park it under `source_metadata.jee_authenticity_score`
      in the YAML (and downstream the importer stores source_metadata as a
      JSONB column). Stage 2 Architect: promote to `problems.jee_authenticity_score`
      (float, NULLable initially for back-fill, GIN-index unnecessary, B-tree fine).
    anchor: |
      JEE Advanced Paper 2 reference set; the same anchor the sibling
      `jee-mcq` skill uses. Real JEE Advanced papers average ~9.3.
    bands:
      below_8.8: "Sub-JEE level — jee-mcq rejects as 'coaching-class' quality."
      "8.8-9.2": "JEE Advanced quality, easier end."
      "9.2-9.5": "JEE Advanced typical (real paper average ~9.3)."
      "9.5-9.8": "JEE Advanced, harder than typical paper."
      "9.8-10.0": "JEE Advanced extremes, top-100 territory."

# -----------------------------------------------------------------------------
# Cross-walk between the two scales (informational; both ratings are independent
# but must be self-consistent at tagging time).
# -----------------------------------------------------------------------------
difficulty_crosswalk:
  T1:
    authenticity_range: [8.5, 8.8]
    note: |
      Below jee-mcq's 'JEE Advanced quality' floor (8.8). Acceptable for
      JEE Main / coaching-class content but NOT for the JEE Advanced
      problem bank.
  T2:
    authenticity_range: [8.8, 9.2]
  T3:
    authenticity_range: [9.2, 9.5]
  T4:
    authenticity_range: [9.5, 9.8]
  T5:
    authenticity_range: [9.8, 10.0]

# Tagging rule: when a problem is created or tagged, assign BOTH a T-rating AND
# a jee_authenticity_score. The score MUST fall within the cross-walk range
# for the assigned T-rating; if it doesn't, re-pick the T-rating (the score
# is the more granular signal; trust it).
#
# Examples:
#   T2 + 9.05 → valid (9.05 ∈ [8.8, 9.2])
#   T3 + 9.45 → valid (9.45 ∈ [9.2, 9.5])
#   T3 + 8.9  → INVALID — re-pick to T2
#   T2 + 9.6  → INVALID — re-pick to T4

# =============================================================================

# -----------------------------------------------------------------------------
# Axis 1 — TOPIC
# -----------------------------------------------------------------------------
topics:
  ALG: Algebra (quadratic, polynomial, complex numbers, binomial)
  PNC: Permutations and Combinations
  PRB: Probability
  MAT: Matrices and Determinants
  TRG: Trigonometry
  CAL: Calculus
  COG: Coordinate Geometry (2D)
  VEC: Vectors and 3D Geometry
  SET: Sets, Relations, Functions
  SOT: Sequences and Series
  LOG: Logarithms (often subsumed under ALG)

# -----------------------------------------------------------------------------
# Axis 2 — SUBTOPIC (the chapter section, per topic)
# -----------------------------------------------------------------------------
subtopics:
  MAT:
    ALG: Matrix algebra (addition, multiplication, scalar multiplication)
    DET: Determinants and properties
    INV: Inverse, adjoint
    SYS: Systems of linear equations
    SPL: Special matrices (symmetric, orthogonal, permutation, idempotent, etc.)
    TRN: Transformations and conjugation (similarity, P·A·P⁻¹)
  CAL:
    FUN: Functions
    LIM: Limits
    CON: Continuity
    DIF: Differentiability
    DER: Derivatives and applications
    IND: Indefinite integration
    DEF: Definite integration
    ARE: Area under curves
    ODE: Differential equations
  PNC:
    DGT: Digit-based counting (numbers with digit / multiplicity restrictions)
    PER: Permutations (with / without repetition; circular; restricted)
    COM: Combinations and selections (binomial identities; subset counts)
    DST: Distribution problems (objects → boxes; partitions; surjections)
    INC: Inclusion-exclusion–driven counting
    REC: Recurrence- and lattice-path-based counting
    BIJ: Bijection and pigeonhole arguments
  PRB:
    COMP: Compound events (set-algebra of events; union/intersection/exactly-k; inclusion-exclusion on probabilities)
  TRG:
    IDN: Trigonometric identities (sum-product, double/half-angle, conditional)
    EQN: Trigonometric equations (general solution + interval counting)
    HAD: Heights & distances (angles of elevation/depression, towers, slopes)
    INV: Inverse-trig functions and principal-value identities
    PROP: Properties of triangles (sine/cosine rule, area formulas)
  SET:
    BAS: Basic operations on sets (union/intersection/difference/complement; absolute-value-defined sets)
    FUN: Functions (domain, range, injection/surjection, composition)
    REL: Relations (equivalence, ordering)
  ALG:
    QUA: Quadratic equations (roots, Vieta, location of roots, common roots)
    POL: Polynomials (degree-3+, factor/remainder theorem, rational roots)
    CPX: Complex numbers (modulus/argument, De Moivre, locus)
    BIN: Binomial theorem and identities
  LOG:
    EQN: Logarithmic equations (change-of-base reductions)
    INQ: Logarithmic inequalities
  SOT:
    AP: Arithmetic progressions
    GP: Geometric progressions
    AGP: Arithmetico-geometric and finite-sum identities
    DIO: Diophantine / number-theoretic flavour (mod sieves, factor pairs)
  # Other topics will be filled in as we fingerprint problems in those areas.

# -----------------------------------------------------------------------------
# Axis 3 — IDEA (the principle being tested; the MOST important axis)
# Listed per (TOPIC.SUBTOPIC). Will grow organically.
# -----------------------------------------------------------------------------
ideas:
  MAT.SYS:
    RANKCON: "Factor the coefficient determinant to locate the parameter values where it vanishes; at each such value compare coefficient rank vs augmented rank to classify the system (unique / infinite / inconsistent / coincident planes)."
  MAT.SPL:
    ORBSUM: "Summing a quantity over a group orbit gives an orbit-invariant result. Key case: conjugation by all permutation matrices."
  PNC.DGT:
    EXMUL: "Exact-distinct-with-multiplicity counting: fix the multiset of value-multiplicities, sum multinomial coefficients over admissible compositions, then correct for placement edge cases (leading zero, etc.)."
  # --- Added from NTA Paper 31-05-2026 tagging pass (25 questions) ---
  TRG.IDN:
    SUMPROD:      "Expand sum-and-difference formulas, then divide through by cos·cos to extract a tan/tan ratio."
    POWREDUCE:    "Power-reduction identities sin²x = (1-cos 2x)/2, cos²x = (1+cos 2x)/2 to match a target form."
    QUADRANT:     "Quadrant information fixes signs of all six trig functions; then standard addition/subtraction formulae."
    PARAMELIM:    "Eliminate a trig parameter from a parametric (x,y) pair via tangent-difference formulae, yielding the implicit curve."
    DISCRIDENT:   "Use sin^{2n}+cos^{2n} reductions to express the discriminant of a trig-coefficient quadratic in one variable s = sin²2θ."
    RANGE:        "Range of a·sin x + b·cos x is [−√(a²+b²), √(a²+b²)]; map endpoints to a parameter and count integers."
  TRG.EQN:
    TRIPLE:       "Triple-angle identity cos θ · cos(60°−θ) · cos(60°+θ) = ¼ cos 3θ collapses the LHS; then a constrained extremum problem."
    MONOBRANCH:   "Split the domain by discontinuities of tan; on each branch the function is strictly monotonic so IVT gives exactly one root per branch."
    QUASUB:       "Substitute tan²θ = sec²θ − 1 (or analogous) to convert to a quadratic in sec (or cos); then count periodic solutions."
    AMGMEQ:       "AM-GM forces equality a = b at the boundary of an equation a + b = 2√(ab); collapses the problem to a single equation."
    HALFANGSUB:   "Use cos x/(1+sin x) = tan(π/4 − x/2) to remove a |·| split on a related tan."
  TRG.HAD:
    DEPRES:       "Two depressions from a single elevated point determine two ground lengths; the figure formed is a rectangle whose area = base × height."
    ELEVDIFF:     "Two elevations from two collinear points reduce to one equation in cot α via the double-angle identity."
    ANGTOPS:      "Two poles of different heights joined at the tops form a right triangle with horizontal base D, vertical Δh, inclination θ."
    ISOTRI:       "Equal elevation angles from two ground points to the same vertical create an isoceles triangle; midpoint of the base is the foot of the perpendicular from the apex."
    SLOPED:       "Observer climbs a sloped surface (not horizontal): decompose displacement into horizontal and vertical, then apply the elevation formula from the new point."
  SET.BAS:
    SETDIFF:      "Translate |x−a| ⋚ r to interval form; compute A\\B, B\\A, A∩B, A∪B by inspection on the real line."
    SETOP:        "Combine inequality-defined sets via intersection/complement, intersect with ℤ, then count subsets as 2^n."
  ALG.QUA:
    SYMFNRT:      "Newton-style power-sum identity α⁴+β⁴ = ((α+β)²−2αβ)² − 2(αβ)², then optimise over the parameter."
    CMNRT:        "Two quadratics share a root: eliminate the parameter to get a quadratic for the common root, then back-substitute."
    FNSET:        "`α root ⇒ f(α) root' constrains the (multiset) root-set to be closed under f; enumerate all closure patterns."
    ROOTLOC:      "Location of roots wrt given intervals via signs of f at the endpoints, weighted by the sign of leading coefficient."
  LOG.EQN:
    LOGRED:       "Change-of-base reduces a log equation with two related bases to a one-variable rational equation t + c/t = k."
  SOT.DIO:
    MODSIEVE:     "x² − 2^y = N (Diophantine): use mod 8 (or 4) to rule out parities of y, then a small-case check."
  PRB.COMP:
    INCEXC:       "Inclusion-exclusion on event probabilities: let S_1=ΣP(A_i), S_2=ΣP(A_i∩A_j), S_3=P(∩A_i); then P(exactly k of n) and P(at least k) are fixed linear combinations of the S_j. A given union/triple-intersection pins down the missing symmetric sum."

# -----------------------------------------------------------------------------
# Axis 4 — SUB-IDEA (the specific manoeuvre; ≤ 6 per idea)
# Listed per (TOPIC.SUBTOPIC.IDEA).
# -----------------------------------------------------------------------------
sub_ideas:
  MAT.SYS.RANKCON:
    DETFAC: "Determinant factors as (n−1)²(n+2); the double/simple roots are the degenerate parameters. At a root, test each RHS separately: equal rows with equal RHS ⇒ coincident planes (infinitely many solutions); equal coefficient rank but larger augmented rank ⇒ inconsistent."
  MAT.SPL.ORBSUM:
    CNJSP: "Conjugation P·M·Pᵀ by a permutation P permutes row AND column indices of M by the same σ ∈ S_n; this makes Σ over S_n of P·M·Pᵀ constant on orbits of S_n acting on index pairs."
  PNC.DGT.EXMUL:
    LZINC: "Leading-zero edge correction via per-multiplicity-tuple inclusion-exclusion: for every (c_0, c_a, c_b, …) tuple where 0 has multiplicity c_0 ≥ 1, subtract 9!/((c_0−1)!·c_a!·c_b!·…) — the count of arrangements with 0 fixed in position 1."

  # --- Added from NTA Paper 31-05-2026 tagging pass (25 questions) ---
  TRG.IDN.SUMPROD:
    EXPRATIO: "a·sin(α+β) = b·sin(α−β) ⇔ (a−b)·sin α·cos β = −(a+b)·cos α·sin β, giving tan α/tan β = −(a+b)/(a−b)."
  TRG.IDN.POWREDUCE:
    HALFANG: "Compute both L and M (or symmetric expressions) explicitly via half-angle reductions; match against given option forms."
  TRG.IDN.QUADRANT:
    SIGNTAN: "tan(α+β) sign plus value doesn't fix the quadrant alone; locate the resultant angle numerically."
  TRG.IDN.PARAMELIM:
    TANDIFF: "Express tan(u − π/6) in terms of t = tan u, then algebra to clear the parameter and read off coefficients."
  TRG.IDN.DISCRIDENT:
    SYMTRIGRED: "sin⁴+cos⁴ = 1 − s/2, sin⁶+cos⁶ = 1 − 3s/4 with s = sin²2θ; the discriminant is a quadratic in s."
  TRG.IDN.RANGE:
    ASINBCOS: "Direct |a·sin x + b·cos x| ≤ √(a²+b²) range translation."

  TRG.EQN.TRIPLE:
    CONSTR: "Read the constraint |cos 3θ| ≤ ½ as a feasibility region containing the constrained maximum."
  TRG.EQN.MONOBRANCH:
    IVTPER: "Count the number of tan x branches inside the interval to get the solution count."
  TRG.EQN.QUASUB:
    SECSUBQUAD: "Combine with the AGP-style finite-sum identity Σ k/2^k = 2 − (n+2)/2^n for a clean closed form."
  TRG.EQN.AMGMEQ:
    EQUALCASE: "Identify the equality case as sin²θ = cos²θ; then compute the auxiliary trig sum on those θ."
  TRG.EQN.HALFANGSUB:
    ABSTANSPLIT: "Two cases on sign of tan 2x yield linear equations in x; collect roots in given interval; sum."

  TRG.HAD.DEPRES:
    RECTAREA: "Compute d from the larger-angle depression, then h from the smaller-angle; multiply."
  TRG.HAD.ELEVDIFF:
    COTDOUBLE: "2 cot α − cot 2α = const gives a quadratic in cot α."
    TRAPAREA: "Solve the elevation equation for d, then (½)(parallel-sides-sum)·height for the trapezium."
  TRG.HAD.ANGTOPS:
    HDDIFF: "tan θ = Δh/D; rationalise to one of the standard forms."
  TRG.HAD.ISOTRI:
    PERPMID: "Pythagoras on the isoceles configuration: OA² = OC² + AC² gives h in one line."
  TRG.HAD.SLOPED:
    TILTOBS: "tan 75° = (vertical from Q to T) / (horizontal from Q to F); solve for h."

  SET.BAS.SETDIFF:
    ABSINEQ: "Check each option by writing the four interval results — the trap is the asymmetric pair A\\B vs B\\A."
  SET.BAS.SETOP:
    POWERSET: "Translate each |x−a| inequality and any radical condition into intervals; intersect; count integer points; power set."

  ALG.QUA.SYMFNRT:
    POWSUM: "Express α⁴+β⁴ as a polynomial in cos²θ ∈ [0,1] and read off min/max from monotonicity."
  ALG.QUA.CMNRT:
    ELIMP: "Multiply equations to eliminate the parameter, yielding α·(linear in α) = 0."
  ALG.QUA.FNSET:
    CASEMAP: "Four-way case split: repeated root, both-fixed, swap, both-collapse; each gives a Vieta system."
  ALG.QUA.ROOTLOC:
    SIGNLOC: "Three inequalities (c−5)·f(0) > 0, (c−5)·f(2) < 0, (c−5)·f(3) > 0 to put one root in (0,2) and the other in (2,3)."

  LOG.EQN.LOGRED:
    LOGBC: "Set t = (ln sin x)/(ln cos x); the equation becomes t + 4/t = 4, immediately giving t = 2."

  SOT.DIO.MODSIEVE:
    MOD8: "Mod 8 forces y ∈ {1, 2}; direct check."

  PRB.COMP.INCEXC:
    EXACTK: "Exactly-k decomposition for three events: with S_1, S_2, S_3 the symmetric sums, P(exactly one)=S_1−2S_2+3S_3, P(exactly two)=S_2−3S_3, P(exactly three)=S_3, P(none)=1−(S_1−S_2+S_3); a stated union value recovers S_2 and exposes the 'none = 1−P(∪)' and 'at most one' traps."

# -----------------------------------------------------------------------------
# Axis 5 — ANSWER-TYPE (closed enumeration)
# -----------------------------------------------------------------------------
answer_types:
  MCQ-SC: Multiple-choice, single correct
  MCQ-MC: Multiple-choice, multiple correct (with partial marking)
  NUM-INT: Numerical answer, integer
  NUM-DEC: Numerical answer, decimal (to specified precision)
  MAT-COL: Match-the-column / match-the-list

# -----------------------------------------------------------------------------
# Axis 6 — SURFACE (closed enumeration — cognitive load dressing, NOT the math)
# -----------------------------------------------------------------------------
surfaces:
  SURF-PLAIN: Plain statement, minimal dressing
  SURF-SET: Heavy set / index / summation notation
  SURF-FUNC: Wrapped in function definitions
  SURF-GEOM: Geometric figure or diagram
  SURF-PARAM: Parameterized — letters as the real unknowns
  SURF-PASS: Comprehension passage (long preamble)

# -----------------------------------------------------------------------------
# Axis 7 — TRAP (closed enumeration — the bait)
# -----------------------------------------------------------------------------
traps:
  TRAP-NONE: No specific trap
  TRAP-EIGEN: Tempts eigenvalue / spectral reasoning
  TRAP-CAYLEY: Tempts Cayley-Hamilton invocation
  TRAP-LHOP: Tempts L'Hopital where simpler manipulation works
  TRAP-NCERT: Tests an NCERT edge case
  TRAP-EDGE: Tests an edge case in domain / range / continuity
  TRAP-PARTIAL: Multi-correct calibrated for partial-marking play
  TRAP-LENGTH: Long-looking problem with short solution (or vice versa)

# -----------------------------------------------------------------------------
# Intrinsic difficulty (closed enumeration, fixed forever)
# Anchored to a top-10-rank-level student in their last 4–5 months of preparation.
# -----------------------------------------------------------------------------
intrinsic_difficulties:
  T1: Easy standard
  T2: Standard medium
  T3: Hard standard
  T4: Hard non-standard
  T5: Top-100 only

# -----------------------------------------------------------------------------
# Rounds (per-student preparation stage — NOT a problem axis)
# -----------------------------------------------------------------------------
rounds:
  R1: First Prep — learning the idea; near-zero mastery
  R2: First Revision — "seen it" → "can do it reliably"
  R3: Second Revision — integration, two-concept fusion, speed, surface variation
  R4: Final Round — exam simulation, strategy, retention
